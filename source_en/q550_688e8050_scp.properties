M5550_S0010_G0000_001_ys=You're... an older-model YoRHa unit...
M5550_S0010_G0010_001_ys=Well, not that it matters...
M5550_S0010_G0020_001_ys=You're... a YoRHa unit!? You survived?
M5550_S0010_G0030_001_a9s=...Yeah. I'm 9S.
M5550_S0010_G0031_001_ys=I've heard of you... You're the model they call Nines, right?
M5550_S0010_G0032_001_a9s=That's right.
M5550_S0010_G0040_001_ys=You made it out alive... I'm 4S.
M5550_S0010_G0050_001_a9s=...Type-4s were the models deployed in the first wave, weren't they?
M5550_S0010_G0060_001_4s=I never thought I'd meet another Scanner model...
M5550_S0010_G0070_001_4s=Especially after what happened to the Bunker.
M5550_S0010_G0080_001_a9s=...What are you doing out here?
M5550_S0010_G0090_001_4s=Gathering intelligence on the enemy.
M5550_S0010_G0100_001_4s=YoRHa may have been wiped out, but the Resistance is still alive.
M5550_S0010_G0110_001_4s=As long as this body keeps moving, I want to be useful to someone...
M5550_S0010_G0120_001_4s=If you have any data on individual enemies, would you mind sharing it? There's only so much intel I can gather alone.
M5550_S0010_G0130_001_a9s=...Of course. I'll transfer the data I have with me.
M5550_S0010_G0135_001_telo=Handed over Enemy Data.
M5550_S0010_G0140_001_4s=Thank you.
M5550_S0010_G0150_001_4s=If you get any new enemy data, let me know. We should share intel.
M5550_S0010_G0160_001_4s=If you encounter any new enemies, I'd appreciate the information.
M5550_S0010_G0170_001_4s=Oh, new enemy data? Thanks.
M5550_S0010_G0180_001_4s=It'd probably be a pain to keep coming back, so I don't mind if you wait until you've built up a decent amount.
M5550_S0020_G0030_001_4s=So you gathered some enemy data for me. Thank you.
M5550_S0020_G0040_001_4s=Hmm... I see... yes...
M5550_S0020_G0050_001_4s=I cross-referenced it with the data I've collected, and it looks like individual differences have started appearing among the robots recently.
M5550_S0020_G0060_001_4s=Those differences seem to vary by region. It's like they're being influenced by their environment... Strange, isn't it? Even though they're robots.
M5550_S0020_G0070_001_4s=Ah, I should thank you properly. Here, take this.
M5550_S0020_G0080_001_4s=By the way... would it be all right if I called you Nines too? Like everyone else did.
M5550_S0020_G0090_001_a9s=That's fine. Not that there's anyone else left to call me that...
M5550_S0020_G0100_001_4s=I see... I'm sorry I asked.
M5550_S0030_G0020_001_4s=So you gathered some enemy data for me. Thank you.
M5550_S0030_G0030_001_4s=There's only so much intel I can gather alone.
M5550_S0030_G0040_001_4s=That's why your help really means a lot, Nines. Thank you.
M5550_S0030_G0045_001_4s=Here, this is for you.
M5550_S0030_G0050_001_4s=Let me know when you've gathered more enemy data.
M5550_S0040_G0020_001_4s=So you gathered some enemy data for me. Thank you.
M5550_S0040_G0030_001_4s=Ah, this enemy... The data includes one I fought alongside my comrades before.
M5550_S0040_G0040_001_4s=A long time ago, I had a lot of comrades too. But they were all taken out by that Logic Virus.
M5550_S0040_G0050_001_4s=I'd been injured in the battle just before that and was in sleep mode, so I survived...
M5550_S0040_G0060_001_4s=But now none of them are left.
M5550_S0040_G0070_001_4s=...Sorry. I got a little sidetracked. Thanks for the data, Nines.
M5550_S0040_G0080_001_4s=Let me know when you've gathered more enemy data.
M5550_S0050_G0020_001_4s=You gathered the enemy data for me.
M5550_S0050_G0030_001_4s=Thanks to you, I finished my collection 60% faster than planned. A fellow model really is dependable.
M5550_S0050_G0040_001_4s=...I wonder how long we're going to keep doing this.
M5550_S0050_G0050_001_4s=There's no place for us YoRHa units to return to anymore...
M5550_S0050_G0060_001_a9s=...There must still be things we can do. Intelligence gathering is a proper form of combat support.
M5550_S0050_G0070_001_4s=I know. I know that!!
M5550_S0050_G0080_001_4s=...Sorry. There was no point saying that to you, Nines.
M5550_S0050_G0090_001_4s=That completes the enemy-data collection objective. Thank you so much for helping me.
M5550_S0050_G0100_001_4s=This belonged to one of my comrades... Would you take it? I think they'd all be happy if you were the one to use it.
M5550_S0050_G0110_001_4s=Well then... You... Nines, please don't live with regrets.
M5550_S0050_G0120_001_4s=I need to think about what I'm going to do from here.
M5550_S0050_G0130_001_4s=...Thank you for everything.
