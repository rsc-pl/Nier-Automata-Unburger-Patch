M5091_S0020_G0110_001_reception=The tournaments in this arena have six ranks: E, D, C, B, A, and S.
M5091_S0020_G0120_001_reception=Beginners can only start from E-Rank.
M5091_S0020_G0130_001_reception=Win, and you'll earn the right to enter the next rank's tournament.
M5091_S0020_G0140_001_reception=The higher the rank, the more lavish the prizes get, you know.
