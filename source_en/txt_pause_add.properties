PAUSE_ARCHIVE_090_030=022 port 062423 "Tower" System Outline\n\nThis "Tower" is a facility for processing and informationizing the various resources sent from the resource recovery units, centered around a launch device.\nIts structure of 256 layers can filter and compress information substances with an information turbidity of 2300 or less and record them onto a projectile in 27 minutes and 32 seconds. (*)\nThe route for disassembling and digesting androids is described separately.\n\n*Error tolerance for diversity learning is 7.21%
PAUSE_ARCHIVE_090_040=Class A Patient "Yonah"\n\nChest X-ray: No abnormalities.\nHeart Echo: No abnormalities.\nC1 Chronic renal failure continuing\nC2 Diaphragmatic spasms\nC3 No vomiting <- Luciferase 4mg\n\n<Preservation Plan>\nUntreatable condition continues. Based on information manipulation of the original Gestalt, a scenario for this patient's death will be submitted to the management committee.\nTo back up in case of a sudden worsening of her condition, the number of attending physicians will be increased to 5. (Identity verification required)
PAUSE_ARCHIVE_090_050=Project YoRHa is a comprehensive information project with the main objective of raising android morale. This section describes the circumstances that led to the drafting of this operation and the operation's contents at each stage.\n*Note that this document is classified as Level S and must not be disclosed to any YoRHa personnel other than the Commander.\n\n[Human Extinction]\nAfter Project Gestalt collapsed around the year 3400, the remaining androids searched for a way to revive humanity. However, they were unable to find a way, and by around the year 4200, humanity was extinct. Only the Gestalt genes and the structural information of the remaining Replicants were recorded and stored in a storage base built on the moon.\n\n[Decline in Android Morale]\nInformation about humanity's extinction was strictly concealed, but it was impossible to stop the increasing number of androids who realized the truth. Rumors led to more rumors, and the morale of the androids, who had lost what they were meant to protect, dropped significantly. Concerned about this, the Army of Humanity Command drafted "Project YoRHa" with the aim of raising android morale.\n\n[Plan 01-03 Information Disguise of the Lunar Server]\nFirst, the disguised information that "humanity has fled to the moon" was spread among the Resistance as top-secret information. To reinforce this, a communication server was installed on the moon to conduct regular communications.\nOnly a very small number of maintenance personnel are to be stationed at the lunar server.\n\n[Plan 02-01 Establishment of the YoRHa Forces]\nThe next-generation combat unit plan that was being drafted at the time was significantly altered, and a new model, "YoRHa," was manufactured. Based on the data obtained from the experimental unit, official models were produced and dispatched to various locations. Some YoRHa unit operators, aware of this project, were entrusted with the operation and protection of the fake server on the moon.
PAUSE_ARCHIVE_090_060=The following document describes the final process of Project YoRHa.\n*Note that this document is classified as Level SS and must not be disclosed to any YoRHa personnel, including the Bunker commander.\n\n[Black Box]\nYoRHa units are equipped with a unit called a "black box." This is a repurposed machine lifeform core, and it can be said that YoRHa units have the same consciousness structure as machine lifeforms.\n\nThe reason the black box was adopted was based on the judgment that it would be inhumane to install a normal A.I. in an android weapon that was ultimately scheduled for disposal.\n\n*Also, there are several YoRHa units that have "turned hostile" due to black box malfunctions.
PAUSE_ARCHIVE_100_010=Thank you for your patronage today.\nOur "Accord's Shop" is a chain of weapon stores with over 140 locations worldwide, and we supply swords that match the climate and units of each country, not to mention our selection.\n\nOur technology for making not only newly developed equipment but also ancient swords usable is unparalleled by other stores. Please enjoy the many weapons forged by the extraordinary dedication of our founder, Accord, to swords, and the careful handiwork of our craftsmen.\n\nWe look forward to your continued patronage.
