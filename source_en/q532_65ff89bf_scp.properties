M5530_S0020_G0100_001_a2=Got the "Deer Meat" and "Boar Meat." Guess we'll go to the client.
M5530_S0030_G0000_001_resiitem=I've got the "Deer Meat" and "Boar Meat." Thanks!
M5530_S0030_G0010_001_resiitem=They say it's best grilled over charcoal with salt and pepper... or so I've heard?
M5530_S0030_G0020_001_a2b=Have you eaten it?
M5530_S0030_G0030_001_a9s=Have you eaten it before?
M5530_S0030_G0040_001_a9s=You've eaten it?
M5530_S0030_G0050_001_a2=You're gonna eat that?
M5530_S0030_G0060_001_resiitem=Well, yeah. It doesn't do much, but it's popular with the combat-model Resistance members, you know?
M5532_S0030_G0030_001_resiitem=Still, though... humans are amazing, aren't they? Coming up with all this knowledge about cooking...
M5532_S0030_G0040_001_resiitem=I wonder what kind of role will be left for us androids once those humans retake the Earth.
M5532_S0030_G0050_001_resiitem=For us, who were made only for fighting...
M5532_S0030_G0055_001_resiitem=...
M5532_S0030_G0060_001_resiitem=...We have our own jobs to do. Right?
M5532_S0030_G0071_001_resiitem=I'm going to keep researching ingredients.
M5532_S0030_G0080_001_resiitem=The seas and rivers are full of marine life again.
M5532_S0030_G0090_001_resiitem=I've gotta be ready to cook them something delicious for when humanity finally comes back!
M5532_S0030_G0130_001_resiitem=See ya!
M6080_S0010_G0010_300_sp=Yo, I've decided to open the Forest Branch here starting today. If you need anything, don't hesitate to ask.
M6080_S0010_G0020_300_sp=Hey, welcome. Well, make yourself at home.
