M5224_S0010_G0000_001_n02=...I really do respect Pascal-san.
M5224_S0010_G0010_001_n02=He built a village like this for outcasts like us. I can't thank him enough...
M5224_S0010_G0020_001_n02=Aah! I wish I could thank my benefactor Pascal-san somehow...
M5224_S0010_G0030_001_n02=...I really want to thank him, you know? (glance)
M5224_S0010_G0040_001_sele=It seems to want to say something. Listen.
M5224_S0010_G0050_001_sele=This looks like a pain. Ignore it.
M5224_S0010_G0060_001_a2=Looks like you have something to say...
M5224_S0010_G0070_001_n02=That's right! I have a feeling inside me that wants to give Pascal-san a thank-you present!
M5224_S0010_G0080_001_n02=Apparently there's a philosophy book Pascal-san likes at the Resistance Camp...
M5224_S0010_G0090_001_sele=I'll go get it for you.
M5224_S0010_G0100_001_sele=That's none of my business.
M5224_S0010_G0110_001_a2=Can't be helped... Pascal looked after me, so I'll go get that philosophy book for you.
M5224_S0010_G0120_001_n02=Really!? I'm grateful!
M5224_S0010_G0130_001_n02=I hear a person named "Anemone" at the Resistance Camp is hoarding the philosophy books, so go steal one for me!
M5224_S0010_G0140_001_a2=Like hell I'm doing something that dangerous...
M5224_S0020_G0150_001_ane=Hmm...? Pascal wants a philosophy book?
M5224_S0020_G0160_001_ane=Ah, I have one I just finished reading.
M5224_S0020_G0170_001_ane=If this one will do, take it.
M5224_S0020_G0180_001_a2=Thanks.
M5224_S0020_G0181_001_ane=While you're at it, could you pass this "Gold Ore" to Pascal? He asked for it a while back, and I finally got my hands on some.
M5224_S0020_G0182_001_a2=Understood.
M5224_S0020_G0190_001_ane=Still, a Machine Lifeform reading a philosophy book...
M5224_S0020_G0200_001_ane=Maybe we don't understand anything about our enemies after all.
M5224_S0020_G0210_001_a2=...Yeah.
