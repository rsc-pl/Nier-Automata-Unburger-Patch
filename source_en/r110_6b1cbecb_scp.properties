M5121_S0010_G0010_300_manager=I'm sorry, could you come back later?
M5121_S0010_G0020_300_manager=Everyone is fighting for their lives, so I can't just sit here complaining... I have to do my best...
M6090_S0010_G0110_300_manager=The material storage is up ahead. Sorry, but it's restricted to authorized personnel only.
M6090_S0010_G0120_300_manager=It's restricted to authorized personnel only beyond this point.
M6090_S0010_G0121_300_manager=Such a beautiful melody... I could listen to it forever...
M6090_S0010_G0122_300_manager=You're free to come and go beyond this point.
M6090_S0010_G0130_300_resiman=We don't know where the enemy will attack from. Patrols are essential.
M6090_S0010_G0140_300_resiman=Our bodies are not very combat-capable. I'm envious of you folks.
M6090_S0010_G0150_300_resiman=Hey, nice weather again today.
M6090_S0010_G0160_300_resiman=This one seems to have really taken a liking to you. He's a good guy, but watch out for the bragging.
M6090_S0010_G0170_300_resiman=I keep hearing rumors about you. They say you're doing amazing things.
M6090_S0010_G0180_300_resiman=We're not built for combat, but we're good at investigation.
M6090_S0010_G0190_300_resiman=You've got the map data, right? We helped with that, you know. And besides that... Huh? Leaving already?
M6090_S0010_G0200_300_resiwoman=......
M6090_S0010_G0210_300_resiwoman=...Excuse me. If I don't concentrate, my hands might slip...
M6090_S0010_G0220_300_resiwoman=...
M6090_S0010_G0230_300_resiwoman=......
M6090_S0010_G0240_300_resiwoman=.........
M6090_S0010_G0250_300_resiwoman=Hey, knock it off already.
M6090_S0010_G0260_300_resiman=All Resistance members operating in this region use this place as their base.
M6090_S0010_G0270_300_resiman=That's why we have to manage our people and supplies carefully.
M6090_S0010_G0280_300_resiman=If you need anything, talk to the person in charge over there.
M6090_S0010_G0290_300_resiwoman=How are you? Do you like this camp? Do YoRHa members get homesick? What about Resistance members?
M6090_S0010_G0300_300_resiwoman=After all, the Leader is so kind. Don't look at me like that. I know, it's about how fast I talk, right? Talking fast is sort of a habit of mine,
M6090_S0010_G0310_300_resiwoman=and it's quite hard to cure. Everyone teases me about it, but sometimes my thoughts just explode, and when I voice them, it comes out as fast talking like this,
M6090_S0010_G0320_300_resiwoman=and when I'm teased I try to properly explain the reason and justification, but see, it's this fast talking again, right? They don't seem to understand me at all,
M6090_S0010_G0330_300_resiwoman=and everyone just looks dumbfounded, and it's so frustrating! If I matched everyone else's pace, I couldn't convey even a tenth of what I'm thinking! Compared to that, the Leader is...
M6090_S0010_G0340_300_a2b=... (A person who talks a lot.)
M6090_S0010_G0360_300_a9s=... (She really talks a lot, huh.)
M6090_S0010_G0370_300_resiwoman=What's the matter? Did something happen? If you're in trouble, please say so without hesitation. I'll support you in any way I can!
M6090_S0010_G0380_300_resiwoman=Though there isn't much I can do. With how fast I talk, I don't get along well with the others, and maybe because of that my memory is bad too,
M6090_S0010_G0390_300_resiwoman=so I mostly stay in camp organizing supplies like this. But lately I've been able to help investigate the area too, and just the other day...
M6090_S0010_G0400_300_a2b=...
M6090_S0010_G0410_300_a9s=...
M6090_S0010_G0420_300_resiwoman=Before the moon broke, it seems there was something called "Night" around here too.
M6090_S0010_G0430_300_resiwoman=This guy, he's a weird one, right?
M6090_S0010_G0440_300_resiwoman=Um, is this the first time we've met? \nI'm sorry. My memory circuits are broken, so I forget things right away.
M6090_S0010_G0450_300_resiwoman=2B and 9S of the YoRHa squadron... I just can't make it stick...
M6090_S0010_G0490_300_resiman=Good work out there!
M6090_S0010_G0500_300_resiman=Um, I've only recently been assigned here... so, even if you ask me about the area, I don't know much...
M6090_S0010_G0510_300_resiman=West of the camp is the Factory Ruins, northwest is the Desert... I have to remember this properly before the investigation mission...
M6090_S0010_G0520_300_resiman=Are you getting your body maintained regularly? \nIf you want upgrades, you should talk to the woman out front.
M6090_S0010_G0530_300_resiman=YoRHa bodies are expensive, so take care of them.
M6090_S0010_G0540_300_resiman=I serviced the camp's transporter so you can return to the Bunker. \nUse it as you like.
M6090_S0010_G0550_300_resiman=I want to service other transporters too, but the Machine Lifeforms keep getting in the way.
M6090_S0010_G0560_300_resiwoman=Recently my chest area feels restless... I wonder what's wrong?
M6090_S0010_G0570_300_resiwoman=I was told there's no abnormality in my prosthetic body... \nEven though I'm an android, it's strange.
M6090_S0010_G0580_300_resiman=My job is watching over the camp's supplies and checking our stock.
M6090_S0010_G0590_300_resiman=Supply teams from different areas gather what we're missing, and we manage it all here.
M6090_S0010_G0600_300_resiman=There's been so much investigation work around here lately, I'm completely swamped.
M6090_S0010_G0610_300_resiwoman=*whisper whisper*... Yeah, yeah...
M6090_S0010_G0620_300_resiwoman=Hm? You're curious what we're talking about? \nIt's a secret.
M6090_S0010_G0630_300_resiwoman=*whisper whisper*... That's right...
M6090_S0010_G0640_300_resiwoman=Eavesdropping is in bad taste!
M6090_S0010_G0650_300_resiman=Good grief... Who shoved this in so haphazardly...?
M6090_S0010_G0660_300_resiman=With this much luggage, just managing it is a struggle.
M6090_S0010_G0670_300_resiman=Ahh, I'd love to have a drink after work.
M6090_S0010_G0680_300_resiman=Apparently humans used to get together with their comrades and drink alcohol after work. \nThat's a culture we should adopt too, don't you think?
M6090_S0010_G0690_300_resiman=To have been at war ever since we were born... It's rough, isn't it?
M6090_S0010_G0700_300_resiman=Even if you push yourself too hard, the world will go the way it goes. \nLet's take it easy.
M6090_S0010_G0710_300_resiwoman=Hello. \nDid you come to take a break too?
M6090_S0010_G0720_300_resiwoman=He should rest a little too, but with him, it's always work, work, work.
M6090_S0010_G0730_300_resiwoman=No sooner does he get back from a survey than he's helping the tool shop... \nHe's not even good at it, but he seems to accept anything.
M6090_S0010_G0740_300_resiman=This goes here... Hmm...
M6090_S0010_G0750_300_resiman=Strange... why won't it move?
M6090_S0010_G0760_300_resiman=Carry this, carry that, day after day, and there's no end... \nTime for a little break! A break!
M6090_S0010_G0770_300_resiman=So much work, useless colleagues, a tyrannical boss... \nAnd on top of that, the war just keeps going.
M6090_S0010_G0780_300_resiman=Isn't there at least one good thing...
M6090_S0010_G0790_300_resiman=Right clear! Left clear! \nMm-hm, no abnormalities today either!
M6090_S0010_G0800_300_resiman=Leave the security to me. \nI won't let a single mouse into the warehouse.
M6090_S0020_G0110_300_resiman=Doesn't it feel like the enemy has been more active lately? I hope it's just my imagination...
M6090_S0020_G0120_300_resiman=I'm secretly training so I can protect everyone when the time comes. I'm still inexperienced, though.
M6090_S0020_G0130_300_resiman=The YoRHa squadron is amazing. To think you can destroy so many Machine Lifeforms.
M6090_S0020_G0140_300_resiman=Be careful on the road. Well, you'll probably be fine even if I don't say it.
M6090_S0020_G0150_300_resiman=Between the large-scale weapon incident the other day and everything else, you're really something. At this rate, maybe we really can end this war.
M6090_S0020_G0160_300_resiman=You all put the information we gather to good use...
M6090_S0020_G0170_300_resiman=Some people prefer procuring supplies since intel gathering is dangerous, but it's a rewarding job.
M6090_S0020_G0180_300_resiwoman=......
M6090_S0020_G0190_300_resiwoman=I'm busy with the records of the caved-in area. I'm sorry, but please leave me alone.
M6090_S0020_G0200_300_resiwoman=...
M6090_S0020_G0210_300_resiwoman=......
M6090_S0020_G0220_300_resiwoman=......
M6090_S0020_G0230_300_resiwoman=You're persistent.
M6090_S0020_G0240_300_resiman=Need something from the Leader? She may not look it, but she's a worrier, so don't be too reckless.
M6090_S0020_G0250_300_resiman=Make sure you're properly supplied. Self-management is an important part of the job, too.
M6090_S0020_G0260_300_resiwoman=Hello! Are you doing well? There have been so many strange incidents lately, haven't there, and only in this area too. I'm worried and worried and worried,
M6090_S0020_G0270_300_resiwoman=and the other day, when I went out, Machine Lifeforms attacked me too. Well, compared to a large-scale weapon they probably weren't much of an opponent, but I was really surprised,
M6090_S0020_G0280_300_resiwoman=and the colleague investigating with me saved me right away, so I wasn't injured. But at the time I really thought I was going to die. Friends are people you should rely on,
M6090_S0020_G0290_300_resiwoman=and I really can't thank them enough. Ah, I understand, those are the eyes that say don't talk too much, I know. But since you came, let's talk a little more,
M6090_S0020_G0300_300_a2b=...
M6090_S0020_G0310_300_a9s=...
M6090_S0020_G0320_300_resiwoman=Ah, you came again! Coming all this way when you're so busy... Everyone ignores me because my stories are long, but you always talk to me,
M6090_S0020_G0330_300_resiwoman=and that makes you truly kind, doesn't it? Speaking of kind, the Leader treated my injury the other day. No, I only cut myself while carrying luggage,
M6090_S0020_G0340_300_resiwoman=but the Leader was incredibly worried. True, there was a lot of blood, but it looked much worse than it really was, so I felt kind of sorry,
M6090_S0020_G0350_300_resiwoman=and I always think I should be careful, but I often let my guard down without meaning to. I'm an android, so if I get repaired, I'm fixed right away,
M6090_S0020_G0360_300_resiwoman=but the Leader always says that if we get used to thinking that way, someday something irreversible will happen. The Leader really is a worrier, and besides that, the Leader is...
M6090_S0020_G0370_300_a2b=...
M6090_S0020_G0380_300_a9s=...
M6090_S0020_G0390_300_resiwoman=If it isn't the famous YoRHa member. \nI've heard all about your exploits.
M6090_S0020_G0400_300_resiwoman=When you're low on energy, you should borrow some of his. \nHe's so energetic it makes me tired, though.
M6090_S0020_G0410_300_resiwoman=Lately I've been making sure to take notes. \nIf I write things down, I can remember them again even if I forget, right?
M6090_S0020_G0420_300_resiwoman=But it's scary, isn't it... Losing your memory means you stop being yourself...
M6090_S0020_G0480_300_resiman=Good work out there! \nI feel like I'm getting used to the environment here little by little myself.
M6090_S0020_G0490_300_resiman=Umm, north of the camp is the forest, northeast is the Machine Lifeform village... right?
M6090_S0020_G0500_300_resiman=Everyone's been busy lately. \nI'm helping with maintenance too, but it's pretty difficult.
M6090_S0020_G0510_300_resiman=Are you tired? \nWorking hard is good, but don't overdo it.
M6090_S0020_G0520_300_resiman=I'm going around repairing the other transporters now, but the enemy breaks them as soon as I fix them.
M6090_S0020_G0530_300_resiman=Jeez, the vending-machine camouflage doesn't mean much anymore.
M6090_S0020_G0540_300_resiman=If there are Machine Lifeforms around a transporter, take them out for me.
M6090_S0020_G0550_300_resiwoman=You two always get along so well. \nI'm envious.
M6090_S0020_G0560_300_resiwoman=Keep it a secret from everyone, but I think some Machine Lifeforms are decent...
M6090_S0020_G0570_300_resiwoman=If only Machine Lifeforms would all just perish.
M6090_S0020_G0580_300_resiman=Yo, Ace-dono of the YoRHa squadron. \nThe support system is ready so you guys can fight in top condition.
M6090_S0020_G0590_300_resiman=I'm working. \nGo on, shoo, shoo!
M6090_S0020_G0600_300_resiwoman=Whisper whisper... I see...
M6090_S0020_G0610_300_resiwoman=You want to join in? It's still too early for you.
M6090_S0020_G0620_300_resiwoman=Whisper whisper... And then...
M6090_S0020_G0630_300_resiwoman=Even if you strain your ears to listen, it's nothing that interesting.
M6090_S0020_G0640_300_resiman=Umm, transfer this to the box over there...
M6090_S0020_G0650_300_resiman=It's good that we started trading with Pascal's village, but those guys are pretty sloppy for machines.
M6090_S0020_G0660_300_resiman=When the center got blown apart, I found some old alcohol. I tried a little, and that stuff is good.
M6090_S0020_G0670_300_resiman=...Keep this secret from the leader.
M6090_S0020_G0680_300_resiman=I don't know if alcohol lowers processing functions, but my head gets fuzzy and everything feels like it doesn't matter.
M6090_S0020_G0690_300_resiman=Maybe that's what they call a dreamlike state.
M6090_S0020_G0700_300_resiman=It's been hectic lately, and I haven't been able to rest properly. \nI have to take a break once in a while.
M6090_S0020_G0710_300_resiman=You say I'm always resting? \nDon't worry about the details.
M6090_S0020_G0720_300_resiwoman=Hello. \nPlease, make yourself at home.
M6090_S0020_G0730_300_resiwoman=You always look busy, but you have to make time for someone precious to you once in a while.
M6090_S0020_G0740_300_resiwoman=Because you can't be together forever. \n...Though this person won't listen no matter how many times I say it.
M6090_S0020_G0750_300_resiman=This fits here... connect this...
M6090_S0020_G0760_300_resiman=Hmm... Why are there parts left over?
M6090_S0030_G0110_300_resiman=Looks like you're still alive, too.
M6090_S0030_G0120_300_resiman=We have to survive, no matter what. This is no time to lose heart.
M6090_S0030_G0160_300_resiman=Hey, are you okay? A lot has happened lately. You must be exhausted.
M6090_S0030_G0170_300_resiman=I'm going to see my job through to the end. That's all that matters.
M6090_S0030_G0180_300_resiwoman=*whisper whisper*... Yeah, yeah...
M6090_S0030_G0190_300_a2b=......
M6090_S0030_G0200_300_a9s=......
M6090_S0030_G0210_300_a2=Hey, who are you talking to?
M6090_S0030_G0220_300_resiwoman=Eavesdropping is in poor taste.
M6090_S0030_G0230_300_resiman=*hic*... Booze is the best~ Hey, is there any more booze~?
M6090_S0030_G0240_300_resiman=...Whaddaya want...? You got a problem...?
M6090_S0030_G0250_300_resiman=...Why did I have to be the one who survived?
M6090_S0030_G0260_300_resiman=Not someone like me... A better person, someone more serious, should have survived.
M6090_S0030_G0270_300_resiman=You think so too, right?
M6090_S0030_G0280_300_resiman=Even in a situation like this, I'm scum who's too scared of fighting to move from here.
M6090_S0030_G0290_300_resiman=How nice would it be if I could throw everything away and say none of it matters...
M6090_S0080_G0000_300_resiwoman=Bunker, this is the Resistance Camp. Transmitting surface data.
M6090_S0080_G0010_300_resiwoman=......
M6090_S0080_G0020_300_resiman=It's you. How's it going? Don't be too reckless.
M6090_S0080_G0030_300_resiman=Make sure you're properly supplied. Self-management is an important part of the job, too.
M6090_S0080_G0040_300_resiman=Another injury?
M6090_S0080_G0050_300_resiman=If not, that's good. We can only do basic repairs here...
M6090_S0080_G0060_300_resiman=Don't push yourself too hard... though I know that's too much to ask. Take care of yourself.
M6090_S0080_G0070_300_resiman=Are you saving your data properly? Even if you have a spare body, if your data gets corrupted, it's the same as being dead.
M6090_S0080_G0080_300_resiman=Save your data often. Once it's too late, it's too late.
M6090_S0080_G0090_300_resiwoman=I know the body is just a vessel, but seeing the injured still hurts my heart...
M6090_S0080_G0100_300_resiwoman=Are you hurt? Don't be reckless, and make sure you rest properly.
M6090_S0080_G0110_300_resiman=Hey, are you sure you should be slacking off here? Your comrades need you, right? Get going.
M6090_S0080_G0120_300_resiman=There's not much we can do, but... we're counting on you, ace of YoRHa!
M6090_S0080_G0160_300_resiman=What's wrong? Don't worry, I'll protect this place.
M6090_S0080_G0170_300_resiman=This is all we can do. So we have to at least see it through to the end.
M6090_S0080_G0180_300_resiman=For you guys to come to a place like this... Don't tell me, enemy attack!? \nThis is bad! We have to move the materials out immediately!!!
M6090_S0080_G0190_300_resiman=...Eh, no? \nGood grief, don't scare me like that.
M6090_S0080_G0200_300_resiman=The materials here are our lifeline. \nI'll protect them even if it costs me my life.
