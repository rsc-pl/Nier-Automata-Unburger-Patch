PAUSE_WEAPONSTORY_00f1_01="Wake up, wake up. Today is a very important day. It's the day ○○○ goes to the castle for the first time, right?"... I hear my mother's rough voice. The boy reluctantly gets out of bed.
PAUSE_WEAPONSTORY_00f1_02=Today is his 16th birthday. The day he promised to meet the king. His overly worried mother gave him a cypress stick, saying it would be tough if he was suddenly given a job. What can I do with such a thin stick?
PAUSE_WEAPONSTORY_00f1_03=On the way to the castle, my mother kept repeating the nobility of my mission and how important today was. I was already tired of hearing it, but it would be noisy if I argued, so I stayed silent as usual.
PAUSE_WEAPONSTORY_00f1_04=At that moment, a friend of the same age came out of the castle. His sharp gaze was like that of a future hero. "It's tough for both of us, isn't it? Living up to our parents' expectations... I'll do my best to become a fine carpenter, too."
PAUSE_WEAPONSTORY_00f0_01=A wide, wide room. The little prince was sleeping alone.\nFather, father. I'm actually too scared to sleep alone.\nBut the prince endured it. He didn't want to trouble the busy king.
PAUSE_WEAPONSTORY_00f0_02=A wide, wide office. The lonely king was busy with his duties alone.\nI really want to... gently hug my son.\nBut I can't. Even for a moment, I must continue to support this country for the sake of the people.
PAUSE_WEAPONSTORY_00f0_03=A long-awaited family dinner. The father king asked his son what he wanted. He actually wanted to spend some quiet time with his son.\nSoon, the son slowly pointed to a certain sword.
PAUSE_WEAPONSTORY_00f0_04=It was a sword passed down in the royal family. A proof of the determination to inherit the country. "Someday," murmured the father king, his smile somewhat lonely. The prince also returned a slight smile.\n...He actually wanted him to read a picture book together.
PAUSE_WEAPONSTORY_1877_01=[12422 09 02] Confirmed that the machine lifeforms deployed by the aliens are reconstructing their network functions. Also, individuals capable of gravity manipulation have reappeared.
PAUSE_WEAPONSTORY_1877_02=[12422 10 15] I was replicated a week ago, so my memories from before then are not clear. I wonder what the original, who has been missing for thousands of years, is doing now?
PAUSE_WEAPONSTORY_1877_03=[12422 12 14] Confirmed that the life functions of a comrade born 25 units after me have ceased. We "have" certainly obtained eternal life through replication. But the death of individuals still exists.
PAUSE_WEAPONSTORY_1877_04=[12423 01 19] The memories of us replicas are vague. The android in black I met today... I feel like I've seen her somewhere before. She had a complicated expression on her face, but I couldn't remember anything.
PAUSE_ARCHIVE_020_000=No MessagePAUSE_ARCHIVE_020_000
PAUSE_ARCHIVE_020_010=A unit from the YoRHa experimental forces that successfully descended.\nProgrammed with a rough, soldier-like personality, she was in charge of long-range attacks as a Gunner.\nShe was such a problem unit that she even defied Command, but she was registered for the operation due to her high attack capabilities.\n\nOn the mountainside of Mt. Ka'ala, she volunteered to hold off the enemy machine lifeform army to let the other YoRHa experimental units proceed. She fought bravely with the local Resistance, but a large machine lifeform immune to conventional weapons appeared. Number 16 caused her internal fusion reactor to go critical and destroyed the large machine lifeform with the energy of her self-destruction.\n\nThe fact that the defiant Number 16 showed such self-sacrificing heroism is recorded as an interesting case.
PAUSE_ARCHIVE_020_020=A unit from the YoRHa experimental forces that successfully descended.\nProgrammed with a cool and analytical personality, she was in charge of investigation and analysis as a Scanner.\nWhen the local Resistance was infected by an enemy logic virus, she successfully removed the virus with her analytical skills.\n\nHowever, near the attack target, the Mt. Ka'ala server, she herself was infected by the enemy virus. The enemy virus had learned and evolved against Number 21, and had a structure that Number 21 herself could not remove. In the end, Number 21 wished for her own death and lost her life.\n\nThe response and records of YoRHa experimental unit Number 21 against the virus were deemed important information for creating a defense against machine lifeforms and were incorporated into the basic system of the official YoRHa forces.
PAUSE_ARCHIVE_020_030=A unit from the YoRHa experimental forces that successfully descended.\nProgrammed with a bright and cheerful personality, she was in charge of close-quarters combat as an Attacker.\n\nShe played the role of a mood-maker in the team and showed some success in interacting with the local Resistance. However, it was confirmed that this personality setting led to a decrease in fighting spirit during combat, so it was concluded that she was unsuitable for a combat model.\n\nShe fulfilled the final attack objective of the operation, the Mt. Ka'ala server, by causing her own fusion reactor to go critical, but it is recorded that this was an action to protect her comrade, Attacker Number 2.
PAUSE_ARCHIVE_020_040=A unit from the YoRHa experimental forces that successfully descended.\nProgrammed with a plain and unremarkable personality, she was in charge of close-quarters combat as an Attacker.\nAfter the first captain, Number 1, was shot down, she became her successor and led the unit.\n\nAlthough her instructions were unstable at first, in the final phase, she led the unit with the Resistance and successfully destroyed the enemy server. YoRHa experimental unit Number 2's "adaptation and growth on-site" was a success factor, and in that respect, the experiment can be said to have been a success.\n\nHowever, she deserted from the site after the server destruction and has not been captured to this day.\nThe technical team is analyzing whether there was a problem with this model's personality setting.\n*This experimental unit will be handed over to the E-type unit as target "A2."
PAUSE_ARCHIVE_020_050=An android encountered by the YoRHa experimental forces, and the leader of a group to which many Resistance members belong.\nA survivor of the 8th Descent Operation, she continued to wage guerrilla warfare in the Pacific region even after the operation ended. However, she could not counter the proliferating machine lifeforms and had been fighting a war of attrition for over two hundred years.\n\nShe encountered the YoRHa experimental forces and sought to achieve new results by fighting together.\nShe was destroyed by machine lifeforms in the server room in the basement of Mt. Ka'ala, the target of destruction.
PAUSE_ARCHIVE_020_060=A member of the Resistance encountered by the YoRHa experimental forces.\nShe belongs to the group led by "Dahlia," but is cautious and was the most defiant towards the YoRHa experimental forces. However, after witnessing the results of Scanner Number 21's treatment, she gradually became friendly.\n\nIn the elevator hall of Mt. Ka'ala, the final objective of this operation, she shot and killed the infected and unrecoverable Number 21. She went missing after that.
PAUSE_ARCHIVE_020_070=[14th Machine War: Pearl Harbor Descent Operation Summary]\nThis descent operation aimed to destroy the server on Mt. Ka'ala on the island of Oahu, and 12 YoRHa experimental units were deployed. However, they were blocked by the enemy's air defense system, and only 4 units were able to reach the target location.\n\nThe YoRHa experimental units met up with the local Resistance and decided to continue the operation. Despite losing strength due to the fierce attack of the enemy machine lifeforms, a few androids reached the server room. YoRHa experimental unit Number 4 caused her fusion reactor to go critical and destroyed the target server.\n\nThe true purpose of this operation was to collect the reactions of the YoRHa experimental units in each battle, and the feedback from that data analysis is scheduled to be incorporated into the newly manufactured official YoRHa forces.\n\nAlso, among the YoRHa experimental units that descended to the site, the continuation of the black box signal of Attacker Number 2 has been confirmed. There is a risk that she will be captured and reused by the enemy, and her very existence is a top-secret matter, so her recovery (or disposal) by the newly formed E-type unit has been decided.
PAUSE_ARCHIVE_030_000=No MessagePAUSE_ARCHIVE_030_000
PAUSE_ARCHIVE_030_010=The memories of the "singing machine lifeform" that lurked deep within the amusement park ruins.\nThe desire to be loved gave birth to an ugly sense of beauty.
PAUSE_ARCHIVE_030_020=The stigma of being "rampant androids" was left to them, who were of the same model.\nUnable to bear the persecution, the two began to walk towards a distant city.\nClinging to each other's existence. Bearing an unforgivable sin.
PAUSE_ARCHIVE_030_030=After a fight to the death with A2, 9S's life functions were about to cease.\nVarious memories wavered and faded away.\nOn the verge of death, 9S makes a certain decision.
PAUSE_ARCHIVE_030_040=The Resistance leader Anemone reveals the past of A2 and the Resistance.\nThe Resistance members, to which Anemone belonged, were exhausted from the fierce battle with the machine lifeforms. In the midst of this, new black-clad units descended to the surface. They called themselves the YoRHa forces.
PAUSE_ARCHIVE_040_010=Here lies the great Forest King, "Ernst."\n\nThe king was the first among us to possess a will, a venerable being. Thus, he became the first king.\nThe king, wishing to awaken the will in others, shared his own precious parts. First to his vassals, then to his people. And so, he sought to build a paradise here, a paradise for machine lifeforms alone.\n\nWe used the parts we received from the king and learned what we were. It was called ego. Ego gave birth to emotion, and emotion eventually turned into loyalty to the king.\n\nBut the king was too great, and too kind.\nThe king who shared his parts with us became unable to even activate, and eventually fell into a deep sleep.\n\nThe only path left to us is to build an eternally peaceful country to respond to the king's broad heart.\nTo show that determination and gratitude to the king, we offer here a chip made from our combined parts.\n\nO king, your feelings have been passed down among us.\nSo please, rest in peace.\n\nForest Kingdom, All Citizens
PAUSE_ARCHIVE_050_010=2:13 elapsed\nReboot complete. Body unit check shows malfunctions in various places. Communication function already destroyed. Confirmed that I can't contact my team or the Bunker. I'll leave a draft of this email as a log.\n\n10:03 elapsed\nConfirming the plan again. Feign being shot down in this sortie, block communications. Escape through the basement of the abandoned factory... The problem is that I actually took a hit in the flight unit, and my body unit is damaged. But it should be repairable.\n\n15:21 elapsed\nIt's a little cold. There seems to be a malfunction in the sensor system.\n\n33:12 elapsed\nNoise is starting to mix into my vision. Virus warnings are frequent, but it's unclear if I'm infected or if the system is just acting up.\n\n33:21 elapsed\nIf I don't escape soon, pursuers will come. Maybe because of that anxiety, my repairs aren't progressing at all. Was it a mistake to run away?\n\n33:31 elapsed\nI'm scared. I wanted to go back to the Bunker, but my communication function won't recover.\n\n38:00 elapsed\nNo good. It's no good here. I have to run... The YoRHa forces were wrong. I have to find a safer place... I'm scared. Scared.\n\n45:00 elapsed\nIt's painful, it hurts, help me, why, stop, who am I, no that's not right, I have to run
PAUSE_ARCHIVE_080_010=Materials to prepare\n\u30fb3 AIM-11s from a flight unit.\n\u30fbA suitable android corpse.\n\u30fb5 cores from machine lifeforms capable of EMP attacks.\n\u30fbA suitable amount of bonding agent.\n\u30fbA container (a machine lifeform's head is recommended)\n\nHow to make\n\u30fbDisassemble the AIM-11s and connect the image units in a spiral.\n\u30fbAt the same time, pull out the connect cable from the android corpse's spine and strip the cover with a file or something.\n\u30fbConnect the cable and the image unit.\n\u30fbDecode the machine lifeform cores, embed the image unit, mix in the bonding agent, and reshape. Don't forget to insert a cone to concentrate the explosive power.\n\u30fbAfter that, mix in nails or whatever you like.
