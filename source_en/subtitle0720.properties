M3000_S0010_H0000_001_cmd=The destruction of enemy network core units "Adam" and "Eve" has been confirmed.
M3000_S0010_H0010_001_cmd=The enemy chain of command is now in a state of temporary chaos.
M3000_S0010_H0020_001_cmd=Seizing this opportunity, the Army of Humanity has decided to launch an all-out assault against the Machine Lifeforms.
M3000_S0010_H0030_001_cmd=Naturally, our YoRHa forces are no exception.
M3000_S0010_H0040_001_cmd=Remember!
M3000_S0010_H0050_001_cmd=The anguish of having our homeland stolen from us!
M3000_S0010_H0060_001_cmd=We will not give up!
M3000_S0010_H0070_001_cmd=The sea, the sky, the land...
M3000_S0010_H0080_001_cmd=We will reclaim the Earth stolen by those vile Machine Lifeforms!
M3000_S0010_H0090_001_cmd=With the success of this operation,
M3000_S0010_H0100_001_cmd=here and now, we will bring this war to an end!
M3000_S0010_H0110_001_cmd=Glory to Mankind!
M3000_S0010_H0120_001_bys=Glory to Mankind!
