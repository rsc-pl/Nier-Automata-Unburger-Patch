M5071_S0010_G0000_001_n02=Trouble... trouble...
M5071_S0010_G0010_001_a2b=What's wrong?
M5071_S0010_G0020_001_n02=A moose I was taking care of got sick...
M5071_S0010_G0030_001_n02=But I do not know how to repair it.
M5071_S0010_G0040_001_a9s=You don't repair animals like you repair machines.
M5071_S0010_G0050_001_a9s=To cure sickness, you generally administer medicine.
M5071_S0010_G0060_001_n02=Medicine... I do not understand...
M5071_S0010_G0070_001_a9s=Oh, so you have never seen any.
M5071_S0010_G0080_001_a9s=It will be faster to show you the real thing. Wait here. I will bring some.
M5071_S0010_G0090_001_a2b=Animal medicine... where would we get that?
M5071_S0010_G0100_001_a2b=We androids do not use things like medicine.
M5071_S0010_G0110_001_a9s=If we can find the recipes humans used and recreate them...
M5071_S0010_G0120_001_a9s=...That information might still be in the ruins of the Commercial Facility.
M5071_S0020_G0000_001_a2b=This is...
M5071_S0020_G0010_001_pod042=Common name: toothbrush. Used by humans to brush their teeth.
M5071_S0020_G0020_001_pod042=Effect: prevention of dental caries.
M5071_S0020_G0030_001_a2b=Caries? Are there bugs in their teeth?
M5071_S0020_G0040_001_pod042=Dental caries occur when the enamel of the tooth is dissolved by acid, and...
M5071_S0020_G0050_001_a9s=Either way, it does not seem to have anything to do with us.
M5071_S0020_G0060_001_a2b=This is...?
M5071_S0020_G0070_001_pod042=Common name: lipstick. Humans applied red coloring to their lips to make themselves beautiful.
M5071_S0020_G0080_001_a2b=They put this on? Their mouths?
M5071_S0020_G0090_001_pod042=Proposal: increase experience value through trial application.
M5071_S0020_G0100_001_a2b=Rejected.
M5071_S0020_G0110_001_a2b=This one is strange too.
M5071_S0020_G0120_001_pod042=Common name: dieting goods.
M5071_S0020_G0130_001_pod042=Used by humans to reduce their own fat.
M5071_S0020_G0140_001_a2b=Fat... increases on its own?
M5071_S0020_G0150_001_pod042=When more energy than necessary is ingested over a long period,
M5071_S0020_G0160_001_pod042=fat accumulates, weight increases, and movement is affected.
M5071_S0020_G0170_001_a9s=Humans sure had inconvenient bodies...
M5071_S0020_G0180_001_a2b=What is this?
M5071_S0020_G0190_001_pod042=Common name: writing utensil. A tool used to record information.
M5071_S0020_G0200_001_pod042=Memos are mandatory for new hires.
M5071_S0020_G0210_001_a2b=New hires? Memos?
M5071_S0020_G0220_001_pod042=A phrase found in human literature. Meaning unknown.
M5071_S0020_G0230_001_pod042=Found a pharmacology text for living organisms.
M5071_S0020_G0240_001_pod042=Also effective on cervids, which belong to the same mammalian class.
M5071_S0020_G0250_001_pod042=The anti-inflammatory analgesic described in this book should be applicable to the moose's disease...
M5071_S0020_G0260_001_a9s=W-w-w-wait just a second.
M5071_S0020_G0270_001_a9s=...How do you know that without even reading it?
M5071_S0020_G0280_001_pod042=Accessed database and verified the contents of the book.
M5071_S0020_G0290_001_a9s=You could have told us that first!
M5071_S0020_G0300_001_pod042=Negative: no question regarding this matter was asked.
M5071_S0020_G0310_001_a9s=...What a complete waste of time.
M5071_S0020_G0320_001_a2b=For now, let's go back and give this to that Machine Lifeform.
M5071_S0030_G0000_001_n02=Medicine!
M5071_S0030_G0010_001_n02=Thank you! I will try using it right away!
M5071_S0030_G0020_001_n02=...It seems medicine worked. It is sleeping now.
M5071_S0030_G0030_001_a2b=I see. Good.
M5071_S0030_G0040_001_n02=Animals are mysterious, are they not?
M5071_S0030_G0050_001_n02=Unlike us, they cannot be repaired easily.
M5071_S0030_G0060_001_n02=I pity them, having such inconvenient bodies.
M5071_S0030_G0070_001_n02=BUT...
M5071_S0030_G0080_001_n02=But in exchange, unlike us, they are warm.
M5071_S0030_G0090_001_a2b=...You're right.
M5071_S0030_G0100_001_n02=I KNOW!
M5071_S0030_G0110_001_n02=I must thank you for medicine! Take this.
M5071_S0030_G0120_001_n02=Come again soon! Everyone is waiting.
