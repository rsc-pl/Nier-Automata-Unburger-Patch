M5410_S0010_G0000_001_16d=Um... Are you 2B-san?
M5410_S0010_G0010_001_a2b=...I am.
M5410_S0010_G0020_001_16d=Oh, thank goodness. I'm 16D.
M5410_S0010_G0030_001_16d=11B-san, your wingman during the Abandoned Factory mission... She was my instructor.
M5410_S0010_G0040_001_16d=Um... Senpai... is she really...?
M5410_S0010_G0050_001_a2b=...Yes. She was shot down in that battle.
M5410_S0010_G0060_001_16d=I see... That's so unfortunate. Senpai was someone I looked up to.
M5410_S0010_G0070_001_16d=She was always so strong and cool...
M5410_S0010_G0080_001_16d=What happened to her body?
M5410_S0010_G0090_001_a2b=I haven't confirmed it.
M5410_S0010_G0100_001_16d=I'm sorry to ask something so unreasonable, but...
M5410_S0010_G0110_001_16d=if you happen to find any of Senpai's belongings, could you give them to me?
M5410_S0010_G0120_001_16d=Of course, only if you have time.
M5410_S0010_G0130_001_sele=Accept.
M5410_S0010_G0140_001_sele=Refuse.
M5410_S0010_G0150_001_16d=...I see. I'm sorry to ask the impossible.
M5410_S0010_G0160_001_16d=Please, if you ever have time...
M5410_S0010_G0170_001_16d=If you find any belongings of my senpai, 11B-san, could you give them to me?
M5410_S0010_G0180_001_a2b=...Understood.
M5410_S0010_G0185_001_16d=Thank you so much.
M5410_S0010_G0190_001_a2b=Pod. What's the status on 11B's Black Box signal?
M5410_S0010_G0200_001_pod042=Unknown: It has not been recovered as of this point.
M5410_S0010_G0210_001_a2b=She went down near the Abandoned Factory...
M5410_S0010_G0220_001_a2b=A YoRHa body...
M5410_S0010_G0230_001_pod042=Confirmed: YoRHa Type B. Frame of search target 11B.
M5410_S0010_G0240_001_a2b=So this is where you fell, 11B...
M5410_S0010_G0250_001_a2b=Black Box signal?
M5410_S0010_G0260_001_pod042=Cannot confirm. Restoration is also impossible due to fatal damage to the Black Box itself.
M5410_S0010_G0270_001_a2b=I see...
M5410_S0010_G0280_001_pod042=Proposal: Recover any usable weapons.
M5410_S0010_G0290_001_pod042=Additionally, fragmented memory data detected within the memory region.
M5410_S0010_G0300_001_a2b=A desertion plan...
M5410_S0010_G0320_001_pod042=Serious violation of regulations. However, due to the death of the unit in question, punishment cannot be carried out.
M5410_S0010_G0325_001_a2b=...
M5410_S0010_G0330_001_a2b=I'll give the weapon to 16D back at the Bunker.
M5410_S0020_G0000_001_16d=Ah... 2B-san.
M5410_S0020_G0010_001_a2b=I found 11B's body. This weapon is her memento.
M5410_S0020_G0015_001_telo=Handed over 11B's Memento.
M5410_S0020_G0020_001_16d=This weapon... there's a combat log. She was fighting right up until the moment she died...
M5410_S0020_G0030_001_16d=That's just like my brave Senpai. Thank you so much.
M5410_S0020_G0040_001_16d=...I'm a Defense-type, so please, 2B-san, you should use this weapon.
M5410_S0020_G0050_001_16d=I think Senpai would be happier that way.
M5410_S0020_G0060_001_a2b=...Understood.
M5410_S0020_G0070_001_sele=Tell her about 11B's desertion plan.
M5410_S0020_G0080_001_sele=Keep 11B's desertion plan a secret.
M5410_S0020_G0090_001_a2b=Actually, I found this information in 11B's memory area...
M5410_S0020_G0100_001_16d=This is... desertion? Senpai?
M5410_S0020_G0110_001_16d=Heh...
M5410_S0020_G0120_001_16d=Heh heh... hahaha...
M5410_S0020_G0130_001_a2b=What's so funny?
M5410_S0020_G0140_001_16d=I mean, Senpai was so strict, and yet she tried to desert... Heh.
M5410_S0020_G0150_001_16d=And then she died such a miserable death on top of that.
M5410_S0020_G0160_001_16d=She finally got what she deserved for tormenting me all that time...
M5410_S0020_G0170_001_16d=She looked down on me just because I wasn't an Attack-type...
M5410_S0020_G0180_001_16d=Ah, 2B-san. Thank you so much!
M5410_S0020_G0190_001_16d=Now I can enjoy focusing on my work!
M5410_S0020_G0200_001_a2b=...
M5410_S0020_G0210_001_16d=Is this all the information on Senpai...?
M5410_S0020_G0220_001_a2b=...Yes.
M5410_S0020_G0230_001_16d=I'm sure Senpai can rest in peace now.
M5410_S0020_G0240_001_16d=...
M5410_S0020_G0250_001_16d=Actually, I... was dating Senpai.
M5410_S0020_G0260_001_16d=She used to say things like, "I'll protect you."
M5410_S0020_G0270_001_16d=But if she's dead, there's no way she can protect me, is there?
M5410_S0020_G0280_001_16d=I'm... thinking of transferring to an Attack-type, like Senpai and you, 2B-san.
M5410_S0020_G0290_001_16d=So I can avenge my Senpai.
M5410_S0020_G0300_001_a2b=...I see.
M5410_S0020_G0310_001_16d=Thank you for everything.
M5410_S0020_G0320_001_16d=Ah, please take this as my thanks.
M5410_S0020_G0330_001_16d=I don't have any reason to protect myself anymore...
