M5520_S0010_G0000_001_pascal=Ah... right. If possible, there is something I would like to ask your help with.
M5520_S0010_G0010_001_pascal=I would like you to collect Old World information scattered across various places.
M5520_S0010_G0020_001_a9s=The Old World? Why?
M5520_S0010_G0030_001_pascal=I would like to make use of Old World relics to make this village easier to live in.
M5520_S0010_G0040_001_pascal=Of course, if I find anything useful, I will share it with you as well. Would you lend me your aid?
M5520_S0010_G0050_001_sele=Lend aid.
M5520_S0010_G0060_001_sele=Do not lend aid.
M5520_S0010_G0070_001_pascal=Thank you. If you find any information, please show it to me.
M5520_S0010_G0075_300_pascal=Please tell me if you find any Old World information.
M5520_S0010_G0080_001_pascal=Goodness! Knowledge of the Old World should be important to you as well... Could you lend me your aid?
M5520_S0010_G0090_001_pascal=Please, take pity on this old Machine Lifeform... and lend me your aid?
M5520_S0010_G0100_001_pascal=Please... I beg you...
M5520_S0010_G0110_001_pascal=Information on the Old World may make life easier for the children in this village... Please reconsider.
M5520_S0020_G0000_001_a9s=The Old World information Pascal wanted... is this it?
M5520_S0020_G0010_001_pascal=Oh! Thank you... Information about humanity is always so fascinating.
M5520_S0020_G0020_001_pascal=It's not much, but please take this as my thanks...
M5520_S0020_G0030_001_pascal=Wonderful! Thank you for such valuable information...
M5520_S0020_G0040_001_pascal=This is my thanks. Please accept it.
M5520_S0020_G0050_001_a9s=It's Old World information... but this content...
M5520_S0020_G0060_001_pod153=Information related to the creation of weapons using nuclear fission.
M5520_S0020_G0070_001_a9s=...Is it really okay to give this to Pascal?
M5520_S0020_G0080_001_a9s=Or maybe I should give it to the Commander...
M5520_S0020_G0090_001_pod153=9S must make the decision.
M5520_S0020_G0100_001_pascal=This is...
M5520_S0020_G0110_001_pascal=Thank you. This is valuable information indeed.
M5520_S0020_G0120_001_a9s=Yeah...
M5520_S0020_G0130_001_pascal=Technology like nuclear fission is a lost art for us.
M5520_S0020_G0140_001_pascal=It is difficult to control, and its environmental impact is severe. For that reason, the Creators who made us sealed away all information about it.
M5520_S0020_G0150_001_pascal=Such dangerous information... I cannot possibly accept it...
M5520_S0020_G0160_001_a9s=...I see.
M5520_S0020_G0170_001_pascal=Still, thank you for going out of your way to bring it to me.
M5520_S0020_G0180_001_pascal=Here is a token of my thanks.
M5520_S0020_G0190_001_pascal=9S-san...
M5520_S0020_G0200_001_pascal=If this village is destroyed because I chose not to build nuclear weapons... will everyone here resent me for it?
M5520_S0020_G0210_001_a9s=...That's not for me to decide.
M5520_S0020_G0220_001_pascal=Yes...
M5520_S0020_G0230_001_cmd=What is it, 9S?
M5520_S0020_G0240_001_a9s=Actually... I found information from the Old World related to nuclear fission.
M5520_S0020_G0250_001_a9s=I was wondering what I should do with it...
M5520_S0020_G0260_001_cmd=Nuclear weapons, you say...
M5520_S0020_G0270_001_cmd=As I'm sure you know, our use of nuclear weapons is restricted by directives from the Council of Humanity.
M5520_S0020_G0280_001_cmd=However, the Machine Lifeforms, our enemies, also do not use nuclear weapons, though we do not know why.
M5520_S0020_G0290_001_cmd=We do not know why... but in any case, this information should be secured.
M5520_S0020_G0300_001_a9s=Understood.
M5520_S0020_G0310_001_cmd=Good work. This isn't exactly a reward for the intel, but I will have maintenance materials sent to your room. Use them as needed.
M5520_S0020_G0320_001_a9s=Thank you, Commander.
