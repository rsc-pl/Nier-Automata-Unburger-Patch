M6010_S0090_G0420_300_op=Sigh... Apparently she was treating my voice as noise until now... Well, she says it's fine now, so I guess it's okay.
M6010_S0090_G0430_300_op=She's a good kid at heart, so I'll just have to be patient with her.
M6010_S0090_G0440_300_ys=In the end, Eve was defeated before I could deploy even once... I have mixed feelings about it.
