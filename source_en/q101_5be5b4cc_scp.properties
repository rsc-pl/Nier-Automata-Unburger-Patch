M5101_S0010_G0110_001_robomaster=...
M5101_S0010_G0120_001_robomaster=Now then, about my thanks...
M5101_S0010_G0130_001_a9s=Huh...? No, this wasn't really a lesson...
M5101_S0010_G0140_001_robomaster=Uuugh... To think ye would not grant a single wish to this old, decrepit master...
M5101_S0010_G0150_001_a9s=Don't suddenly play the old man card.
M5101_S0010_G0160_001_robomaster=Do the young androids of today have no compassion...?
M5101_S0010_G0170_001_a9s=Ugh, you're so annoying... Fine, fine!
M5101_S0010_G0180_001_robomaster='Memory Alloy' and a 'Broken Circuit'!
M5101_S0010_G0190_001_robomaster=I'm counting on ye, young'un!
