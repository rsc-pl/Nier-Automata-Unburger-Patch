M3030_S0020_G0000_001_pascal=Hmm...
M3030_S0020_G0010_001_pascal="Where the state ceases—there only begins the man who is not superfluous," is it...?
M3030_S0020_G0020_001_pascal=Hmm.
M3030_S0020_G0030_001_pascal=This human Nietzsche's thoughts are quite profound.
M3030_S0020_G0040_001_pascal=So profound that, to me, he still seems like little more than an eccentric...
M3030_S0020_G0050_001_pascal=Well then...
M3030_S0020_G0060_001_pascal=I suppose I need to see this world for myself, not only through books...
M3030_S0020_G0070_001_child=Hey, hey! Uncle Pascal! Play with uuuus!
M3030_S0020_G0080_001_children=Play with uuuus!
M3030_S0020_G0090_001_pascal=Oh my, oh my. Your speech has improved so much.
M3030_S0020_G0100_001_pascal=But you aren't finished with your studies yet, are you?
M3030_S0020_G0110_001_pascal=We promised you would read the plant encyclopedia today and learn it, didn't we?
M3030_S0020_G0120_001_child=So, when we're done studying, you'll play with uuus?
M3030_S0020_G0130_001_children=Will you play with uuuus?
M3030_S0020_G0140_001_pascal=Of course I will.
M3030_S0020_G0150_001_pascal=Uncle Pascal doesn't tell lies, you know.
M3030_S0020_G0160_001_pascal=Children who tell lies turn into bad Machine Lifeforms, you know?
M3030_S0020_G0170_001_child=Eek!
