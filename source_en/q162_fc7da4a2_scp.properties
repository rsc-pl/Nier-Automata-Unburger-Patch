M5162_S0000_G0000_300_op60=I am counting on you to investigate the interrupted Access Point signal.
M5162_S0010_G0000_001_op60=This is Operator 6O. Can you hear me, 2B-san?
M5162_S0010_G0010_001_a2b=This is 2B. Receiving.
M5162_S0010_G0020_001_op60=The monitoring signal from an activated Access Point has been interrupted.
M5162_S0010_G0030_001_op60=I am transferring its location data now. Please investigate the cause.
M5162_S0010_G0040_001_a2b=Roger.
M5162_S0010_G0050_001_a9s=There are Machine Lifeforms here...
M5162_S0010_G0060_001_pod042=Confirmed: jamming radio waves are being emitted by certain enemy units.
M5162_S0010_G0070_001_a2b=Jamming?
M5162_S0010_G0080_001_a9s=...That's not good.
M5162_S0010_G0090_001_pod042=Confirmed: hostile Machine Lifeforms eliminated and Access Point restored.
M5162_S0010_G0100_001_cmd=From the Bunker to 2B.
M5162_S0010_G0110_001_cmd=I've just confirmed the recovery of the Access Point. Good work.
M5162_S0010_G0120_001_a2b=Commander, I have a report regarding that.
M5162_S0010_G0130_001_cmd=What is it?
M5162_S0010_G0140_001_a2b=The Access Point malfunction was caused by a Machine Lifeform emitting jamming radio waves.
M5162_S0010_G0150_001_cmd=...You mean they understand those facilities are our communication terminals?
M5162_S0010_G0160_001_a9s=That's not all. They understood it was a communications terminal, but they didn't destroy the Access Point.
M5162_S0010_G0170_001_a9s=They were probably... setting a trap.
M5162_S0010_G0180_001_cmd=Their intelligence has developed that far...? Those machines...
M5162_S0010_G0190_001_cmd=I will share this matter with the Council of Humanity on the Moon.
M5162_S0010_G0200_001_a2b=Roger.
