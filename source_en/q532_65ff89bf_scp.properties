M5530_S0010_G0000_001_resiitem=Hey, you. I know this is sudden, but are you interested in food culture?
M5530_S0010_G0010_001_resiitem=I'm currently researching food supplies for when humanity reclaims the Earth.
M5530_S0010_G0020_001_resiitem=When it comes to the basics of life, food comes first, right?
M5530_S0010_G0030_001_resiitem=So I'm gathering all sorts of food from around the world for my research. How about lending me a hand?
M5530_S0010_G0040_001_sele=Cooperate.
M5530_S0010_G0050_001_sele=Refuse.
M5530_S0010_G0060_001_resiitem=Ah, really? Well, let me know if you change your mind.
M5530_S0010_G0070_001_resiitem=Hey, would you mind gathering food from around the world? It's research we'll need once humanity reclaims the Earth.
M5530_S0010_G0080_001_resiitem=Thanks a lot! Right now, I'm researching "eating meat." I need you to bring me "Deer Meat" and "Boar Meat."
M5530_S0010_G0090_001_resiitem=Let me know when you've gathered the "Deer Meat" and "Boar Meat" I asked for. I'm counting on you.
M5530_S0020_G0000_001_pod042=Query: Androids can generate energy from water. Animal meat is also unnecessary for the Resistance.
M5530_S0020_G0010_001_a2b=Who knows... I don't really understand it.
M5530_S0020_G0020_001_pod153=Query: Androids can generate energy from water. Animal meat is unnecessary for the Resistance.
M5530_S0020_G0022_001_a9s=Who knows... maybe it's a matter of mood? Like, maybe they just feel like eating it sometimes.
M5530_S0020_G0024_001_a9s=Who knows... maybe it's a matter of mood? Like, maybe they just feel like eating it sometimes.
M5530_S0020_G0030_001_pod153=Incomprehensible.
M5530_S0020_G0040_001_a9s=Figured as much.
M5530_S0020_G0045_001_a9s=Figured as much.
M5530_S0020_G0050_001_pod042=Query: Androids can generate energy from water. Animal meat is also unnecessary for the Resistance.
M5530_S0020_G0060_001_a2=Who knows. Maybe it's surprisingly fun once you try it.
M5530_S0020_G0070_001_a2b=We have the "Deer Meat" and "Boar Meat." Let's return to the client.
