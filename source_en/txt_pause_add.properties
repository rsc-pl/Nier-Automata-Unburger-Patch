PAUSE_ARCHIVE_170_010=June 4\nI haven't been home in days.\nMy pay was cut again. I can't do this anymore.\n\nJune 12\nThey decided to increase the quota at the morning meeting.\nExplosions happen because we're mass-producing important weapons so carelessly.\n\nSeptember 22\nThere was another runaway accident at the underground test site. This time it was a P-22 model, apparently.\nA friend of mine died.\nI wonder when the war with the Legion will end.
PAUSE_ARCHIVE_170_020=August Set Menu\n\nMonday: Croquette Teishoku\nTuesday: Fried Potato Teishoku\nWednesday: Meat-less Nikujaga Teishoku\nThursday: Buttered Potato Teishoku\nFriday: Potato Curry\nSaturday: Potato Salad Teishoku\nSunday: Potato Gratin\n\n*Eat everything. Workers who leave food will have their quota increased by 30%.
PAUSE_ARCHIVE_170_030=August 17, Daily Nagoya\n\n[Editorial]\nThe influx of refugees from the Kanto capital region to the Chubu region shows no sign of stopping. The camps are already overflowing, and measures are needed as soon as possible, but the government is semi-functional amidst the intensifying war against the Legion. There seems to be business that extorts exorbitant profits from refugees, but it is precisely at times like these that the people must think of their neighbors. For tomorrow, we too may become refugees.
