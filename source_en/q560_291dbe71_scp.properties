M5560_S0010_G0000_001_dbl=Oh, right. Think you could help us out with some work?
M5560_S0010_G0010_001_ppl=Wait, Devola...
M5560_S0010_G0020_001_dbl=What choice do we have? Ever since that damn huge "Tower" appeared, we've been short on both materials and manpower.
M5560_S0010_G0030_001_dbl=If we stay buried in odd jobs like this, we won't even be able to repair the Resistance members properly.
M5560_S0010_G0040_001_ppl=That's true, but...
M5560_S0010_G0050_001_dbl=So there you have it. Please! Help us out with the work.
M5560_S0010_G0060_001_sele=Help.
M5560_S0010_G0070_001_sele=Refuse.
M5560_S0010_G0080_001_dbl=Tch. Stingy.
M5560_S0010_G0090_001_ppl=Devola... I'm sorry for asking the impossible. If you feel up to it later, please let us know.
M5560_S0010_G0100_001_dbl=So, feel like helping us out with our work now?
M5560_S0010_G0110_001_dbl=You're a lifesaver! Alright, we need "Stripped Screws," "Small Gears," and "Machine Oil."
M5560_S0010_G0111_001_dbl=You should be able to get "Stripped Screws" from piled-up Machine Lifeform wreckage.
M5560_S0010_G0112_001_dbl=I think "Small Gears" come from small, short-legged Machine Lifeforms.
M5560_S0010_G0113_001_ppl=I believe "Machine Oil" can be found near the scrapped truck in the Abandoned Factory.
M5560_S0010_G0120_001_ppl=Please don't push yourself.
M5560_S0010_G0130_001_dbl=By the way, how are those requested items coming along?
M5560_S0010_G0140_001_ppl="Stripped Screws," "Small Gears," and "Machine Oil" would really help us.
M5560_S0010_G0150_001_a9s=We've got all the materials Devola and Popola asked for...
M5560_S0010_G0160_001_a2=Got the materials the red-haired twins asked for... Guess I'll go hand them over.
M5560_S0030_G0000_001_dbl=That's everything! Thanks, you really helped us out.
M5560_S0030_G0010_001_ppl=Alright, Devola. Let's get to work right away.
M5560_S0030_G0020_001_a9s=...What are you using those materials for, anyway?
M5560_S0030_G0030_001_a2=What are you two making?
M5560_S0030_G0040_001_dbl=Can't you tell? Daily supplies for the camp.
M5560_S0030_G0050_001_ppl=Our work is mostly odd jobs...
M5560_S0030_G0060_001_a9s=Odd jobs...? With technical skills like yours?
M5560_S0030_G0070_001_a2=Odd jobs? Even with technical skills like yours?
M5560_S0030_G0080_001_ppl=...It's fine. This is our job.
M5560_S0030_G0090_001_dbl=That's right. We should be grateful just to have work.
M5560_S0030_G0100_001_dbl=Here's a reward. Take it.
M5560_S0030_G0110_001_a9s=No way. I can't accept this.
M5560_S0030_G0120_001_a2=I didn't do enough work to earn this much.
M5560_S0030_G0130_001_dbl=It's fine. It's not like we have any use for it anyway.
M5560_S0030_G0140_001_ppl=Please, take it.
M5560_S0030_G0150_001_dbl=Hope you'll help us out again.
M6090_S0020_G0780_300_dbl=Yo, see anything you like?
