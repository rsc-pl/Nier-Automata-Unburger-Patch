M5031_S0020_G0100_300_a2b=This isn't the time to be repairing this thing.
M5031_S0030_G0195_001_a9s=To connect its memory regions, I would like to get four "Pristine Screws" and a "Large Gear."
M5031_S0030_G0201_001_a2b=This robot...
M5031_S0030_G0202_001_a9s=Ah, a broken robot. Looks like we could repair it with a little work.
M5031_S0030_G0205_001_a2b=Understood.
M5032_S0010_G0000_001_a2b=Did you learn anything from the factory data?
M5032_S0010_G0000_300_a2b=Assuming we get the "Pristine Screws" from Large Bipeds, what about the "Large Gear"?
M5032_S0010_G0010_001_a9s=No. We only learned about their manufacturing process...
M5032_S0010_G0010_300_a9s=When in doubt, we ask Operator-san.
M5032_S0010_G0020_001_a2b=There's still so much we don't know about the Machine Lifeforms.
M5032_S0010_G0020_300_a9s=Operator-san, we are looking for a "Large Gear." Could you tell us where we might be able to get one?
M5032_S0010_G0030_001_a2b=We need to gather whatever information we can.
M5032_S0010_G0030_300_op210=What are you doing this time? ...Well, never mind. There are records of "Large Gears" being obtained from Small Machine Lifeforms.
M5032_S0010_G0040_300_op210=However, they tend to be badly damaged when the unit is destroyed, so usable ones are rarely recovered.
M5032_S0010_G0050_001_a9s=With this, we have all the parts needed to repair that Large-Scale Weapon.
M5032_S0010_G0050_300_a9s=I see... Thank you for the information.
M5032_S0010_G0055_001_telo=53 minutes later...
M5032_S0010_G0060_300_a2b=So for now, we just have to keep destroying Small Machine Lifeforms?
M5032_S0010_G0070_300_a9s=...You really are rough about these things, 2B.
M5032_S0010_G0080_300_a2b=...We're not having much luck gathering materials.
M5032_S0010_G0090_300_a9s=They were all too damaged to be of any use.
M5032_S0010_G0100_300_a2b=Can't we use them even if they're a little broken...?
M5032_S0010_G0110_300_a9s=Please don't be unreasonable.
M5032_S0020_G0000_001_a9s=With this... all right...
M5032_S0020_G0010_001_eng=My name is "Engels." Manufacturing number: 110-B.
M5032_S0020_G0020_001_a9s=Whoa!
M5032_S0020_G0030_001_eng=Manufactured in February 11934, Human Era.
M5032_S0020_G0040_001_eng=First sortie in August of the same year.
M5032_S0020_G0050_001_eng=Confirmation of current situation required.
M5032_S0020_G0060_001_a9s=You startled me, talking all of a sudden...
M5032_S0020_G0070_001_eng=Confirmation of current situation required.
M5032_S0020_G0080_001_a9s=...You were defeated by us androids, and you are currently unable to move.
M5032_S0020_G0090_001_a9s=Hand over any classified information you have. Quietly.
M5032_S0020_G0100_001_eng=Understood.
M5032_S0020_G0110_001_a9s=You're giving it up awfully easily...
M5032_S0020_G0120_001_eng=This unit has already completed its mission and currently has no commander.
M5032_S0020_G0130_001_eng=This unit has also received no orders to protect classified information.
M5032_S0020_G0140_001_eng=However, as a combat weapon, this unit does not possess much information.
M5032_S0020_G0150_001_eng=Do not expect much.
M5032_S0020_G0160_001_a9s=I see...
M5032_S0020_G0170_001_eng=Thank you for helping me.
M5032_S0020_G0180_001_a2b=We did not exactly help you...
M5032_S0020_G0190_001_eng=If you would, please drop by again.
M5032_S0020_G0200_001_a2b=Why?
M5032_S0020_G0210_001_eng=Because I am bored.
M5032_S0020_G0220_001_a9s=Bored...
M5032_S0020_G0230_001_a9s=That was a strange robot...
