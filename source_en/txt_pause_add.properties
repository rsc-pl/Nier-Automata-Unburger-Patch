PAUSE_ARCHIVE_170_100=High School Student\n\nThe first DVD of the currently popular beautiful girl Kikyo-chan. It's a service-packed content where you can enjoy various cosplays, from blazers and sailor uniforms to school swimsuits and female teacher styles. A must-buy this summer!\n\nStarring: Kikyo (with cheki photo)\nPrice: 3800 yen (tax excluded)
PAUSE_ARCHIVE_170_105=[Tokyo Department Store Closing Sale]\nOur store has been open for 25 years. We have been grateful for your patronage, but we will be closing at the end of March. We sincerely thank you for your long years of patronage.\n\nTherefore, we will be holding a closing commemorative sale for one month from March 1, called the "All Items Sell-Off Sale." Also, during this period, we will be open one hour earlier than usual, from 9 am.\n\nWe look forward to your visit.\n\n*If you bring this flyer, you will receive a free tissue.
PAUSE_ARCHIVE_170_110=Comrades,\n\nI have good news. We have successfully obtained 12 kg of highly concentrated plutonium from the enemy's research institute. I made an analysis app to calculate criticality, and it's enough to make about 3 nuclear bombs. We have also generally secured the other necessary materials.\n\nWith this, we can make them open their eyes to the truth.\nHowever, manufacturing is not easy, and if I were to be killed, this technology would be lost.\n\nTherefore, I have recorded a manual for manufacturing the bombs on this ROM and am passing it on to you, comrades. With this, anyone with some knowledge can make them.\n\nThis is not revenge.\nIt is divine punishment.\n\nMay God's protection be with you.
PAUSE_ARCHIVE_170_112=Rule 0011034\n"The height of one's rank and the height of one's residence must be aligned."\n\nThis world is protected by an order centered on "rules." Those of high status and the elderly should be respected, and it should be considered a matter of common courtesy not to live in a higher position than them.
PAUSE_ARCHIVE_170_114=Rule 0090309\n"Parents must not buy the ingredients for a birthday meal."\n\nWe of the Masked People have a tradition of cherishing our children. However, as parents continued to buy large quantities of ingredients for their children's birthday parties, resulting in waste, the king lamented this waste, and this rule was created.
PAUSE_ARCHIVE_170_116=Rule 0000432\n"A lizard in a pot must always be caught."\n\nLong ago, an old man was startled by a lizard in a pot and threw out his back. The man had a young wife, and she rushed out of the house to go to the doctor. But the wife never came back. The surrounding villagers rumored that the wife had run away, but the man did not accept it and strongly insisted on catching the lizard.
PAUSE_ARCHIVE_170_118=Rule 0000106\n"One must not live on the plains."\n\nThis rule is due to a sad history. Originally, we of the Masked People were a tribe that lived on the plains by the sea. However, the village was destroyed by a huge tsunami. This rule is an important one left by our ancestors who learned from that disaster, and building on the plains within the village is strictly forbidden.
PAUSE_ARCHIVE_170_120=March 12, 2014\n\n[Summary]\nThe spread of the "White Chlorination Syndrome," which began with the appearance of the "Giant" and "Dragon" in 2003, knows no bounds, and its outbreak is now confirmed on a global scale. Despite research by various countries, not only has a vaccine for prevention not been developed, but the infection route has not even been discovered.\n\nAt the same time, however, various technological breakthroughs have been made through research into the newly discovered particle "maso." We have confirmed that the "soul and body separation and storage technology" using this maso is the last resort against this unprecedented human crisis.\n\nAs this project has moved from the preparation stage to the full-scale adoption step, its name has been decided as "Project Gestalt."\n\nThat is all.
PAUSE_ARCHIVE_170_130=April 4, 2015\n\n[Summary]\nProtest movements against the "Soul Preservation Method" provided with the disclosure of Project Gestalt Level 1 have occurred in various places, and the number of ordinary people who have actually undergone the Gestalt process is limited to four.\nAlso, the research team has once again submitted a formal complaint to this committee regarding the collection of biased data from the Gestalt process being performed on the sick and elderly.\n\nIt has been decided to establish a public relations department to manipulate information to improve our image and to consider rescheduling the project itself.
PAUSE_ARCHIVE_170_140=August 23, 2025\n\n[Summary]\nA report from the research institute stated that the basic technology for the "Replicant System" is expected to be completed by the end of August. From September to the end of November, safety checks will be conducted in parallel with clinical trials.\n\nThe completion of the Replicant System will be reported to the Prime Minister's Office as significant progress in Project Gestalt. The public relations department will be in charge of this task.\n\nThat is all.
PAUSE_ARCHIVE_170_150=September 24, 2026\n\n[Summary]\nA report on the runaway new weapon accident that occurred at the National Arms Research Institute in June has been submitted to the Prime Minister's Office.\nAlthough the research institute's budget and personnel are expected to be significantly reduced, it has been decided that Project Gestalt will accept some personnel for maso research.\n\nRecords of human experiments with maso will be shared separately with relevant parties as Level 6 confidential information.\n\nThat is all.
PAUSE_ARCHIVE_170_160=May 5, 2033\n\n[Summary]\nThrough the application of maso technology related to multiple worlds, the "Grimoire Noir" and 13 activation systems including "Grimoire Noir" have been completed. It has also been technically confirmed that after eradicating the White Chlorination Syndrome from the world, these systems can be used to return Gestalt bodies to Replicant bodies.\n\nThe series of tasks including this system will be handed over to the "Grimoire Noir Project" working group.\n\nThat is all.
PAUSE_ARCHIVE_170_170=April 1, 2044\n\n[Summary]\nToday's committee meeting is canceled because more than half of the members are absent.\nThe contact network for emergency absences will be confirmed at a later date.\n\nThat is all.
PAUSE_ARCHIVE_170_180=January 3, 2045\n\n[Summary]\nTo investigate the cause of the recent massive Legion outbreak in the Tokyo area, a large-scale investigation and invasion operation by the United Nations forces has been decided. The progress of Project Gestalt will also be shared in conjunction with this, but it is re-notified that all information to be sent abroad must be verified by this committee.\n\nIn particular, information about the "relapsed body (tentative name)" must be strictly stored.\n\nThat is all.
PAUSE_ARCHIVE_170_190=September 15, 2053\n\n[Summary]\nAs "Project Gestalt" gains approval from various countries, shortcomings in information control for the general public have become apparent. Until the final safety of the system is confirmed, all information on this matter will be disclosed up to Level 4, and its connection to the life reconstruction program centered on the Ministry of Health and Welfare must be kept secret. Also, the following points are requested to be promptly notified to the relevant parties.\n\n\u30fbAdd a compensation clause regarding information leakage to contracts with each company.\n\u30fbIn the unlikely event that information is leaked, the source of the leak must be identified.\n\u30fbThe handling of leaked information and related parties should refer to the section on "Countermeasure C."\n\nThat is all.
PAUSE_ARCHIVE_170_200=September 27, 2054\n\n[Summary]\nThe discovery and development of the original Gestalt has greatly contributed to the stabilization of Project Gestalt.\nThe Hamelin organization will be in charge of the long-term management of the original Gestalt.\nWith the above management, the authority for the freezing plan of the relapsed "Yonah" will also be transferred to the Hamelin organization.\n\nThat is all.
PAUSE_ARCHIVE_170_210=April 18, 2764\n\n[Summary]\nThere are reports from multiple management areas that "Replicant bodies have been confirmed to be acting as if they have gained a sense of self."\nThe impact of this situation on Project Gestalt as a whole is currently under investigation. Other shared matters have been reported by the administrator's union, so they will be omitted.\n\nThat is all.
PAUSE_ARCHIVE_170_220=December 31, 3361\n\n[Summary]\nWith the collapse of the original Gestalt, the collapse of the preserved Gestalt bodies has begun to accelerate. The recording of bodies and collection of DNA is underway, but progress is not good.\n\nNew countermeasures and their development to replace Project Gestalt are scheduled to be transferred to the "Next Generation Preservation Plan Preparation Committee." This record will be the final record of Project Gestalt and the committee. For the progress on the development of new android models and the improvement of conventional models, please refer to the attached document.\nAlso, it has been approved that the disposal of the administrator models "Devola" and "Popola" will be considered at a later date.\n\nThat is all.
PAUSE_ARCHIVE_180_010=Summary\nAfter the collapse of the "Tower," the machine lifeform network disintegrated, but various recording media collected from the wreckage have confirmed a large amount of unknown information about machine lifeforms and aliens. This analysis summarizes the investigation and speculation about the machine lifeform network and the codename N2, commonly known as the "Red Girls," who were thought to have been commanding the whole thing.\n\n\u30fbThe machine lifeforms were weapons created by the aliens, but their principle of action was supported by the part of "defeating the enemy." However, the system of excessive growth and evolution destroyed their creators, the aliens.\n\n\u30fbAt this point, the machine lifeforms recognized that "an enemy is necessary" to "defeat the enemy," and to maintain that purpose, they reached the contradictory conclusion that they must not destroy their current enemy, the androids.\n\n\u30fbTo resolve the two contradictions of "defeating the enemy" and "not defeating the enemy," the machine lifeforms intentionally created a deficit in their network and diversified the vectors of evolution for each machine lifeform. This is the cause of the recent observation of special individuals called "Pascal" and the "Forest King."\n\n\u30fbOn the other hand, the deficient network repeated self-repair while incorporating surrounding information, and eventually became fixed in a new network form. In the final stage of that growth process, traces were discovered that it had incorporated the memory information of a person preserved in an old quantum server as its core. The server was related to the discarded "Project Gestalt," and the person in question seems to have been someone involved in its core, but their name and other details are not recorded.\n\n\u30fbThe network that obtained human information newly changed into a structure that should be called a meta-network (in the words of the machine lifeforms, "conceptual information"), and it has been revealed that this led to the formation of an ego as "N2."\n\n...So, we've been fighting a network of machine lifeforms with the ghost of humanity at its core for hundreds of years. For the sake of a non-existent Council of Humanity on the moon, in a crappy world where it's only decided that we'll fight forever without being destroyed.\n\nI don't know what the meaning of this is, but I swear I'll eventually kill all the machine lifeforms that have undergone a stupid evolution, and all the bastards who thought up Project YoRHa.\n\nWipe your asses and wait for me.\n\nInformation Analysis Officer, Jackass
PAUSE_QUEST_HELP_Q140/RUN_3=Investigate the point at the coordinates written on the wall of the material storage area.
PAUSE_QUEST_HELP_Q532/RUN_1=The forest tool shop owner, who is researching human food culture, asks for your help in gathering ingredients. Obtain the following items.
PAUSE_QUEST_HELP_Q410/RUN_1=You were approached by 16D at the Bunker.\nHer senpai, 11B, was killed in action at the abandoned factory, but her body has not been recovered.\nShe asks you to give her any of 11B's belongings if you find them.\nObtain information related to 11B at the abandoned factory.
PAUSE_QUEST_HELP_Q410/CLR=You found 11B's body.\nDeliver 11B's belongings to 16D.
PAUSE_QUEST_HELP_Q162/RUN_1=You received a message from Command that the signal from some access points has been lost.\nHead to the access point in the collapsed area of the city ruins and investigate the cause.
