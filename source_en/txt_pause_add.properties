PAUSE_QUEST_HELP_Q680/RUN_1=A clown you met in the city ruins wants to hold a parade as part of a peace activity to deepen friendship with androids. However, some machine lifeforms dislike peace activities, so he asks you to escort them so that the parade can be successful.\nEscort the machine lifeforms holding a parade in front of the Resistance camp.
