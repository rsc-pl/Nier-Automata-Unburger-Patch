M5070_S0010_G0000_001_a2b=What is this hut...?
M5070_S0010_G0010_001_n02=Don't bully those children!
M5070_S0010_G0020_001_n02=Get out of here! Get out!
M5070_S0010_G0030_001_a9s=Huh? Wait! What is going on!?
M5070_S0010_G0040_001_n02=Get ooout!
M5070_S0010_G0050_001_n02=Please! I beg you...
M5070_S0010_G0060_001_n02=Please, spare only the lives of these children...!
M5070_S0010_G0070_001_sele=Save them.
M5070_S0010_G0080_001_sele=Do not save them.
M5070_S0010_G0090_001_n02=No... no...
M5070_S0010_G0110_001_a2b=I do not kill animals for fun.
M5070_S0010_G0120_001_n02=Oh... thank goodness...
M5070_S0010_G0130_001_a9s=...Why are you gathering animals here?
M5070_S0010_G0140_001_n02=I do not remember the reason anymore, but...
M5070_S0010_G0150_001_n02=A long time ago, I saved an injured animal.
M5070_S0010_G0160_001_n02=That little one grew attached to me.
M5070_S0010_G0170_001_n02=Wherever I went, it was always with me, and whenever it had time, it would come play with me.
M5070_S0010_G0180_001_n02=That made me so happy... It felt warm.
M5070_S0010_G0190_001_a2b=Warm...?
M5070_S0010_G0200_001_n02=Since then, I bring injured or weakened little ones here
M5070_S0010_G0210_001_n02=and care for them until they are healthy again.
M5070_S0010_G0220_001_n02=Thank you... for saving them.
M5070_S0010_G0230_001_n02=Come visit again sometime, if you want.
M5070_S0010_G0240_001_n02=I think everyone will welcome you.
M5070_S0010_G0250_001_a2b=...If I feel like it.
