M5180_S0000_G0000_300_op210=I have requested an information survey at the large housing complex in the desert.
M5181_S0010_G0000_001_op210=From Operator 21O to 9S. Can you hear me?
M5181_S0010_G0010_001_a9s=Yees, I hear you~
M5181_S0010_G0020_001_op210=I have sent you a new information-gathering request. Please confirm it.
M5181_S0010_G0030_001_op210=Over.
M5181_S0010_G0040_001_a9s=Ah, wait a sec—
M5181_S0010_G0050_001_a9s=...She didn't even give me time to refuse.
M5181_S0010_G0060_001_a9s=I wonder why people used to live in such huge groups.
M5181_S0010_G0070_001_pod153=Because urban areas lacked land.
M5181_S0010_G0080_001_a9s=Lack of land, huh... That's strange.
M5181_S0010_G0090_001_a9s=The Earth is so big, though.
M5181_S0020_G0080_001_a9s=Is this... a toy? So this is one of the traces of human life the Operator mentioned.
M5181_S0020_G0090_001_a9s=What is this...? It says "Household Account Book"... I wonder if the Operator wants this kind of thing, too.
M5181_S0020_G0100_001_a9s=A shoe... It's small, so maybe it belonged to a child. This counts as another trace of humanity, right?
M5181_S0030_G0000_001_a9s=All right. This should be enough.
M5181_S0030_G0010_001_a9s="Broken Toy," "Dirty Household Account Book," "Small Shoe"...
M5181_S0030_G0020_001_a9s=Pod, photograph these and transmit them to the Operator.
M5181_S0030_G0030_001_pod153=Roger.
M5181_S0030_G0040_001_op210=This is Operator 21O. 9S, can you hear me?
M5181_S0030_G0050_001_a9s=Hellooo, Operator-san~ I hear you~
M5181_S0030_G0060_001_op210=Download of the transmitted data complete.
M5181_S0030_G0070_001_a9s=Great. Does it look useful?
M5181_S0030_G0080_001_op210=Whether information is useful depends on the person handling it.
M5181_S0030_G0090_001_a9s=I see.
M5181_S0030_G0100_001_op210=However, this is interesting...
M5181_S0030_G0110_001_op210=I knew humans lived collectively in ancient times,
M5181_S0030_G0120_001_op210=but I hadn't realized their ways of living were this diverse.
M5181_S0030_G0130_001_op210=According to the records, a way of life centered on family units had been established.
M5181_S0030_G0140_001_a9s=Family?
M5181_S0030_G0150_001_op210=A group of a certain number of people connected by various social institutions.
M5181_S0030_G0160_001_op210=If we androids had a system like family...
M5181_S0030_G0170_001_op210=...
M5181_S0030_G0180_001_a9s=Operator-san?
M5181_S0030_G0190_001_op210=It's nothing. I said too much.
M5181_S0030_G0200_001_op210=Returning to duties.
M5181_S0030_G0210_001_a9s=...She hung up.
M5181_S0030_G0220_001_op210=There is a supplement to my earlier transmission.
M5181_S0030_G0230_001_op210=I have emailed you a special reward. Please confirm it.
M5181_S0030_G0240_001_op210=...Thank you for your continued information gathering.
M5181_S0030_G0250_001_a9s=...She hung up again.
M5181_S0030_G0260_001_a9s=But hey, if she's grateful, that means it helped, right?
M5181_S0030_G0270_001_pod153=Question intent unclear.
