PAUSE_QUEST_HELP_Q470/RUN_1=In the flooded city, there was a Resistance unit member who was investigating the wildlife.\nThis Resistance member said that he was conducting an ecosystem survey in preparation for when humanity returns.\nTo conduct the biological survey, find a pure white animal.
PAUSE_QUEST_HELP_Q470/RUN_2=You brought a mutated pure white animal, but it seems there are still not enough individuals needed for the survey.\nFind a different species of mutated individual.
PAUSE_QUEST_HELP_Q470/DONE=When you brought the mutated individual, the Resistance member was happy that the ecosystem survey had progressed a lot thanks to you.\nAnd when he compared it with past data, he said that the current environmental condition is much better than when humanity was prosperous. However, he said that when he thinks about how this environment will surely worsen again if humanity returns to the surface, he has complicated feelings about what is truly best for the Earth.
PAUSE_ENEMY_006b=A large, human-like machine lifeform. It is a swarm of small machine lifeforms, and it moves its giant body using their massive energy.
PAUSE_QUEST_HELP_Q410_END_1=When you told 16D about 11B's escape plan, 16D berated 11B for having been so strict with her until now,\nand said that now she could happily concentrate on her work, speaking happily.
PAUSE_QUEST_HELP_Q410_END_2=You decided to keep 11B's escape plan a secret from 16D.\n16D confessed that she was actually dating 11B, and decided to switch to an attacker type to avenge 11B.
PAUSE_QUEST_HELP_Q020/RUN_1_US=The machine lifeform known as Sartre lives in Pascal's village and speaks in byzantine philosophical passages. Talking to him proved a frustrating\u2014and fruitless\u2014endeavor, so speak to his female admirers to learn more about him.
PAUSE_QUEST_HELP_Q020/RUN_2_US=You learned from a woman in Pascal's village that there are also Sartre fans in the amusement park ruins and the desert area.\nTalk to the two fans and deliver their gifts to Sartre.
PAUSE_QUEST_HELP_Q020/RUN_3_US=You gave Sartre the gifts from the women and urged him for a reply, but he said nothing.\nRelay Sartre's reply to the three fans.
PAUSE_QUEST_HELP_Q020/CLR_US=Despite being treated with contempt by Sartre, the women do not try to see his true nature.\nQuestion Sartre, who likewise makes no effort to know the women, about what meaning there is in their relationship.
PAUSE_QUEST_HELP_Q020/DONE_US=You visited Sartre's place, but he was gone, having left a letter behind.\nSartre was engrossed in philosophy to the very end and paid no mind to those who revered him.
PAUSE_ENEMY_2010_US=A fan of Sartre in Pascal's village. She has thick paint on her face. She described Sartre as a reliable person who knows everything. She seems to be a female-type machine lifeform, revealing that machine lifeforms also have genders.\n\nShe wrote a letter to Sartre, but was told that he had no obligation to reply. Hearing this, she was, for some reason, delighted.
PAUSE_ENEMY_2020_US=A fan of Sartre in the amusement park ruins. She wears elegant decorations.\nShe described Sartre as a mysterious and cool person. She considers the Sartre fan in the desert area to be her enemy.\n\nShe prepared a gift of beautiful glass for Sartre, but it was dismissed as mere glass. Hearing this, she was, for some reason, ecstatic.
PAUSE_ENEMY_2030_US=A fan of Sartre in the desert area. She wears a unique attire that seems to reflect her worldview.\nShe has a keen sense of smell, detecting that 2B and the others came from Pascal's village. She described Sartre as an inquisitive, passionate, and admirable person.\n\nShe gave 2B and the others a machine fossil, thinking Sartre would be interested, but Sartre showed no interest, calling it mere junk. Hearing this, she was, for some reason, excited.
PAUSE_QUEST_HELP_Q032/FIN=In his conversations with 9S and the others, Engels reflected on the sins he had committed. Eventually, Engels, having reached the end of his machine life, chose death for himself.
