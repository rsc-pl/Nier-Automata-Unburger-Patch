PAUSE_QUEST_HELP_Q560/RUN_1=Devola and Popola in the Resistance camp ask you to collect materials.\nObtain the following items from the machine lifeforms in the abandoned factory.\n'Worn Screw' from the stacked machine lifeforms.\n'Small Gear' from the small, short-legged machine lifeforms.\n'Machine Oil' from near the abandoned truck in the abandoned factory.
PAUSE_QUEST_HELP_Q561/RUN_1=Devola and Popola ask you to collect materials again.\nHead to the desert area and obtain the following items.
PAUSE_QUEST_HELP_Q561/FIN=You pressed Anemone for a reason, but she just dodged the question.
PAUSE_MAIL_BODY_003=Regarding the matter I contacted you about via laser communication, the access point in the center of the city ruins is malfunctioning, and functions such as data upload and body transfer cannot be used. According to the analysis team, it could be a faulty transfer terminal or interference from nearby enemies.\nPlease go to the site and check the situation.\n\nOperator 6O
PAUSE_MAIL_BODY_004=2B-san,\n\nThank you for your hard work repairing the access point~\nI'm sorry for always asking for impossible things...\nI've attached a special reward for you!\n\nOperator 6O
PAUSE_MAIL_BODY_005=2B-san,\n\nThank you for the image of the desert rose!\nThere are such mysterious things on the surface, aren't there... I'd like to go down to the surface and see them myself someday.\nAh, it's nothing much, but I've attached a small thank you. Well then!\n\nOperator 6O
PAUSE_MAIL_BODY_006=*This is a direct order from the Commander. Forwarding is prohibited.\n\nThis mission is the capture of fugitive YoRHa units.\nIt has been confirmed that these YoRHa units have deserted their mission and have committed illegal acts, such as plundering supplies from the Resistance camp.\nYou are ordered to capture them immediately.\n\nOperator 6O
PAUSE_MAIL_BODY_014=This is a routine check-in for YoRHa unit members.\nIf there is a problem, please reply. Even if there is no problem, you may reply.\nAny small piece of information could be useful for the operation.\nOf course, it might not be useful either.\nThat is all.
PAUSE_MAIL_BODY_015=The search order for the YoRHa unit member in possession of the confidential information chip, which was issued the other day, is hereby lifted as of today, as the said YoRHa unit member has been found.\nThe said unit member was already dead, having been attacked by machine lifeforms. However, the search team has successfully recovered the confidential information chip. As there was another Resistance member's corpse nearby, we are currently investigating the connection.\nThat is all.\n\nCommander
PAUSE_MAIL_BODY_016=To all androids.\nSeveral thousand years have passed since we humans were driven to the moon.\nThe war is in a stalemate, but we understand that it is thanks to the struggles of you androids on the surface that we can even maintain this situation.\nPlease continue to strive diligently to retake the Earth.\nGlory to Mankind.\n\nLeague of Assemblymen, Council of Humanity
PAUSE_MAIL_BODY_017=To all androids.\nWe have received reports that in recent years, the number of special individuals among the machine lifeforms has been increasing. There is also information that some enemies have proposed peace. But do not be deceived. It is the mission of you android soldiers to crush all enemies. Fight on without hesitation.\nGlory to Mankind.\n\nLeague of Assemblymen, Council of Humanity
PAUSE_MAIL_BODY_018=To all androids.\nThe destruction of the enemy machine lifeform central network units, Adam and Eve, has been reported. Now that the enemy is weakened is our chance. With the large-scale invasion of our Army of Humanity, we will drive out the invaders and reclaim our beautiful Earth.\nGlory to Mankind.\n\nLeague of Assemblymen, Council of Humanity
PAUSE_MAIL_BODY_019=To all androids.\nAs you may have already been notified, we suffered a painful defeat in the recent large-scale invasion. The annihilation of our comrades, the YoRHa forces, is particularly regrettable. However, from a broader perspective, the fact that our Army of Humanity is gaining the upper hand remains unchanged. For the sake of those who fell, we will win this war.\nGlory to Mankind.\n\nLeague of Assemblymen, Council of Humanity
PAUSE_MAIL_BODY_020=To all androids.\nSeveral thousand years have passed since we humans were driven to the moon.\nThe war is in a stalemate, but we understand that it is thanks to the struggles of you androids on the surface that we can even maintain this situation.\nPlease continue to strive diligently to retake the Earth.\nGlory to Mankind.\n\nLeague of Assemblymen, Council of Humanity
PAUSE_MAIL_BODY_021=Hello~\nI'm kind of bored, so why don't you come visit my shop?\nI've got some good stuff... maybe.\n\nEmil
PAUSE_MAIL_BODY_022=Hello~ Thank you for your continued patronage!\n\nBy the way, do you fish?\nI used to eat anything to survive, so I'm surprisingly knowledgeable about fishing... so today, I'm emailing you some valuable information.\n\nYou can fish in various places, but basically, freshwater fish are in rivers, and saltwater fish are in the sea. You can also catch starfish and horseshoe crabs in shallow water. On the other hand, if you're aiming for big game, it's best to aim for deeper places!\n\nThe pond with oil gushing out in the desert is all machine fish. Also, the pipes buried in various places are basically mostly garbage... but if you don't give up and try, you might catch something good, right?\n\nAlso, for rare fish, there's an underground lake near my house, and there are quite a few rare fish there... huh? Where is my house? It's a quick dash and a zip from the city ruins. Well then!\n\nEmil
PAUSE_MAIL_BODY_023=Hey.\nThis is sudden, but there's a fish I want to recommend to YoRHa units, or rather, I want you to eat it. I want to see what effect the oil of that fish has on YoRHa units... or rather, I want to experiment.\nCome by when you have time. It's my treat.\n\nJackass
PAUSE_MAIL_BODY_024=It's been a while.\nIt seems that the tool shop in our village has new items in stock. I thought that the members of the YoRHa forces might not know, so I am contacting you just in case... In this way, I would be more than happy if you would remember that even machine lifeforms have individuals with a kind heart to share valuable information.\n\nPascal.
PAUSE_MAIL_BODY_025=Thank you for your continued patronage.\nWe have new plug-in chips in stock today. We have a selection of excellent items that we would especially like the members of the YoRHa forces to try. In gratitude for your long years of patronage, we are offering them at a special price. We hope you will all come to our store.\n\nResistance Camp, Tool Shop Owner
PAUSE_MAIL_BODY_026=To all.\nThe Bunker main server's capacity is becoming strained.\nPlease organize your user folders, delete old data, and free up space. Also, it seems that some unit members are saving files that are not necessary for their missions, such as long entertainment videos and music files. Please download such data to your local storage.\n\nFrom the Server Administrator.
PAUSE_MAIL_BODY_027=To all.\nBased on the combat data of the YoRHa unit members so far, we have prepared a hacking library. Hacks that you have experienced at least once can be re-experienced here.\n*Things you have not experienced are excluded for safety reasons.\nWe have prepared it in the Bunker's server room, so please feel free to play if you are interested.\n\nFrom the Server Administrator.
PAUSE_MAIL_BODY_028=There is one thing I forgot to tell you when you sortied.\nAccording to the analysis team, the equipment that was abandoned when you broke into the abandoned factory has been left unrecovered. I will mark the estimated recovery point, so please recover it when you go near there. That is all.\n\nCommander
PAUSE_MAIL_BODY_029=By destroying the codename "Adam," we have succeeded in dealing a major blow to the enemy network system. We have confirmed that this has disconnected a large number of machine lifeforms from the network. However, just because they have left the network does not mean that the machine lifeforms will disappear. The possibility that their actions will become a threat to us is still high.\n\nTherefore, 2B, I want you to gather information about the machine lifeforms. Check if there are any enemies acting suspiciously, and confirm their movements. That is all.\n\nCommander
PAUSE_MAIL_BODY_030=2B-san.\n\nThank you for repairing the transfer device the other day!\nI really want to fix it myself, but operator models are prohibited from descending to the surface... but I'm very interested in the surface. If I ever get permission, please tell me about various things on the surface!\n\nOperator 6O
