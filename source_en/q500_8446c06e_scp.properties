M5500_S0010_G0000_001_andwoman=...!
M5500_S0010_G0010_001_andman=Damn it! This is bad...!
M5500_S0010_G0020_001_a9s=H-Hold on, you two.
M5500_S0010_G0030_001_andwoman=Please, just let us go!
M5500_S0010_G0040_001_a9s=Um... I think you might have the wrong idea.
M5500_S0010_G0050_001_andman=...You're not here to capture us?
M5500_S0010_G0060_001_a9s=No, of course not!
M5500_S0010_G0070_001_a9s=What happened here?
M5500_S0010_G0080_001_andwoman=...We deserted from the Resistance Camp.
M5500_S0010_G0090_001_a9s=You deserted?!
M5500_S0010_G0100_001_andman=We're done with fighting! We just want to live quietly, the two of us!
M5500_S0010_G0110_001_andwoman=Please. Keep it a secret that we're here, okay?
M5500_S0010_G0120_001_a2b=We're YoRHa. A separate organization from the Resistance.
M5500_S0010_G0130_001_a2b=We have no obligation to report you.
M5500_S0010_G0140_001_andwoman=Oh, thank goodness...
M5500_S0010_G0150_001_a9s=But if you stay in a place like this, you'll be found eventually...
M5500_S0010_G0160_001_andman=I know. But my body won't move properly. We don't have maintenance parts...
M5500_S0010_G0170_001_andwoman=I know this is terribly forward of me, but... could you bring us the materials we need for maintenance?
M5500_S0010_G0180_001_a9s=Huh? You mean us?
M5500_S0010_G0190_001_andwoman=We can't afford to move around ourselves.
M5500_S0010_G0200_001_andwoman=We'll pay you well... Please!
M5500_S0010_G0210_001_sele=Cooperate.
M5500_S0010_G0220_001_sele=Do not cooperate.
M5500_S0010_G0230_001_andwoman=Oh, thank you. We need an "Elaborate Gadget" for maintenance.
M5500_S0010_G0240_001_andwoman=I saw one near the Abandoned Factory before.
M5500_S0010_G0250_001_andman=We're trusting you. Please help us.
M5500_S0010_G0260_001_andman=Resistance pursuers are sure to come here, too. We only want to live quietly together...
M5500_S0010_G0270_001_andwoman=Could you bring us the materials we need for maintenance? Once you do, we'll leave... Please!
M5500_S0020_G0000_001_andwoman=Ah, this is it! With this, we can perform the maintenance!
M5500_S0020_G0010_001_andman=Thank you. I'm glad we trusted you.
M5500_S0020_G0020_001_andman=Once the maintenance is done, we'll leave. Please pray for our safety.
M5500_S0020_G0030_001_n02=The androids who were here... have gone away, I see.
M5500_S0020_G0035_001_n02=I want to try going across the sea too...
M5500_S0020_G0040_001_n02=I hope they are safe somewhere... I wish happiness for the two of them.
M5500_S0020_G0050_001_andman=Do you remember us? You helped us before...
M5500_S0020_G0060_001_andman=You really saved us back then. Thank you.
M5500_S0020_G0070_001_andwoman=...Actually, could I ask you a favor?
M5500_S0020_G0080_001_andman=Idiot, stop! Don't drag them into this any further!
M5500_S0020_G0090_001_andwoman=But...
M5500_S0020_G0100_001_a9s=Is something wrong? Do you need repair materials again?
M5500_S0020_G0110_001_andman=No, it's just...
M5500_S0020_G0120_001_andwoman=What good is clinging to some strange pride? The fact is, we're in trouble.
M5500_S0020_G0130_001_andman=But still...
M5500_S0020_G0140_001_andwoman=Ugh, honestly. You're always like this. Just be quiet for a second.
M5500_S0020_G0150_001_andwoman=See... we're thinking of escaping to another area across the sea.
M5500_S0020_G0160_001_a9s=I see... But how?
M5500_S0020_G0170_001_andwoman=There is a black-market Resistance member who helps people escape. They call him the "Escape Artist."
M5500_S0020_G0180_001_andwoman=But it costs quite a bit of money...
M5500_S0020_G0190_001_andwoman=To be blunt, we need about 50,000 G. If you have that much, could you help us?
M5500_S0020_G0200_001_sele=Give 50,000 G.
M5500_S0020_G0210_001_sele=Do not give.
M5500_S0020_G0220_001_andwoman=R-Really?! Are you sure?! Thank you!
M5500_S0020_G0230_001_andman=I'm sorry. This is all because I'm so useless...
M5500_S0020_G0240_001_andman=Someday, I swear I'll pay you back.
M5500_S0020_G0250_001_andwoman=We need about 50,000 G to escape across the sea. If you have that much, could you help us?
M5500_S0020_G0251_001_andwoman=Oh, it looks like you don't have enough on hand right now.
M5500_S0020_G0252_001_andwoman=Will you come back once you have it ready?
M5500_S0020_G0260_001_andman=Ugh... ah...
M5500_S0020_G0270_001_a9s=Are you okay?! What happened here?!
M5500_S0020_G0280_001_andman=T-The Escape Artist... he attacked us out of nowhere...!
M5500_S0020_G0290_001_andman=He was planning to betray us from the start.
M5500_S0020_G0300_001_a9s=What happened to the other android?!
M5500_S0020_G0310_001_andman=Sh-She... acted as a decoy to protect me and drew them away...
M5500_S0020_G0320_001_andman=Please, will you help me find her?!
M5500_S0020_G0330_001_sele=Help.
M5500_S0020_G0340_001_sele=Do not help.
M5500_S0020_G0350_001_andman=Thank you... I'll give you her biological code. Please, I'm begging you!
M5500_S0020_G0370_001_a2b=Pod. Search for the location of the android matching this biological code.
M5500_S0020_G0380_001_pod042=Details unknown. However, data exists regarding her last sighting.
M5500_S0020_G0390_001_pod042=Comprehensive analysis predicts the android's current location to be somewhere in the Amusement Park Ruins.
M5500_S0020_G0400_001_a2b=Understood.
M5500_S0020_G0410_001_a9s=Pod. Search for the location of the android matching this biological code.
M5500_S0020_G0420_001_pod153=Details unknown. However, data exists regarding her last sighting.
M5500_S0020_G0430_001_pod153=Comprehensive analysis predicts the android's current location to be somewhere in the Amusement Park Ruins.
M5500_S0020_G0440_001_a9s=Understood.
M5500_S0060_G0000_001_andwoman=Ugh...
M5500_S0060_G0010_001_a9s=Are you okay?!
M5500_S0060_G0020_001_andwoman=Ugh, uuu...
M5500_S0060_G0030_001_a9s=She's badly damaged, but the wounds are still repairable.
M5500_S0060_G0060_001_a9s=Please wait here for a bit. I'll gather the materials and come right back!
M5500_S0060_G0070_001_pod042="Shape Memory Alloy" is required to repair this android.
M5500_S0060_G0080_001_pod153="Shape Memory Alloy" is required to repair this android.
M5500_S0060_G0090_001_a9s=Pascal?! Why are you here?
M5500_S0060_G0100_001_pascal=I was worried about the two androids who had been in my village, so I kept searching for them.
M5500_S0060_G0110_001_pascal=Then this one's signal suddenly grew very weak, so...
M5500_S0060_G0120_001_pascal=Are those repair materials? Please lend them to me. I can fix her.
M5500_S0060_G0130_001_a9s=Got it!
M5500_S0060_G0140_001_pascal=............
M5500_S0060_G0150_001_a9s=What is it?
M5500_S0060_G0160_001_pascal=Well, this android is female, so if you could close your eyes, just to be safe...
M5500_S0060_G0170_001_a9s=Whoa! Sorry. Right, of course! I'll close them! I'll close my eyes right now!
M5500_S0060_G0180_001_pascal=This goes... here... and this goes... like this...
M5500_S0060_G0190_001_pascal=There! It is done!
M5500_S0060_G0200_001_pascal=...Phew. She should be fine now.
M5500_S0060_G0210_001_andwoman=Thank you for saving me. By the way, is he safe?
M5500_S0060_G0220_001_a9s=Yes, he's safe. You can rest ea—
M5500_S0060_G0230_001_andman=Thank goodness, you're safe!
M5500_S0060_G0240_001_andwoman=Ah...!
M5500_S0060_G0250_001_andman=I am sorry... If only I had been stronger...!
M5500_S0060_G0260_001_andwoman=No, it's fine. As long as you're safe, I...
M5500_S0060_G0270_001_andman=We've caused you so much trouble. I'm truly sorry.
M5500_S0060_G0280_001_pascal=Not at all. More importantly, what will you do now?
M5500_S0060_G0290_001_andman=...For now, we need to find somewhere safe.
M5500_S0060_G0300_001_andwoman=We are going to wander again? Hunted by our former comrades, terrified of Machine Lifeforms...
M5500_S0060_G0310_001_andwoman=I can't take that anymore!
M5500_S0060_G0320_001_andman=But...
M5500_S0060_G0330_001_andwoman=...Hey... if it's come to this, let's go back to the Resistance Camp.
M5500_S0060_G0340_001_andwoman=If our memories are initialized and we're made clean, I'm sure even Anemone-san will take us back...
M5500_S0060_G0350_001_andman=But if we initialize... then even my feelings for you...
M5500_S0060_G0360_001_andwoman=If we stay together like this, I'll end up hating you.
M5500_S0060_G0370_001_andwoman=Even if I'm initialized, I'm sure I'll fall in love with you again.
M5500_S0060_G0380_001_andman=...Alright.
M5500_S0060_G0390_001_andwoman=Please. Erase our memories! Then take us to the Resistance Camp!
M5500_S0060_G0400_001_sele=Cooperate.
M5500_S0060_G0410_001_sele=Do not cooperate.
M5500_S0060_G0420_001_andwoman=Please... erase our memories.
M5500_S0060_G0430_001_andman=...Thank you. Then start with me.
M5500_S0060_G0435_001_pascal=To go so far as erasing your memories... You two must be very close.
M5500_S0060_G0440_001_a9s=Understood...
M5500_S0060_G0450_001_a9s=...Format complete. He'll reboot shortly.
M5500_S0060_G0460_001_a9s=Next is... you, right?
M5500_S0060_G0470_001_andwoman=Oh, I'm fine.
M5500_S0060_G0480_001_a9s=...Huh?
M5500_S0060_G0490_001_andwoman=...Looks like the format worked. As expected of the latest YoRHa model.
M5500_S0060_G0500_001_a9s=W-Wait a minute. What exactly are you—
M5500_S0060_G0510_001_andwoman=Well, we're just too weak, aren't we?
M5500_S0060_G0520_001_andwoman=So I thought, why not modify one of us into a combat model? That way, we won't need to run.
M5500_S0060_G0530_001_andwoman=But he needed to be initialized for that. That's why I only had you format him.
M5500_S0060_G0540_001_andwoman=Now I just have to make him strong. Oh, and while I'm at it, maybe I'll change that pathetic personality of his a little. I prefer someone a bit more forceful.
M5500_S0060_G0550_001_a9s=...
M5500_S0060_G0560_001_andwoman=Don't worry about it. This is the sixth time I've formatted him, after all.
M5500_S0060_G0570_001_andwoman=You've been a huge help. I don't know if this counts as thanks, but...
M5500_S0060_G0580_001_andwoman=Well then, I'll be going. The next time you see him, he'll be amazing!
M5500_S0060_G0590_001_pascal=Um... in other words, what does all of this mean?
M5500_S0060_G0600_001_a9s=...Women are scary.
M5500_S0060_G0610_001_pascal=Women are scary... I will remember that.
