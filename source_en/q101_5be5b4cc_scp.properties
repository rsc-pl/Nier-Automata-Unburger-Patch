M5101_S0010_G0040_300_sele=Resume training.
M5101_S0010_G0050_001_robomaster=I am not the same as before!
M5101_S0010_G0050_300_sele=Do not resume training.
M5101_S0010_G0060_001_robomaster=A pity... If ye change yer mind, come again.
