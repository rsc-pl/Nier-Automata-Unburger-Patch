M6010_S0010_G0090_300_op=I could stare at Earth forever and never get tired of it...
M6010_S0010_G0100_300_op=The Hangar? You can get there from the elevator on the side.
M6010_S0010_G0110_300_op=I hope the day we can return to Earth comes soon... together with humanity.
M6010_S0010_G0120_300_opa=Oh, hello there.
M6010_S0010_G0130_300_opa=You two are the talk of the town.
M6010_S0010_G0140_300_opb=Blowing up a huge target with a Black Box reaction... That was amazing~!
M6010_S0010_G0150_300_opa=Don't get so reckless that you actually die on us, okay?
M6010_S0010_G0160_300_opb=We'll take good care of your data, so make sure to upload it often~
M6010_S0010_G0170_300_opa=If you want to go to the Command Room, head to the left.
M6010_S0010_G0180_300_opb=The Server Management Room is to the right~!
M6010_S0010_G0190_300_opa=Take care.
M6010_S0010_G0200_300_opb=See you later~!
M6010_S0010_G0840_300_op=Hello.
M6010_S0010_G0850_300_ys=We were just talking about the plants and animals we saw on the surface. Operators really do seem to love gathering data.
M6010_S0010_G0860_300_op=I'm so jealous of the combat units. If they allowed it, I'd go down there myself and gather data...
M6010_S0010_G0870_300_ys=I'd take you if I could get permission. But I guess that would be difficult.
M6010_S0010_G0880_300_op=I love hearing about all the things on Earth, but what makes me happiest is seeing everyone come back safely.
M6010_S0010_G0890_300_op=So don't you two go making us worry, either. Got it?
M6010_S0010_G0900_300_op=Hey there. Have you been using Recovery Medicine?
M6010_S0010_G0910_300_op=It's one of our Technological Development Department's proud creations. You can buy it from this monitor in your private room, so please give it a try.
M6010_S0010_G0920_300_op=Hm? Need something? ...The product lineup is too small, you say?
M6010_S0010_G0930_300_op=It can't be helped. Supplies in the Bunker are limited. We're hard at work on development now, so just wait a little longer.
M6010_S0010_G1060_300_ysA=...Ugh... I feel sick...
M6010_S0010_G1070_300_ysB=Her balance systems are shot. Even though she's an android, she gets motion sick.
M6010_S0010_G1080_300_ysB=We've repaired her over and over, but it just doesn't seem to get better. Maybe it's turned into a habit?
M6010_S0010_G1090_300_ysB=You two be careful, too.
M6010_S0010_G1100_300_ysB=You okay? Think you can head back?
M6010_S0010_G1110_300_ysA=............I can't...
M6010_S0010_G1120_300_ysB=...Maybe I'll put in a request myself so you don't have to travel by Flight Unit.
M6010_S0010_G1130_300_ysA=Good work. Heading out now?
M6010_S0010_G1140_300_ysB=Lucky you. I still want to keep flying.
M6010_S0010_G1150_300_op=Flight Units are expensive, so I will not permit wasteful use. Understood?
M6010_S0010_G1160_300_op=Combat units are rough with them as it is. You scratched the body just the other day, did you not?
M6010_S0010_G1170_300_op=Who do you think cleans up the paint you scrape off? Ruining such a beautiful craft... That is why you people always...
M6010_S0010_G1180_300_ysA=Stop! We know it was our fault, so that's enough, alright?
M6010_S0010_G1190_300_ysB=If only we could just attach wings and jets to our bodies. Should I ask the Development Department?
M6010_S0010_G1200_300_op=That's a great idea. The Flight Units wouldn't get damaged, either.
M6010_S0010_G1210_300_ysA=I tried asking before, but they turned it down. Something about the body not being able to handle it, and the cost being too high.
M6010_S0010_G1220_300_ysB=Aww... That's too bad...
M6010_S0020_G0090_300_op=I wonder what Earth was like when humans were still around.
M6010_S0020_G0100_300_op=Though I haven't been to present-day Earth, either.
M6010_S0020_G0110_300_op=You can get to the Hangar from the side elevator.
M6010_S0020_G0120_300_op=You remember by now? Sorry about that.
M6010_S0020_G0130_300_opb=Hmmm... Now this is a problem~
M6010_S0020_G0140_300_opa=We just can't seem to find it...
M6010_S0020_G0150_300_opa=...Hm? You ask if something is wrong?
M6010_S0020_G0160_300_opa=Actually, it seems one of the surface units lost a Pod in the Flooded City.
M6010_S0020_G0170_300_opb=We tried tracing its distress signal, but we cannot find it~
M6010_S0020_G0180_300_opa=It sounds like they searched most of the ground around that area already...
M6010_S0020_G0190_300_opb=If you find it, could you please look after it? It's sad for it to be all alone.
M6010_S0020_G0200_300_opa=We're counting on you.
M6010_S0020_G0850_300_ys=...It was you two, wasn't it? The ones who got the peace offer from the Machine Lifeforms. What do you think? Can they be trusted?
M6010_S0020_G0860_300_ys=Sorry. Maybe it's because this war has gone on for so long... but I just can't bring myself to trust them.
M6010_S0020_G0870_300_ys=Sure, if a treaty is signed, the surface will probably be peaceful, but...
M6010_S0020_G0880_300_op=If a peace treaty is signed, the surface would be peaceful, at least for the time being.
M6010_S0020_G0890_300_op=But that peace would carry its own danger... Even a small clash could immediately grow into conflict again.
M6010_S0020_G0900_300_op=Still, the combat units would no longer have to face the enemy head-on like they do now. I think that alone gives the treaty enough value.
M6010_S0020_G0910_300_op=Oh, you. Have you tried the new product yet?
M6010_S0020_G0920_300_op=If not, you should!
M6010_S0020_G0930_300_op=If our inventions can reduce casualties even a little, nothing would make me happier.
M6010_S0020_G0940_300_op=Manufacturing bodies is expensive, after all!
M6010_S0020_G1080_300_ysA=Ugh... I feel sick...
M6010_S0020_G1090_300_ysB=I heard you received a peace offer from the Machine Lifeforms.
M6010_S0020_G1100_300_ysB=I have no idea what those things are thinking... Why now, after all this time...?
M6010_S0020_G1110_300_ysA=Peace... if that happens... I will not... have to fly anymore...?
M6010_S0020_G1120_300_ysB=...Well, you would probably have to fly less often than you do now.
M6010_S0020_G1130_300_ysB=If we had been able to talk to them sooner, could we have reduced the sacrifices?
M6010_S0020_G1140_300_ysB=I know there is no point talking about what-ifs, but I cannot help thinking about it.
M6010_S0020_G1150_300_ysB=You're the ones who spoke with the Machine Lifeforms?
M6010_S0020_G1160_300_op=...Surely you don't actually trust those savage things with bare metal for skin?
M6010_S0020_G1170_300_op=They are the enemies of humanity, the hated enemy that killed our comrades. I cannot stand that they are still swaggering around the surface as if it belongs to them.
M6010_S0020_G1180_300_ysA=Since we have been stuck in a stalemate for a while, they probably think we will accept their terms.
M6010_S0020_G1190_300_ysB=I wonder where their leader is hiding, in the end.
M6010_S0020_G1200_300_ysB=It would all be over once we defeat the Aliens, so they should just come out already.
M6010_S0020_G1210_300_ysA=We have the advantage now.
M6010_S0020_G1220_300_ysA=Let us exterminate them as planned and offer victory to humanity.
M6010_S0080_G0000_300_op=Surface unit, this is the Bunker. We've received your report.
M6010_S0080_G0010_300_op=Continue carrying out your duties.
M6010_S0080_G0020_300_op=What is it? Do you need something?
M6010_S0080_G0030_300_op=Good work. How are you holding up?
M6010_S0080_G0040_300_op=It's fine to rest a little, but shouldn't you be getting back to your mission soon?
M6010_S0080_G0050_300_op=Good work~! Are you on break~?
M6010_S0080_G0060_300_op=If you rest too long and the Commander gets mad, don't come crying to me~!
M6010_S0080_G0450_300_op=<<Hello, are you injured?>>
M6010_S0080_G0460_300_op=<<I have forwarded your report to Command. I will contact you with your next mission.>>
M6010_S0080_G0470_300_op=What's wrong? Are you hurt?
M6010_S0080_G0480_300_op=If you're injured, you need proper treatment, okay? Don't push yourself.
M6010_S0080_G0490_300_op=Good work. What, slacking off?
M6010_S0080_G0500_300_op=Don't slack off too much. If you get yelled at, that's on you.
M6010_S0080_G0540_300_op=<<Surface unit! Flight Units are expensive, so please handle them with care!>>
M6010_S0080_G0550_300_op=I'm busy right now! Later!
