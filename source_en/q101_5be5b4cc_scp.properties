M5101_S0010_G0000_001_robomaster=Yaya, ye have come again, have ye?
M5101_S0010_G0000_300_robomaster=How about it? Will ye let me test the results of my modifications?
M5101_S0010_G0010_001_robomaster=With the parts from last time, I have grown even stronger, ye know?
