M3030_S0133_S0000_001_pascal=Are you all right, A2-san?
M3030_S0133_S0010_001_a2=Yeah... You saved me.
M3030_S0140_G0000_001_pascal=I'm worried about the children... Let's return to the room.
M3030_S0160_G0000_001_a2=Their own cores...
M3030_S0160_G0000_300_a2=I can't just leave Pascal...
M3030_S0160_G0010_001_a2=This is... suicide...
M3030_S0160_G0020_001_pascal=To think... it would turn out like this...
M3030_S0160_G0030_001_a2=Why... Why did it have to be like this...
M3030_S0160_G0040_001_pascal=I... taught these children many emotions and all kinds of knowledge.
M3030_S0160_G0050_001_pascal=I thought it would help them someday...
M3030_S0160_G0060_001_a2=Why would giving them knowledge make them commit suicide...?
M3030_S0160_G0070_001_pascal=It was "fear"...
M3030_S0160_G0080_001_a2=Fear...?
M3030_S0160_G0090_001_pascal=I taught these children the emotion called "fear."
M3030_S0160_G0100_001_pascal=Without fear, they would lose their lives doing reckless things.
M3030_S0160_G0100_300_pod042=Confirmation: Executing severance of memory circuits via hacking.
M3030_S0160_G0110_001_pascal=But... but...
M3030_S0160_G0110_300_a2=Wait...
M3030_S0160_G0120_001_a2=They were crushed by that fear... and took their own lives...
M3030_S0160_G0120_300_a2=Yeah... Do it...
M3030_S0160_G0130_001_pascal=If it was going to end like this... I should never have taught those children...
M3030_S0160_G0130_300_pascal=A2-san, you don't intend to leave me like this, do you?
M3030_S0160_G0140_001_pascal=I have... a request...
M3030_S0160_G0140_300_pascal=Please... I'm begging you, do something to me!
M3030_S0160_G0150_001_pascal=I cannot... bear this agony...
M3030_S0160_G0160_001_pascal=My...
M3030_S0160_G0170_001_pascal=Would you please erase my memories?
M3030_S0160_G0180_001_pascal=If not that... then please, kill me.
M3030_S0160_G0190_001_pascal=Thank... you...
M3030_S0160_G0201_001_a2=Pod... erase Pascal's memories...
M3030_S0160_G0202_001_pod042=Roger. Initiating memory erasure process.
M3030_S0160_G0205_001_pod042=Memory erasure complete. Reboot timer set successfully.
M3030_S0160_G0206_001_a2=Pascal...
M3030_S0160_G0210_001_pascal=I resent you... A2-san.
