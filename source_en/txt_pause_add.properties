PAUSE_ENEMY_0381=A2, who had to fight 9S. She tried to convince 9S of the meaninglessness of the fight, but her voice did not reach him in his intense anger. During the fight, she momentarily loosened her grip due to the voice of 2B's memory, and died along with 9S.
PAUSE_ARCHIVE_030_050=The Resistance leader Anemone reveals the past of A2 and the Resistance.\nThe YoRHa forces and the Resistance members gradually began to understand each other. In the midst of this, one of the Resistance members becomes infected with a virus...
PAUSE_ARCHIVE_030_060=The Resistance leader Anemone reveals the past of A2 and the Resistance.\nAnemone and the others carry out the operation to destroy the machine lifeform server, but they fall one after another before the powerful enemy weapon. In front of the elevator that sends off her comrades, Anemone makes a certain decision.
PAUSE_ARCHIVE_090_070=[Plan 08-01 Outline of No. 2 Model Operation in Project YoRHa]\n\nAttacker Number 2 (A2), who participated in the YoRHa experimental forces' first descent operation, was the only survivor, despite having only mediocre results in the simulation stage. Analysis of her preserved personality data confirmed that her analytical and decision-making abilities in extreme situations are extremely excellent.\n\nAs reported in a separate section, the said personality data will be installed in the latest lot of E-type models and will be used as the person in charge of maintaining the secrecy of this project.
PAUSE_ARCHIVE_090_080=The following document describes the final process of Project YoRHa.\n*Note that this document is classified as Level SS and must not be disclosed to any YoRHa personnel, including the Bunker commander.\n\n[Plan 03-01 Regarding the Disposal of the YoRHa Forces]\nThe backdoor of the YoRHa base Bunker is set to open when the time to switch to the next-generation model approaches after sufficient combat data has been accumulated. The Bunker will be abandoned by intentionally having it attacked by machine lifeforms. At that time, all information related to Project YoRHa, including this document, will be destroyed, and the information disguise that humanity is on the moon will be completed.
PAUSE_QUEST_HELP_Q040/RUN_1=A child robot ran away from the entrance of Pascal's village, shouting loudly. When you talked to the mother robot nearby, she said that her child had run away from home because of a family fight, and asked you to bring him back.\nFind the child robot in the city ruins and bring him back to his mother robot.
PAUSE_QUEST_HELP_Q040/FAIL_1=You found the child robot, but you were not strong enough and the child robot was destroyed.\nReport to the mother robot.
PAUSE_QUEST_HELP_Q040/FAIL_2=The mother robot, who learned that her child robot was destroyed, was filled with grief.
