PAUSE_ARCHIVE_120_010=[Shipment Record] February 14\n[Approved] February 14\n\nEngels-type Fortress Destruction Combined Transformable Infantry 4 units\n>Serial Number: 110-A\n>Serial Number: 110-B\n>Serial Number: 110-C\n>Serial Number: 110-D\n\nErnst-type Large Suppression Flying Weapon 1 unit\n>Serial Number: 022-A\n\n[Inspection] OK
PAUSE_ARCHIVE_120_020=[Summary]\nEngels-type Fortress Destruction Combined Transformable Infantry\nSerial Number: 110-B\nDate of Manufacture: February 14, 11934 Human Calendar\n\n[Record]\nFirst Sortie: August 3, 11934 Human Calendar\nTotal Kills: 11345\nMax Combo: 234\nTotal Score: 9432\n\n[Status]\n(Repair required) Both arms non-functional.\n(Repair required) Walking impossible due to leg collapse.\n(Repair required) Fragmented errors confirmed in memory device.\n(Repair required) Voice system non-functional.\n*Many others.
PAUSE_ARCHIVE_120_030=[Diary 000]\nSince I can't move, I'm bored.\nI've decided to try writing what's called a diary.\n\n[Diary 010]\nWhere did machine lifeforms come from?\nWe repeat self-replication and repair.\nAm I a single life form?\nOr are we all one life form?\n\n[Diary 020]\nOur creators, the aliens, are beings who devour all the stars.\nTheir actions are very simple. Their goals are the same, and they do not fight each other.\nThen what about us machine lifeforms?\n\n[Diary 030]\nIt's raining. A bird landed on my shoulder.\nI never get tired of watching the creatures on this planet.\nI will make the record of the bird protected data so I don't lose it.
PAUSE_ARCHIVE_130_010=It's dark... Mommy... I was born?\nMommy... where are you...\nWhat... should I do...?\nTell me... Mommy... Hey, Mommy...\nI'll do my best... so don't leave me alone...\nMommy... I'm lonely... so lonely...\nMommy... Mommy... Mommy... Mommy... Mommy...
