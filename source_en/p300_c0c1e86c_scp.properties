M6010_S0090_G0100_300_op=I misjudged you. Impressive. Don't die next time either.
M6010_S0090_G0110_300_op=This is where it gets tough. Good luck out there.
M6010_S0090_G0120_300_op=You were so cool~! Tell me all about it when you have time, 'kay~?
M6010_S0090_G0130_300_op=I think I'm becoming a fan~!
M6010_S0090_G0140_300_op=...Hey, got a minute? I'm sorry for being so cold to you. It seems I misjudged you. Thanks for handling the Eve matter.
M6010_S0090_G0150_300_op=I was able to relax for the first time in a while. That's thanks to you and 9S.
M6010_S0090_G0160_300_op=Thanks to you, the war is turning in our favor. Thank you.
M6010_S0090_G0170_300_op=I feel like I can do my best next time, too.
M6010_S0090_G0180_300_op=I saw your fight with Eve. You're really skilled at using that YoRHa body.
M6010_S0090_G0190_300_op=Spar with me sometime.
M6010_S0090_G0200_300_op=The whole Bunker is talking about you and 9S. You did great.
M6010_S0090_G0210_300_op=We're counting on you.
M6010_S0090_G0220_300_op=That final battle looked pretty rough. I can't believe you won! I was impressed.
M6010_S0090_G0230_300_op=Just between us, 2B-san is really popular among the operators! Keep it secret, okay!
M6010_S0090_G0240_300_op=You really pulled through. I was on the edge of my seat. I was the one assisting with Eve's remaining vitals display. Was it helpful?
M6010_S0090_G0250_300_op=Well, try not to die.
M6010_S0090_G0260_300_op=That was a spectacular victory.
M6010_S0090_G0270_300_op=We're counting on your continued support.
M6010_S0090_G0280_300_op=Well, well! 2B-san! Thank you for your hard work out there!
M6010_S0090_G0290_300_op=We pray for your success in battle!
M6010_S0090_G0300_300_op=Congratulations on the successful mission. Maybe you'll get promoted. In any case, we're grateful.
M6010_S0090_G0310_300_op=We're grateful. Thank you.
M6010_S0100_G0100_300_op=...We're in the middle of an operation. Don't talk to me.
M6010_S0100_G0110_300_op=...We're counting on you.
M6010_S0100_G0120_300_op=I'm already working, so don't talk to me~!
M6010_S0100_G0130_300_op=Come back safe!
M6010_S0100_G0140_300_op=...Hurry up and deploy.
M6010_S0100_G0150_300_op=......
M6010_S0100_G0160_300_op=Good luck...
M6010_S0100_G0170_300_op=Come on, isn't it time?
M6010_S0100_G0180_300_op=I'm expecting amazing combat data this time, too. If you die, we'll lose the data, so be careful.
M6010_S0100_G0190_300_op=...Don't die.
M6010_S0100_G0200_300_op=Don't worry, everyone's doing fine.
M6010_S0100_G0210_300_op=Get going already.
M6010_S0100_G0220_300_op=I'm already on the job. Please be quiet.
M6010_S0100_G0230_300_op=......
M6010_S0100_G0240_300_op=What a pain... Here we go again.
M6010_S0100_G0250_300_op=Don't worry. I'll support you perfectly.
M6010_S0100_G0260_300_op=It's almost time to deploy. Please head to the hangar.
M6010_S0100_G0270_300_op=Please launch from the hangar.
M6010_S0100_G0280_300_op=Hey, not now! Don't talk to me!
M6010_S0100_G0290_300_op=Good luck!
M6010_S0100_G0300_300_op=This is our first operation on such a large scale. Oh, don't worry. I've expanded my memory.
M6010_S0100_G0310_300_op=Leave this end to me.
