PAUSE_WEAPONSTORY_1610_04=> Remove Unit Data\n> Remove System Data\n> Exit
PAUSE_WEAPONSTORY_1600_01=Along with a scream of otherworldly pain, there was a squishing sound as a skull was crushed. The man, crying, struck again and again. Soon, his opponent became a silent, mere lump of meat.
PAUSE_WEAPONSTORY_1600_02=The man had a beautiful wife who was the envy of all. Though their life was ordinary, they had no trouble getting by. They simply enjoyed their peace, and he worked diligently to provide for his wife. The man was very happy.
PAUSE_WEAPONSTORY_1600_03=One night, the man returned home early from work and saw a young man leaving his wife's room. His wife said she had been forced and was unable to resist. The man was enraged and swore revenge.
PAUSE_WEAPONSTORY_1600_04=The man obtained a weapon from a craftsman famous for inflicting pain and struck his wife. For the man, the object of his hateful revenge was his wife, who had failed to protect her chastity, no matter the circumstances.
PAUSE_WEAPONSTORY_1620_01=In a doze, I search for your form; waking, my heart is in a thousand pieces. I wish to see you, even in this waking world.
PAUSE_WEAPONSTORY_1620_02=I hunted the life of the woman who would be with you. Her dying scream was so very pleasant. Your body and soul, become mine.
PAUSE_WEAPONSTORY_1620_03=My beloved, your heart is not with me. Your thoughts are only with your dead wife. If so, it is only natural to wish for your body alone.
PAUSE_WEAPONSTORY_1620_04=Your head, your beautiful head, is with me. Even your resentful eyes are so very dear. Though you resent me, you are mine for eternity.
PAUSE_WEAPONSTORY_1621_01=For your sake, I take up my sword and go to the battlefield; my heart knows no fear. I only burn with love for you.
PAUSE_WEAPONSTORY_1621_02=For your sake, I brandish my sword; on my sleeve, the stains of human blood remain. A smile escapes me at its rising steam.
PAUSE_WEAPONSTORY_1621_03=For your sake, my sword raises a cloud of blood; the heads I have taken number no less than a hundred. The voices at the moment of death are a joy.
PAUSE_WEAPONSTORY_1621_04=For your sake, "Give me your head," I scream. I capture you as you flee and take your head. For your sake, for your sake, for your sake\u2014who are you.
PAUSE_WEAPONSTORY_1650_01=I'M MISSING PARTS
PAUSE_WEAPONSTORY_1650_02=I'M USELESS
PAUSE_WEAPONSTORY_1650_03=I'M AN UNNECESSARY EXISTENCE
PAUSE_WEAPONSTORY_1650_04=BUT I TRIED MY BEST... MOMMY
PAUSE_MAIL_BODY_001=This is a verification email for your mail account.\nAny unit members experiencing issues with the mail system are to contact the person in charge immediately.\n\nFrom the Server Administrator.
PAUSE_MAIL_BODY_002=Hey.\nThe medicine I was working on, using that research you helped me with, is ready.\nCome by and try it out when you have some time.\n\nJackass
PAUSE_NET_TXT_01=Return to the previous screen without saving comment changes?\nIs this correct?
PAUSE_MAIL_BODY_007=2B-san!\nHave you heard of this thing called "Jupiter Fortune-Telling"? It's all the rage with the girls in the Development Department lately!\nThey say you can tell your luck with health, work, and even love from the color and shape of Jupiter's Great Red Spot! Isn't that amazing? I'm going to try it out soon!\n\nOperator 6O
PAUSE_MAIL_BODY_008=2B-san,\nAbout that "Jupiter Fortune-Telling" I mentioned in my last email, I had one of the girls in the Development Department do it for me, and my health luck, work luck, and love luck were all the worst... That's when I realized. It's just occult nonsense. How can they tell my destiny by observing Jupiter? It's ridiculous.\nI'll forge my own destiny with my own hands!\nThat's the true spirit of a YoRHa girl. Hahaha... (;_;)\n\nOperator 6O
PAUSE_MAIL_BODY_009=I have attached the promised reward.\nThat is all.\n\nOperator 21O
PAUSE_MAIL_BODY_010=Request details:\nPlease collect the following elements for information analysis.\n\n\u30fbPlease collect traces of human life at the large ruins in the desert.\n\u30fbThe large ruins are the remains of a collective housing complex that was once called a "danchi."\n\u30fbPlease photograph the traces and send them.\n\nThat is all.
PAUSE_MAIL_BODY_011=Analysis of the information you provided is complete.\nAs I have already mentioned, the family is an interesting social unit.\nIt will surely be useful for future research.\n\nThank you. That is all.
PAUSE_MAIL_BODY_012=*This is a direct order from the Commander. Forwarding is prohibited.\n\nThis mission is the capture of fugitive YoRHa units.\nIt has been confirmed that these YoRHa units deserted their mission and have committed illegal acts, such as plundering supplies from the Resistance camp.\nYou are ordered to capture them immediately.\n\nOperator 21O
PAUSE_MAIL_BODY_013=This is a routine check-in for YoRHa unit members.\nIf there is a problem, please reply. If there is no problem, a reply is not required.\nThat is all.\n\nOperator 21O
PAUSE_SUBQUEST_PROGRESS_01=<ITEM_NAME> <ITEM_NUM>/<REQ_NUM>
PAUSE_SUBQUEST_PROGRESS_02=Hack machine lifeforms in high places <ENEMY_NUM>/<REQ_NUM>
PAUSE_SUBQUEST_PROGRESS_03=Retrieve plug-in chips from machine lifeforms <ENEMY_NUM>/<REQ_NUM>
PAUSE_ENEMY_000a=This type, equipped with circular saw-like gear, uses a reciprocating engine to rotate the saw and lightly slice through android armor.
PAUSE_ENEMY_0002=Machine lifeforms deployed in the desert region. They wear paint and clothing-like items that imitate the cultural styles of past humans. Their operating principles are unknown. It is presumed that they have come into contact with past human data.
PAUSE_ENEMY_0003=Machine lifeforms deployed in the ruins of an amusement park built by humans in the past. They wear flashy attire, like clowns. Their behavior is often mysterious, with some individuals constantly parading or being friendly, but they will retaliate if attacked.
PAUSE_ENEMY_0004=Machine lifeforms deployed in the Forest Kingdom. They are clad in armor like medieval soldiers. They form disciplined ranks, and caution is required when facing a large number of them. They are disconnected from the network and are extremely exclusive towards other machine lifeforms.
PAUSE_ENEMY_0005=Machine lifeforms that have formed a colony in the abandoned factory. They wear religious symbols and clothing. It is surmised that they created something like a religion after being disconnected from the network.
PAUSE_ENEMY_0006=Machine lifeforms with black and red paint. Apart from the paint, they appear to be the same as normal machine lifeforms at first glance, but their internal specs are higher than normal.
PAUSE_ENEMY_0007=Machine lifeforms that have formed a colony in Pascal's village. Despite being machine lifeforms, they dislike fighting and have disconnected themselves from the network.\nThey live quietly in the depths of the forest with other machine lifeforms who share their ideals.
PAUSE_ENEMY_0009=A machine lifeform that attacks with an EMP, an electromagnetic pulse, by extending its neck. The extended neck parts look just like a human spinal cord. Being hit by an EMP attack causes various functional impairments.
PAUSE_ENEMY_001a=It is presumed that its small sword is a weapon self-made by a machine lifeform by combining suitable metal materials.
PAUSE_ENEMY_001c=The spear, made by combining metal materials, has a specially processed tip that can pierce even android armor.
PAUSE_ENEMY_001d=The large axe has high destructive power due to its weight, so caution is required.
PAUSE_ENEMY_001e=A type with its forearm replaced by a gun unit has also been confirmed. The gun unit can fire not only normal energy bullets but also powerful lasers.
PAUSE_ENEMY_0020=A self-destructing machine equipped with a medium-sized bipedal unit. It has a simpler structure than a normal machine lifeform and is not strictly classified as one.\nIt has only the minimum necessary processing power and only an algorithm to approach and self-destruct on enemy reactions that enter its range.\nIt will attempt a forced assault using its thick armor.
PAUSE_ENEMY_0030=A medium-sized machine lifeform with multiple insect-like legs.\nIt moves as if gliding over the ground by emitting energy from its leg tips.
PAUSE_ENEMY_0050=A medium-sized flight type with four flight devices attached to a small flying machine lifeform.\nA gun unit is equipped on the top of the flight device, and a wire cutter is on the side, allowing it to handle both long and short-range combat. A wire is equipped at the bottom of the flight device, allowing it to transport other machine lifeforms.
PAUSE_ENEMY_005a=The existence of a type with a self-destruct unit attached to the top of the flight device has also been confirmed. The self-destruct unit is detached along with the flight device, approaches from the air, and self-destructs.
PAUSE_ENEMY_0060=A large, human-like machine lifeform. It is a swarm of small machine lifeforms, and it moves its giant body using their massive energy.\nIts arms are equipped with telescopic slide rails, and it will extend its arms to attack when approached. A liquid-fuel rocket engine is attached to its back, allowing it to fly for short periods. It is also equipped with a gun unit and a transfer device for spherical linked machine lifeforms, making it a powerful unit with no weaknesses in either long or short-range combat.
PAUSE_ENEMY_006a=A leg-strengthened type with its body inverted has also been encountered. A complete change from the normal type, it attacks with nimble movements.\nThe rocket engine on its back is used to kick down from the air.
PAUSE_ENEMY_0070=A small machine lifeform with human-like limbs. It specializes in swift attacks with its small body.
PAUSE_ENEMY_007a=It is presumed that its small sword is a weapon self-made by a machine lifeform by combining suitable metal materials.
PAUSE_ENEMY_007b=Machine lifeforms with torches are also seen in dark places. Since they should be able to see in the dark with infrared cameras even without a torch, it is presumed that they are acting for some reason.\nThey use their own lubricant as fuel for the torch.
PAUSE_ENEMY_007c=The spear, made by combining metal materials, has a specially processed tip that can pierce even android armor.
PAUSE_ENEMY_007d=The large axe has high destructive power due to its weight, so caution is required.
PAUSE_ENEMY_0080=A self-destructing machine equipped with a small bipedal unit. It has a simpler structure than a normal machine lifeform and is a type of weapon created by them.\nIt has only the minimum necessary processing power and moves with an algorithm to approach and self-destruct on enemy reactions that enter its range.\nIt attempts to close in at once using its fast running speed.
PAUSE_ENEMY_0090=A medium-sized machine lifeform with the appearance of a quadrupedal animal.\nIt sometimes has a small machine lifeform riding on its body and attacks with the high mobility of its four legs.\nThe tips of its limbs are equipped with wire cutters that can also be used for attack, and its tail is a foldable claw arm.
PAUSE_ENEMY_009a=A type that stands up to take a humanoid form has also been confirmed. It attacks with swift movements due to its slender body.
PAUSE_ENEMY_0100=A large machine lifeform. Its form is reminiscent of an ancient dinosaur. It is equipped with a gun unit on its arms and attacks with a variety of barrages.
PAUSE_ENEMY_0110=A type with multiple small, short-legged body units stacked on top of each other. Its movements are slow, and it does not perform any real attacks. For what purpose was such a machine lifeform created?\nAccording to some, it is wandering northward.
PAUSE_ENEMY_011a=A type with multiple gun units equipped to match its body units has also been confirmed. It scatters a large number of energy bullets.
PAUSE_ENEMY_0120=A type with multiple spherical machine lifeforms linked together. It is sometimes transferred by other machine lifeforms to attack. It has a highly expandable main body structure with multiple variations.
PAUSE_ENEMY_0130=A spherical machine lifeform. It uses a lot of energy to float, so it is not good at intense attacks. To compensate, it is equipped with powerful weapons that make up for its low attack power.
PAUSE_ENEMY_0140=A member of the YoRHa forces infected by a virus program. It has almost completely lost its ego and attacks uninfected androids.
PAUSE_ENEMY_0150=A member of the YoRHa forces infected by a virus program. An armed YoRHa model specializing in combat.\nIt wears heavy equipment and has high defensive power.
PAUSE_ENEMY_0160=A member of the YoRHa forces infected by a virus program. It is equipped with a flight unit and attacks from the air. As it wears expensive equipment, it is a formidable opponent.
PAUSE_ENEMY_0170=A member of the YoRHa forces infected by a virus program. Although it is an operator type and not originally suited for combat, the virus infection has brought out performance exceeding its original specs.\nAs its safeties are ignored, the strain on its body is considerable.
PAUSE_ENEMY_0180=A large machine lifeform confirmed in the amusement park ruins. It has the appearance of an old-fashioned tank.\nIt has the ability to traverse rough terrain with its caterpillar tracks and is highly mobile. When turning or stopping, it flashes its indicators or brake lights as if obeying traffic laws.\nIt is decorated to match the amusement park and, for some reason, fires colorful confetti and decorative bullets from its turret.
PAUSE_ENEMY_0190=A large machine lifeform confirmed in the abandoned factory. It has the appearance of an old-fashioned tank.\nA machine lifeform acting as a commander is attached to the top of the turret, a pilot to the front of the body, and gunners to various parts of the body. From the large cannon on top of the body, it fires a large number of energy bullets and powerful lasers.\nThe front wheels have an arm-like structure and can be deployed for striking and sweeping attacks. A crane arm is attached to the rear of the body, allowing it to swing a spherical hammer.\nThe rear of the body has a cargo unit attached, allowing it to transport other machine lifeforms.
PAUSE_ENEMY_0200=A large flying machine lifeform. A tank-type machine lifeform is attached to the bottom of its body.\nIt is a swarm of many machine lifeforms and fires a large number of energy bullets. The center of its body is a hangar, from which it launches small flight types.
PAUSE_ENEMY_0210=A large multi-legged machine lifeform. A close-range type equipped with a giant blade. It moves as if gliding over the ground by emitting energy from its leg tips.\nThe side of its body is a weapon rack, from which it launches missiles and other attacks. Additional armor is attached to its legs, reinforcing its weak armor parts. By purging the additional armor, it transforms into a spherical shape and performs a spinning attack.
PAUSE_ENEMY_0220=A large multi-legged machine lifeform. A long-range type equipped with a gun unit. It launches a peculiar attack, emitting electric shocks from its leg tips and turning the surrounding water surface into a danger zone.
PAUSE_ENEMY_0230=A large multi-legged machine lifeform.\nA close-range type equipped with a giant blade.\nIts body is black with white patterns on it.
PAUSE_ENEMY_0240=A large multi-legged machine lifeform.\nA long-range type equipped with a gun unit.\nIts body is white with black patterns on it.
PAUSE_ENEMY_0250=A machine lifeform formed by the combination of two large multi-legged units.\nIt deploys powerful attacks in both long and short-range combat.\nA part of what were its legs before combination now functions as giant arms.
PAUSE_ENEMY_0260=A type with a large number of multi-legged machine lifeforms linked together.\nIts enormous energy output allows it to float even its giant body in the air. It freely uses separation and combination to launch a variety of attacks.
PAUSE_ENEMY_0270=A machine lifeform acting as an older brother, followed by countless younger brothers. It is a medium bipedal type, but a linked-sphere type is connected to its arms. When its younger brothers were harmed, it showed intense anger.
PAUSE_ENEMY_0280=An individual acting as a younger brother, desperately pouring oil on the machine lifeform it called "Onii-chan."
PAUSE_ENEMY_0281=In the midst of battle, it pleaded for its brother's life to be spared, but its wish was mercilessly crushed.
PAUSE_ENEMY_0282=In the midst of battle, it pleaded for its brother's life to be spared. A2, perhaps taking pity, left it be.
PAUSE_ENEMY_0290=A large machine lifeform with the appearance of an opera singer. It modifies androids while they are still alive and uses them as weapons in its attacks.\nIt has a strong obsession with beauty and adorns itself, but its decorations are made from machine lifeform parts and android corpses, making them grotesque. It does not hesitate to sacrifice even its fellow machine lifeforms for the sake of beauty, and has engaged in "cannibalism."\n\nSeeking even greater beauty, it tried to absorb 2B and the others, but failed. Its obsession with beauty seems to have been for a certain single machine lifeform.
PAUSE_ENEMY_0320=An extremely large machine lifeform developed for the purpose of annihilating androids. However, due to its ferocity in attacking even its own kind, it was discarded in the deep sea.\nThe part that was initially thought to be its entire body was only its head; when it stood up, its giant body easily exceeded 1000 meters in height.\nIt repelled all attacks with a powerful EMP and thick armor, but 9S's quick thinking had it swallow a large missile, leading to its destruction.
PAUSE_ENEMY_0330=An individual who underwent a peculiar evolution among machine lifeforms. It has an appearance strikingly similar to an android. It appeared by splitting from the side of another machine lifeform.
PAUSE_ENEMY_0331=Re-encountered in the alien mothership. It possesses the ability to regenerate no matter how many times it is killed. It seems to adore Adam as an older brother.
PAUSE_ENEMY_0332=Eve, enraged by the loss of Adam. It wraps its arm in rubble and unleashes powerful attacks.\nThanks to 9S's desperate hacking, it was separated from the network and ceased to function.
PAUSE_ENEMY_0340=An individual who underwent a peculiar evolution among machine lifeforms. It has an appearance strikingly similar to an android. It was born from a cocoon-like object swarmed by machine lifeforms. When born, it wore no clothes and its movements were clumsy, but it grew rapidly and learned methods of attack.
PAUSE_ENEMY_0341=Re-encountered in the alien mothership. It possesses the ability to regenerate no matter how many times it is killed. According to him, the aliens were exterminated by them, the machine lifeforms.\nHe shows a strong interest in humanity and wishes to dissect the humans who fled to the moon.
PAUSE_ENEMY_0342=Adam, who appeared in the Copied City. Out of a strong interest in humanity, he began to imitate them and created a replica of a city. To understand the concepts of life and death, he separated himself from the network and challenged 2B to a life-or-death battle.\nIn the end, he understood death and ceased to function.
PAUSE_ENEMY_0350=Official name: Terminal. A hologram projected by the enemy machine lifeform's network server.\n\nDue to the self-evolution program dropped by the Pod, its ego split, and they began to kill each other.
PAUSE_ENEMY_0360=Pronounced "Two-One-Oh." The operator in charge of communications with 9S, she is calm and skilled at analysis.\n\nDuring a previous descent operation, at her own request, her equipment was converted to a B-type, and she was deployed to the front lines as 21B, but went missing.\nShe was encountered at the resource recovery unit in the amusement park ruins, but she was already infected with a virus. Her end came at the hands of A2.
PAUSE_ENEMY_0370=A copy model of YoRHa No. 2 Type B, created by the "Tower." It is infected with a virus and attacks 9S.\n\nIt seemed to have been completely destroyed by 9S, but a time bomb was planted in its body, which blew off 9S's left arm.
PAUSE_ENEMY_0380=Official name: YoRHa Type A No. 2. Type A is a prototype YoRHa model specializing in close-range combat that is no longer in operation, and was used for the practical application of official models like 2B and 9S. She is wanted as a deserter, and destruction is recommended upon engagement.\nShe appeared in the Forest Castle and killed the Forest King. She then engaged 2B and the others in combat but managed to escape.
PAUSE_ENEMY_0390=Official name: YoRHa Type 9 Model S. A unit that also has attack functions but specializes in investigation missions. A member of the YoRHa forces who excels at information gathering, primarily through hacking.\nHe held special feelings for 2B, like affection.\n\nThough originally a gentle person, he shows intense hatred towards A2 for killing 2B. His end comes at the hands of A2.
PAUSE_ENEMY_0400=A mysterious creature that emerged from a machine lifeform. It calls itself Emil, but its true identity is not very clear. After its revival, it obtained a new body and runs a shop.\n\nIf you steal from his room several times, he will fight you as a punishment. Defeated, he weeps before the law of the survival of the fittest.
PAUSE_ENEMY_0401=A group of giant Emils that suddenly attacked. Their true form was the remnants of his clones. They wielded old-world magic weapons that used magical elements and unleashed powerful attacks.\n\nA single word from the original Emil stopped the clones' movements, and with a final blow, the clones were annihilated. Emil himself also died, with a look of relief on his face, as if he had finally met the person he had been waiting for.
PAUSE_ENEMY_0410=A machine lifeform in Pascal's village. He is always thinking about philosophy.\nHe has several fans in various places, and although he receives various gifts from them, he dismisses them as junk.\nIn the end, he set out on a journey to know the truth of the world and disappeared somewhere.
PAUSE_ENEMY_0420=A small machine lifeform called the Forest King. He was destroyed by an android called A2 who suddenly appeared.
PAUSE_ENEMY_0430=The first Forest King, who had decayed in the depths of the forest. Having been left for many years, its body is covered in countless moss. At its side, a grave was adorned with data on the history of the king's country, written by the Forest Kingdom's scribe.
PAUSE_ENEMY_0440=The machine lifeforms that formed a colony in the abandoned factory. An individual who was revered as their founder. However, by the time he was met, he had already ceased to function.\nIt is said that he was made into a "god" by his believers.
PAUSE_QUEST_HELP_Q020/RUN_1=Sartre in Pascal's village is always muttering philosophical and difficult things, making him completely incomprehensible.\nTo get information about Sartre, talk to his female fan in Pascal's village.
PAUSE_QUEST_HELP_Q020/CLR=Despite being treated with contempt by Sartre, the women do not try to see his true nature.\nQuestion Sartre, who likewise makes no effort to know the women, about what meaning there is in their relationship.
PAUSE_QUEST_HELP_Q020/DONE=You visited Sartre's place, but he was gone, having left a letter behind.\nSartre was engrossed in philosophy to the very end and paid no mind to those who revered him.
PAUSE_QUEST_HELP_Q031/RUN_1=Investigate the wreckage of the giant robot left in the city ruins.\nObtain the following items to repair its brain circuits.
PAUSE_QUEST_HELP_Q031/CLR=Repair the giant robot with the obtained items.
PAUSE_QUEST_HELP_Q031/DONE=The brain circuits were repaired, and the giant robot became able to speak, albeit in broken sentences.\nSome data could be extracted, but it was all fragmented and useless.\nFurther repairs seem necessary to obtain more detailed information.
PAUSE_QUEST_HELP_Q032/RUN_1=To obtain information from the giant robot's wreckage, obtain the following items.
PAUSE_QUEST_HELP_Q032/CLR=Repair the giant robot with the obtained items.
PAUSE_QUEST_HELP_Q032/DONE=The repaired Engels showed gratitude and readily handed over data about machine lifeforms. Engels, with time on his hands, began to look forward to having someone to talk to.
PAUSE_QUEST_HELP_Q100/RUN_1=There was a machine lifeform in the city ruins who devoted himself to training alone.\nLiking your strength, he persistently asks you to join him in his training.\nJoin the Robot Dojo master in his training.
PAUSE_QUEST_HELP_Q100/FAIL_1=You were defeated in training with the Robot Dojo master.\nChallenge him again to win the training.
PAUSE_QUEST_HELP_Q100/RUN_2=You won the training with the Robot Dojo master.\nAs thanks for the training, he begged for a contribution of materials.\nDefeat the dinosaur-like machine lifeform and obtain the following items requested by the Robot Dojo master.
PAUSE_QUEST_HELP_Q100/CLR=Give the obtained items to the Robot Dojo master.
PAUSE_QUEST_HELP_Q100/DONE=The Robot Dojo master, having unilaterally secured a promise for a rematch, continues his training to reach greater heights.
PAUSE_QUEST_HELP_Q101/RUN_1=The Robot Dojo master had enhanced himself with the materials you gave him last time.\nTest the results of his training.
PAUSE_QUEST_HELP_Q101/FAIL_1=You were defeated in training with the Robot Dojo master.\nChallenge him again to win the training.
PAUSE_QUEST_HELP_Q101/RUN_2=You won the training with the Robot Dojo master.\nAs thanks for the training, he begged for a contribution of materials.\nObtain the following items requested by the Robot Dojo master.
PAUSE_QUEST_HELP_Q101/CLR=Give the obtained items to the Robot Dojo master.
PAUSE_QUEST_HELP_Q101/DONE=The Robot Dojo master, having unilaterally secured a promise for a rematch, continues his training to reach even greater heights.
PAUSE_QUEST_HELP_Q102/RUN_1=The Robot Dojo master had enhanced himself with the materials you gave him last time. Test the results of his training.
PAUSE_QUEST_HELP_Q102/FAIL_1=You were defeated in training with the Robot Dojo master.\nChallenge him again to win the training.
PAUSE_QUEST_HELP_Q102/RUN_2=You won the training with the Robot Dojo master.\nAs thanks for the training, he begged for a contribution of materials.\nObtain the following items requested by the Robot Dojo master.
PAUSE_QUEST_HELP_Q102/CLR=Give the obtained items to the Robot Dojo master.
PAUSE_QUEST_HELP_Q102/DONE=The Robot Dojo master, having unilaterally secured a promise for a rematch, continues his training to reach the highest heights.
PAUSE_QUEST_HELP_Q103/RUN_1=The Robot Dojo master had enhanced himself with the materials you gave him last time. Test the results of his training.
PAUSE_QUEST_HELP_Q103/FAIL_1=You were defeated in training with the Robot Dojo master.\nChallenge him again to win the training.
PAUSE_QUEST_HELP_Q103/RUN_2=You won the training with the Robot Dojo master.\nAs thanks for the training, he begged for a contribution of materials.\nObtain the following items requested by the Robot Dojo master.
PAUSE_QUEST_HELP_Q103/CLR=Give the obtained items to the Robot Dojo master.
PAUSE_QUEST_HELP_Q103/DONE=The Robot Dojo master, having unilaterally secured a promise for a rematch, continues his training to reach the ultimate heights.
PAUSE_QUEST_HELP_Q104/RUN_1=The Robot Dojo master had enhanced himself with the materials you gave him last time. Test the results of his training.
PAUSE_QUEST_HELP_Q104/FAIL_1=Challenge the Robot Dojo master again.
PAUSE_QUEST_HELP_Q104/RUN_2=You won the training with the Robot Dojo master, but he challenged you to a life-or-death rematch to become a true warrior.\nDefeat the Robot Dojo master.
PAUSE_QUEST_HELP_Q104/DONE=Having reached the heights of power, the Robot Dojo master challenged you to a battle with everything on the line, and lost.\nYou won the final battle and mourned the now-deceased, eccentric robot.
PAUSE_ENEMY_0031=There are long-range types equipped with gun units and close-range types equipped with cutter arms.
PAUSE_ENEMY_0450=A machine lifeform, yet a pacifist who dislikes conflict and seeks peace with the human side. He possesses high intelligence and is interested in the history of humans and machine lifeforms.
PAUSE_ENEMY_0451=The children of Pascal's village, facing a crisis, committed suicide out of fear. Pascal, regretting that he had taught them fear as part of teaching them various emotions and knowledge, requested A2 to erase his memories.\nThe Pascal of before is no more.
PAUSE_ENEMY_0452=The children of Pascal's village, facing a crisis, committed suicide out of fear. Pascal, regretting that he had taught them fear as part of teaching them various emotions and knowledge, requested A2 to erase his memories, but was refused. After that, perhaps out of despair, he disappeared.
PAUSE_ENEMY_0453=The children of Pascal's village, facing a crisis, committed suicide out of fear. Pascal, regretting that he had taught them fear as part of teaching them various emotions and knowledge, requested A2 to kill him, and died with words of gratitude.
PAUSE_ENEMY_1010=A medium-sized quadruped with deer antlers on its head. Not only its appearance but also its behavior mimics that of an animal.\nIt led a pack of ferocious animals and harmed the native animals, so it seems to have been shunned even by its fellow machine lifeforms.
PAUSE_ENEMY_1020=A golden, shining small stubby. It is followed by subordinates of the same golden color. It attacks while shouting, "Glory to the machine lifeforms!"
PAUSE_ENEMY_1021=A golden, shining small stubby. It is followed by subordinates of the same golden color. It attacks to avenge its older brother.
PAUSE_ENEMY_1022=A golden, shining small stubby. It is followed by subordinates of the same golden color. Its clan was killed by androids, and it fights for revenge, but is defeated. In the end, it self-destructs while cursing the androids as devils.
PAUSE_ENEMY_1030=A golden, shining tank-type machine lifeform. It serves a golden, shining small stubby.
PAUSE_ENEMY_1040=A golden, shining large biped. It serves a golden, shining small stubby.
PAUSE_ENEMY_1050=A medium-sized biped that guards the grave of the first king of the Forest Castle. Its armor is covered in moss, indicating that it has been guarding the grave for many years. It attacks to eliminate intruders.
PAUSE_ENEMY_1060=A machine lifeform that appeared riding a boar.\nMistaking 2B and the others for harming animals, it attacked them, but they somehow cleared up the misunderstanding and reconciled.\n\nIn a corner of the Forest Castle, it takes care of injured and weakened animals. It is a kind-hearted individual who loves animals.
PAUSE_ENEMY_1070=A machine lifeform that pursues martial arts. It wears a white belt. It invites 2B and the others to train but is defeated. It brazenly asks for parts as a tuition fee.
PAUSE_ENEMY_1071=It wears a brown belt and uses the previous parts to enhance its equipment, but is easily defeated. Acting like an old man, it pesters 2B and the others for parts again.
PAUSE_ENEMY_1072=It wears a black belt and changes its appearance, but it seems it was no match for 2B and the others.
PAUSE_ENEMY_1073=It wears a red and white belt and changes its appearance even more. It unleashes powerful attacks but is defeated once again.
PAUSE_ENEMY_1074=The Robot Dojo master has become a red belt. He who pursued martial arts to the end was satisfied that he could unleash all his power against 2B and the others, and ceased to function.
PAUSE_ENEMY_1080=A blood-soaked machine lifeform. Hating the Resistance for destroying its comrades, it was taking revenge on androids.
PAUSE_ENEMY_1090=A machine lifeform that was camouflaged as a bronze statue in the amusement park. It wears rabbit-like ear decorations. It holds a trumpet in its hand and attacks by swinging it.
PAUSE_ENEMY_1100=A tank-type machine lifeform with its entire body reinforced with spikes and blades. Trapped by the need for revenge for its comrades, its thoughts are dominated by violence.
PAUSE_ENEMY_1110=A medium-sized biped that imitates human culture with a western-style attire. It attacks with a gun just like a gunslinger from a western. It seems to use its deeply worn hat to aim.
PAUSE_ENEMY_1120=A small flight unit that imitates human culture with a western-style attire. It attacks with a gun just like a gunslinger from a western. It seems to use its deeply worn hat to aim.
PAUSE_ENEMY_1130=A small stubby that imitates human culture with a western-style attire. It attacks with a gun just like a gunslinger from a western. It seems to use its deeply worn hat to aim.
PAUSE_ENEMY_1140=A clown-like machine lifeform that had incorporated a stamp into its body. It attacks while inviting you to play with it.\nIt spits an unknown liquid from its mouth that melts the skin of any android it touches.\n\nWhen defeated, it thanks you for playing with it and ceases to function.
PAUSE_ENEMY_1150=A large biped with many weapons stuck in its body. It attacks indiscriminately, regardless of friend or foe.\nIt seems to be one of the machine lifeforms that failed to die while trying to destroy itself.
PAUSE_ENEMY_1160=A large reverse-jointed unit that has become even more dinosaur-like with various parts. It stores energy in its dorsal fins and fires a beam from its mouth.\n\nIt mainly inhabits the "Night Zone," so sightings in the "Day Zone" are extremely rare.
PAUSE_ENEMY_1170=A member of the deserted YoRHa forces. He used to be a captain. He carries many weapons on his back and switches between them during combat.\nHe was under an arrest warrant from Command for desertion, but due to his fierce resistance, he was destroyed.
PAUSE_ENEMY_1180=A member of the deserted YoRHa forces.\nHe was under an arrest warrant from Command for desertion, but due to his fierce resistance, he was destroyed.
PAUSE_ENEMY_1190=A member of the deserted YoRHa forces.\nHe was under an arrest warrant from Command for desertion, but due to his fierce resistance, he was destroyed.
PAUSE_ENEMY_2010=A fan of Sartre in Pascal's village. She has thick paint on her face. She described Sartre as a reliable person who knows everything. She seems to be a female-type machine lifeform, revealing that machine lifeforms also have genders.\n\nShe wrote a letter to Sartre, but was told that he had no obligation to reply. Hearing this, she was, for some reason, delighted.
PAUSE_ENEMY_2020=A fan of Sartre in the amusement park ruins. She wears elegant decorations.\nShe described Sartre as a mysterious and cool person. She considers the Sartre fan in the desert area to be her enemy.\n\nShe prepared a gift of beautiful glass for Sartre, but it was dismissed as mere glass. Hearing this, she was, for some reason, ecstatic.
PAUSE_ENEMY_2030=A fan of Sartre in the desert area. She wears a unique attire that seems to reflect her worldview.\nShe has a keen sense of smell, detecting that 2B and the others came from Pascal's village. She described Sartre as an inquisitive, passionate, and admirable person.\n\nShe gave 2B and the others a machine fossil, thinking Sartre would be interested, but Sartre showed no interest, calling it mere junk. Hearing this, she was, for some reason, excited.
PAUSE_ENEMY_2040=A machine lifeform playing the role of a father. He is taciturn and does not speak much. It seems he leaves all the child-rearing to the mother.
PAUSE_ENEMY_2050=A machine lifeform playing the role of a mother. It seems she had a fight with her child, who ran off somewhere, and she asks 2B and the others to bring him back.\nThis individual's story reveals that machine lifeforms form family units.
PAUSE_ENEMY_2051=When her child is brought back, she sheds coolant like tears of joy. Being disconnected from the network causes misunderstandings with her child, but she spoke cheerfully about how great the joy is when they finally understand each other.
PAUSE_ENEMY_2060=A child machine lifeform who ran out of the house after fighting with his mother.
PAUSE_ENEMY_2061=He is rescued by 2B and the others while being attacked by other machine lifeforms. It seems he ran away from home due to dissatisfaction with being treated differently from his siblings.\nWhen he returns to his mother, they reconcile safely.
PAUSE_ENEMY_2070=An older sister machine lifeform looking for her lost younger sister. Her younger sister, hearing her complain about her parts being in poor condition, went to the desert area to find replacement parts.\nThis individual's story reveals that machine lifeforms also have sisters.
PAUSE_ENEMY_2080=A younger sister machine lifeform who was lost in the desert area. According to Pascal, she is a good girl who cares for her sister. She is very curious and bombards 9S with many questions, vexing him. When brought to the entrance of the desert area, she went home by herself.
PAUSE_ENEMY_2090=A machine lifeform that is constantly moving restlessly. It considers speed to be the ultimate virtue and challenges you to a race. If you win the race, you are recognized as a speedster.\n\nHe had lived in pursuit of the ultimate speed, but in the end, he found a sense of calm and discovered the ugliness of competing with others. Satisfied with his way of life, he self-destructed and died.
PAUSE_ENEMY_2100=A machine lifeform that calls itself a genius inventor and asks for investment in its inventions. As it boasts, it actually succeeds in inventing several times.\nIn the end, he asked for a large investment for a once-in-a-lifetime invention, but it seems to have ended in failure. He intended to invent a rocket to the moon, but it ended up arriving on Mars.\nHe was frustrated by his first failure, but it seems there was no doubt that he was a genius.
PAUSE_ENEMY_2110=A machine lifeform that is being made fun of by the children in Pascal's village. Its true identity is a wise individual with a highly advanced thought circuit.\nHe says that pretending to be a fool brings him closer to the truth, and continues to act the fool.
PAUSE_ENEMY_2120=One of the machine lifeforms called Romeo. He suddenly starts a fight while spewing abuse.
PAUSE_ENEMY_2150=One of the machine lifeforms called Juliet. She suddenly starts a fight while spewing abuse.\n\nShe survives by defeating the other Romeos and Juliets, but laments the loss of Romeo and follows him in death.
PAUSE_ENEMY_2180=A legendary blacksmith living in a corner of the forest. His master was a master craftsman who improved the eight weapons of white and black. Due to an initial defect in his internal equipment, he is independent of the network and does not take hostile action against androids.\n\nHe has a deep affection for weapons, and as a sign that you treat weapons with care, he entrusts you with a weapon that his former master had honed.
PAUSE_ENEMY_000d=The electromagnetic shield-equipped type is immune to pod fire, and you take damage if you touch the shield, so you need to approach with caution.
PAUSE_ENEMY_0019=The electromagnetic shield-equipped type is immune to pod fire, and you take damage if you touch the shield, so you need to approach with caution.
PAUSE_FISH_01=An ancient fish that lives in fresh water.\nIt has no particular use, but it is said that there were avid enthusiasts among humans.
PAUSE_FISH_02=A freshwater fish with two heads. The upper head keeps a lookout for the surroundings, while the lower head searches for prey by rummaging through the mud.\nBoth heads have independent wills, so their lifespan varies greatly depending on their compatibility.\n\nAlso, it closely resembles an arowana, but it is a different species.
PAUSE_FISH_03=A small freshwater fish about 3cm in length.\nDue to its small size, it often gets caught between the parts of machine lifeforms, causing malfunctions in those near water.\nThere was a time when androids attempted to use this characteristic for military purposes, but due to protests from killifish enthusiasts, it was never used in the military.\nPerhaps because of this, it is one of the few creatures that machine lifeforms are hostile to.\nSince they are easy to catch, many androids capture them for ornamental purposes, and it is said that the activities of enthusiasts continue to this day.
PAUSE_FISH_04=A fish that can be found anywhere in fresh water. It is harmless.
PAUSE_FISH_05=A freshwater fish with a large, swollen front part.\nThe swollen part is a soft swim bladder, and it will flee if poked.
PAUSE_FISH_06=Like the carp, a widely distributed freshwater fish.\nIt is resistant to pollution and can adapt to environments where fish normally cannot live.
PAUSE_FISH_07=A variety of carp. Its body is covered in hair, and when it stops moving in the water, it looks like an eerie furball.\nIts hair has a moisturizing effect, allowing it to live on land for a while, and it can often be seen sunbathing by the river.
PAUSE_FISH_08=A giant species of ray.\nIt has a spine on its tail fin, and it is dangerous to be stung.\n\nAlso, among the machine lifeforms, there is a group that travels in search of a legendary giant ray, and near the waters where giant rays have been sighted, they can be seen walking on the bottom in groups to investigate.
PAUSE_FISH_09=A large carnivorous fish.\nIt has no particular use, but catching it makes you feel proud. It is the king of the river.
PAUSE_FISH_10=A rare fish that lives only in waste oil.\nIts body is covered in oil, so its true form is almost invisible.
PAUSE_FISH_11=A carnivorous crustacean that once lived in fresh water.\nIts body is less than 1mm long, but its abnormally developed arms give it considerable strength.
PAUSE_FISH_12=A rare fish with a head at both ends of its body. However, this is only during its juvenile stage.\nAfter one year, the larger head becomes the true head, and the other half gives up and becomes the tail.
PAUSE_FISH_13=A large ancient fish.\nIt used to live in the deep sea and was few in number, but in recent years it has begun to appear in shallow waters.
PAUSE_FISH_14=A poisonous fish. Oral intake causes symptoms of poisoning accompanied by hallucinations.\nSome androids use this component to produce drugs, but you should never touch them.
PAUSE_FISH_15=A large fish that swims at high speed.\nIt has no particular use, but catching it makes you feel proud. It is the king of the sea.
PAUSE_FISH_16=A poisonous fish. It is widely distributed, but oral intake is prohibited because it contains a component that coagulates android body fluids.\nIt has no effect on the human body, and in fact, humans used to eat it.
PAUSE_FISH_17=An arthropod that lives in shallow waters.\nAmong some female androids, a unique costume with its shell placed on both breasts has gained a cult-like popularity.
PAUSE_FISH_18=A beetle that was originally a land insect, but its body tissue continued to enhance its water storage function, resulting in its evolution into an aquatic creature.\nIts dorsal fin still retains the function of its former wings, and it is valuable as a subject for research on biological evolution.\nIt is extremely rare and has only been sighted in desert regions.
PAUSE_FISH_19=It moves using its five arms and eats dead fish and shellfish with the mouth in the center of its belly.\nIt is friendly and will approach if you hold out your hand.
PAUSE_FISH_20=Like the horse mackerel, it is widely distributed.\nIt is one of the few species caught by some androids as a pseudo-food.\nAndroids do not need to eat, but there is no end to those who imitate eating out of admiration for humanity.
PAUSE_FISH_21=A very large shark.\nHowever, it has a gentle personality and eats phytoplankton.
PAUSE_FISH_22=A machine lifeform resembling a killifish.\nDue to its lovely appearance, some killifish enthusiast androids capture and raise this species, but the YoRHa forces' high command frowns upon it.
PAUSE_FISH_23=A machine lifeform resembling a carp.\n\nIt is presumed that fish-type machine lifeforms, not just this carp-type, were intended to exterminate the fish that were one of humanity's food sources. Whether they were modeled after native species or not, their shape is very similar to native species.\nFish-type machine lifeforms raged, and the ecosystem of Earth's aquatic life changed greatly, dealing a major blow to humanity.\nAfter achieving their purpose, maintenance of fish-type machine lifeforms was neglected, and as a result, they gradually became wild and began to behave like real fish.\nTherefore, they are no longer observed to be hostile to native species or androids, and like other fish, they act with their own survival as their primary goal.\nUnlike land-based machine lifeforms, they are not information-synchronized, so their intelligence has not developed at all.\n\nAlso, many now have a symbiotic relationship with fish. A common example is having fish eat the moss, barnacles, and other sessile organisms attached to their bodies, and in return, they protect the fish from predators. In other words, they are having the fish perform maintenance on them.\nIt is interesting that as a result of becoming wild, they are acting in a way that is the complete opposite of their original purpose.\n\nRecent research has pointed out the existence of a new ecosystem woven by the symbiotic relationship between fish-type machine lifeforms and native creatures.\nAs machine lifeforms promote the protection and nurturing of their own fish colonies for self-preservation, the distribution of aquatic life is expanding.\nThe distribution map is naturally very different from when humans were on Earth, but the distribution amount is about to surpass the past distribution amount. When humans return to Earth, they will surely be surprised by the change in the ecosystem.\nHowever, a further great change awaits beyond this prosperity. The birth of new fish-type machine lifeforms has not been observed, and if this situation continues, it is believed that they will become extinct in about 150 years.\nWhat kind of change will occur when the guardians are lost and only the native species remain is currently under investigation.
PAUSE_FISH_24=A fish-type machine lifeform resembling a pirarucu.\nDue to its large size, it has no natural enemies and stands at the top of the underwater ecosystem. It always seems bored, swimming near the surface.
PAUSE_FISH_25=A fish-type machine lifeform resembling a crucian carp. It is harmless.
PAUSE_FISH_26=A fish-type machine lifeform resembling a lumpsucker.\nVarious minerals are stored in the part that would be the swim bladder in a lumpsucker, so it is traded at a slightly high price on the market.
PAUSE_FISH_27=A fish-type machine lifeform resembling a pufferfish.\nUnlike a real pufferfish, it is not poisonous, but its jaw is developed, so if it bites you, it will make a hole in your body, so be careful.
PAUSE_FISH_28=A fish-type machine lifeform resembling a marlin.\nIt has a power incomparably stronger than a real marlin, so it is very difficult to catch. It is an object of admiration among fishing enthusiast androids.
PAUSE_FISH_29=A machine lifeform resembling a starfish.\nIts motor functions are the same as a starfish, so it is hard to imagine that its purpose was to exterminate fish and cut off humanity's food source. Researchers have yet to conclude why it was created.
PAUSE_FISH_30=A fish-type machine lifeform resembling a sea bream.\nIt has a fierce temperament, and many androids are injured when they catch it.
PAUSE_FISH_31=A fish-type machine lifeform resembling a coelacanth.\nIt lives in the deep sea and is rarely seen due to its small numbers. Because they occupied the coelacanth's habitat, the coelacanth was forced to move to shallow waters.
PAUSE_FISH_32=A fish-type machine lifeform resembling a horse mackerel.\nLike a real horse mackerel, oral intake causes symptoms of poisoning. However, it only makes the whole body itchy and is not serious.
PAUSE_FISH_33=A fish-type machine lifeform resembling a horseshoe crab.\nAmong some male androids, a unique costume with its shell placed on both shoulders has gained a cult-like popularity.
PAUSE_FISH_34=A fish-type machine lifeform resembling an arowana.\nA rare machine lifeform that lost to a native species. It seems that the real arowana had a fiercer temperament.
PAUSE_FISH_35=A fish-type machine lifeform resembling a basking shark.\nLike the basking shark, it has a gentle personality. It is often seen swimming friendly with basking sharks.
PAUSE_FISH_36=A fish-type machine lifeform resembling a freshwater ray.\nPerhaps due to a bad model during production, its tail is split in two.
PAUSE_FISH_37=The head part of a golden, shining machine lifeform.\nIts metal parts are highly valuable and are traded at a high price on the market.
PAUSE_FISH_38=A tire from a Resistance-owned vehicle.\nIncidents of ships loaded with supplies being attacked and sunk are frequent, so not only tires but many android supplies are sunk at the bottom of the sea.
PAUSE_FISH_39=A gas fuel storage container owned by the Resistance.\nThere is a risk of explosion, so disposal is prohibited. The manager can be identified by the code engraved on the bottom, so those who deliberately dispose of gas cylinders will be severely punished by the YoRHa forces.
PAUSE_FISH_40=A battery owned by the Resistance.\nDiscarded batteries disappear after a while, and it is believed that machine lifeforms are taking them away.
PAUSE_FISH_41=A portable anti-machine lifeform rocket launcher.\nIt is the main weapon of the Resistance when fighting machine lifeforms and is effective against large machine lifeforms.\n\nIt is called "Ano Itai Yatsu" (That Ouchie Thing) by the machine lifeforms.
PAUSE_QUEST_HELP_Q120/RUN_1=The tool shop at the Resistance camp could not handle plug-in chips due to malfunctioning equipment.\nOn behalf of the shop owner, who has a bad leg, obtain the following items to repair the broken equipment.
PAUSE_QUEST_HELP_Q120/CLR=Deliver the obtained items to the shop owner.
PAUSE_QUEST_HELP_Q120/DONE=The equipment repair was completed, and the handling of plug-in chips has resumed.\nYou suggested to the shop owner that he fix his leg with the leftover materials, but he was afraid of losing the only original part he had left.
PAUSE_QUEST_HELP_Q121/RUN_1=The manager at the Resistance camp has been worried about something lately and can't focus on her work.\nTo solve her problem, search for a "box that makes a sound when opened."
PAUSE_QUEST_HELP_Q121/CLR=Deliver the rusty music box to the manager.
PAUSE_QUEST_HELP_Q121/DONE=You gave the rusty music box to the manager.\nThe android who seemed to be the owner was an acquaintance, but she said nothing and held the music box preciously.
PAUSE_QUEST_HELP_Q122/RUN_1=You received a request for cooperation from Anemone to resume the forest survey.\nExterminate the enemies at the planned camp site.
PAUSE_QUEST_HELP_Q122/CLR=Report to Anemone that the enemy extermination is complete.
PAUSE_QUEST_HELP_Q122/DONE=The safety of the forest was secured, and an outpost camp was successfully established.
PAUSE_QUEST_HELP_Q123/RUN_1=Anemone seemed to remember something upon hearing the name of the old-model android A2.\nShe, who would not say anything, asked for more information on A2.\nBut where should you go...?
PAUSE_QUEST_HELP_Q123_1_1/RUN_1=The investigation site was marked based on the energy reaction released during combat.\nInvestigate the abandoned factory where A2's energy reaction is present.
PAUSE_QUEST_HELP_Q123_1_1/DONE=2B and the others obtained data related to A2 at the abandoned factory.\nTo obtain more information, search for data related to A2 at the abandoned factory where the energy reaction is present.
PAUSE_QUEST_HELP_Q123/CLR=The investigation of all points with energy reactions is complete.\nGive the data to Anemone.
PAUSE_QUEST_HELP_Q123/DONE=Anemone looked at the data and confirmed that A2 was the same person as the android she knew. She had once fought alongside A2, and the unit led by A2 was wiped out at that time.\nWhen you told Anemone that A2 was a deserter and that Command had issued an order for her destruction, she was surprised and speechless.
PAUSE_QUEST_HELP_Q140/RUN_1=A woman at the Resistance camp consulted you that a colleague had not been seen for a while.\nTo find the whereabouts of the missing Resistance member, investigate the material storage area where he worked.
PAUSE_QUEST_HELP_Q140/CLR=From the data of the machine lifeform and the man, it was revealed that it was a tragedy resulting from them luring each other out, both having had their comrades killed.\nReport the details of the incident to the woman at the Resistance camp.
PAUSE_QUEST_HELP_Q140/DONE=You told the woman the details of the incident.\nShe seemed very sad, but she also seemed to have a plan...
PAUSE_QUEST_HELP_Q140/END=The woman's behavior is concerning.\nVisit the woman at the Resistance camp.
PAUSE_QUEST_HELP_Q140/FIN=When you went to the Resistance camp, the woman had disappeared.\nYou learned from a man nearby that the woman had left with a weapon.
PAUSE_QUEST_HELP_Q150/RUN_1=Jackass at the desert outpost camp is investigating android excitement during combat.\nShe wants to get the latest combat data for further functional enhancement.\nDestroy the machine lifeforms in the desert area.
PAUSE_QUEST_HELP_Q150/RUN_4=The target data collection is complete. Report to Jackass.
PAUSE_QUEST_HELP_Q150/RUN_5=The excitement in combat seems to be very similar to human "love."\nAnd Jackass seems to be thinking about the next task...
PAUSE_QUEST_HELP_Q150/RUN_6=To get more detailed data, destroy all target machine lifeforms "without taking any damage."
PAUSE_QUEST_HELP_Q150/DONE=The developed medicine is so popular that once you use it, you can't stop, but it seems to have a side effect of making you a little mentally unstable.\nYou received a sample of the medicine from Jackass and were told that you could get it from the Resistance member at the desert oil field.
PAUSE_QUEST_HELP_Q290/RUN_1=A machine lifeform in the amusement park ruins who wants to prepare something to play with asks for materials to make a game.\nObtain the following items from the machine lifeforms in the amusement park ruins.
PAUSE_QUEST_HELP_Q290/CLR=Deliver the obtained items to the client machine lifeform.
PAUSE_QUEST_HELP_Q290/DONE=The machine lifeform in the amusement park ruins used the materials to create a hacking game.\nFind the hidden bug and clear the hacking game.
PAUSE_QUEST_HELP_Q340/RUN_1=A woman at the Resistance camp has memory loss from a previous battle and is worried that she can't remember the details of a photo she holds dear.\nOn her behalf, identify the locations in the three faded photos.
PAUSE_QUEST_HELP_Q340_1_1/CLR=One of the photos was from the desert area.\nGive the restored photo and coordinates to the woman.
PAUSE_QUEST_HELP_Q340_1_2/CLR=One of the photos was from the amusement park ruins.\nGive the restored photo and coordinates to the woman.
PAUSE_QUEST_HELP_Q340_1_3/CLR=One of the photos was from the forest.\nGive the restored photo and coordinates to the woman.
PAUSE_QUEST_HELP_Q340/DONE=The woman looked at the restored photos and gradually regained her memories.\nThe three faded photos she had were the last data transferred from her lover who died in the war.
PAUSE_QUEST_HELP_Q590/RUN_1=A Resistance man who is investigating the old world asks for your cooperation.\nUsing a target scanner, find the past relics buried in the sand.
PAUSE_QUEST_HELP_Q590_1_1/CLR=You obtained an old staff.
PAUSE_QUEST_HELP_Q590_1_1/DONE=You gave the old staff to the investigator. It seems it was used in some kind of ceremony in the old world's desert area.
PAUSE_QUEST_HELP_Q590_1_2/CLR=You obtained a stone tablet with rules written on it.
PAUSE_QUEST_HELP_Q590_1_2/DONE=You gave the stone tablet with rules written on it to the investigator. It seems that long ago, the people of the desert area lived according to many rules.
PAUSE_QUEST_HELP_Q590_1_3/CLR=You obtained a dirty mask.
PAUSE_QUEST_HELP_Q590_1_3/DONE=You gave the dirty mask to the investigator. It seems this was once worn by the people of the desert area.
PAUSE_QUEST_HELP_Q590/CLR=You obtained a statue of a girl. Deliver the obtained relics to the investigator.
PAUSE_QUEST_HELP_Q590/DONE=According to the investigator, the statue of the girl is in a bridal costume.\nThe desert area was once called the "City of Masks." The people of the "City of Masks" used a strange language and lived with their own unique costumes and culture.\nThe Resistance member, having finished his investigation of the desert area, mused on the human civilization that once existed.
PAUSE_QUEST_HELP_Q650/RUN_1=On behalf of the maintenance person, organize the material storage area.\nObtain the following items from the messy warehouse.
PAUSE_QUEST_HELP_Q650/CLR=Deliver the obtained items to the maintenance person.
PAUSE_QUEST_HELP_Q650/DONE=You gave the luggage to the maintenance person and warned him about the messy warehouse.\nThe disastrous state of the warehouse was apparently caused by his superior, and the person in charge apologized sheepishly.
PAUSE_QUEST_HELP_Q651/RUN_1=On behalf of the maintenance person, organize the material storage area.\nObtain the following items from the warehouse, which is even messier than before.
PAUSE_QUEST_HELP_Q651/CLR=Deliver the obtained items to the maintenance person.
PAUSE_QUEST_HELP_Q651/DONE=When you gave the luggage to the maintenance person, he apologized sheepishly for the disastrous state of the warehouse.\nIt seems he is always made to clean up after his superior, who always makes a mess of the warehouse.
PAUSE_QUEST_HELP_Q652/RUN_1=You visited the maintenance person at the material storage area, but he was not there.\nWhen you asked a colleague nearby where he was, he said that he went to the desert camp to deliver luggage and has not returned.\nOn behalf of the worried colleague, search for the maintenance person.
PAUSE_QUEST_HELP_Q652/DONE=The maintenance person was trapped in a temporary luggage storage area and was asking for help. It seems he got caught up when his superior haphazardly pushed in the luggage and couldn't get out.\nAfter you managed to rescue him by organizing the messy luggage, his superior appeared. She had come to teach the man how to make bombs to organize the messy luggage.
PAUSE_QUEST_HELP_Q720/RUN_1=A man at the Resistance camp asks you to find his lost comrades. All his comrades can apparently handle two weapons.\nHead to the flooded city where the last communication was confirmed.
PAUSE_QUEST_HELP_Q720_1_1/DONE=In the flooded city, a Resistance member's corpse was lying around. It seems he fled from a battle.\nYou collected the dog tag he was wearing.\nSince rescue signals were being sent from other Resistance members in the amusement park ruins and the abandoned factory, head there to investigate.
PAUSE_QUEST_HELP_Q720_1_2/DONE=The Resistance member who sent the rescue signal from the abandoned factory was already dead.
PAUSE_QUEST_HELP_Q720_1_3/DONE=The Resistance member who sent the rescue signal from the amusement park ruins was already dead.
PAUSE_QUEST_HELP_Q720/RUN_2=A new emergency support request had arrived at the dead Resistance member's location.\nTo save the Resistance member, head to the desert.
PAUSE_QUEST_HELP_Q720/CLR=The Resistance member in the desert area had been killed by a tank-type machine lifeform.\nDeliver the collected mementos to the client.
PAUSE_QUEST_HELP_Q720/DONE=The man who received his comrades' mementos mourned their deaths with the flowers that bloomed in the camp as an offering.
PAUSE_QUEST_HELP_Q720/FIN=9S, having learned of the custom of mourning the dead from old human records, builds a grave for 2B. So that she may rest in peace in a place where beautiful white flowers bloom.
PAUSE_QUEST_HELP_Q770/RUN_1=The weaponsmith at the Resistance camp was in trouble because his maintenance device was broken and he couldn't maintain weapons. He can repair it with materials found in the center of the city ruins, but he can't get close because of aggressive machine lifeforms nearby.\nOn behalf of the weaponsmith, obtain the following items in the center of the city ruins.
PAUSE_QUEST_HELP_Q770/CLR=Deliver the obtained items to the weaponsmith.
PAUSE_QUEST_HELP_Q770/DONE=The maintenance device repair was completed, and he can now maintain weapons.\nThe weaponsmith was happy that he could resume business, but he had mixed feelings, wondering if making weapons to protect his comrades was actually hastening their deaths.\nTalk to the weaponsmith again to confirm that he has resumed business.
PAUSE_QUEST_HELP_Q770/FIN=It seems the weaponsmith was able to resume business safely.\nYou received weapon upgrade materials as thanks for the repair.
PAUSE_QUEST_HELP_Q900/RUN_1=Chase after the strange Emil and head to the desert area.
PAUSE_QUEST_HELP_Q900/DONE=Emil was replicated many times for the war and suffered through the long, endless war.\nSome of the copied Emils lost their sanity and went on a rampage, but when they remembered their precious memories, they regained their sanity and all ceased to function at once.
PAUSE_QUEST_HELP_Q070/RUN_1=A hut stood in the depths of the forest where animals were being raised.\nWhen you approached the hut out of curiosity, a machine lifeform riding a boar appeared from behind and suddenly attacked.\nRespond to the attack from the machine lifeform.
PAUSE_QUEST_HELP_Q070/DONE=The machine lifeform that appeared riding a boar was taking care of and protecting the animals.\nFeeling that the machine lifeform that takes care of animals was strange but not hostile, you left the hut.
PAUSE_QUEST_HELP_Q071/RUN_1=The machine lifeform at the forest animal hut was standing there looking troubled. When you asked him what was wrong, he said that a deer he was protecting had fallen ill, but he didn't know how to treat it. On behalf of the machine lifeform, find something in the commercial facility ruins that could be a medicine recipe.
PAUSE_QUEST_HELP_Q071/CLR=You found a medicine recipe, so deliver it to the owner of the forest hut.
PAUSE_QUEST_HELP_Q071/DONE=The sick deer recovered safely thanks to the medicine, and the animal hut's machine lifeform was relieved. He then confessed that he found it strange that animals, unlike machine lifeforms, could not be easily repaired and had warmth.
PAUSE_QUEST_HELP_Q072/RUN_1=The machine lifeform at the forest animal hut was standing there looking troubled again. When you asked him what was wrong, he said that animals from other places had a strong sense of territory and were harming the surrounding animals. To protect the animals, head to the depths of the forest.
PAUSE_QUEST_HELP_Q072/RUN_2=The one leading the pack of ferocious animals was a machine lifeform. Behaving just like a real animal, that individual let out a roar and attacked.\nRepel the machine lifeform leading the pack of animals.
PAUSE_QUEST_HELP_Q072/CLR=Tell the machine lifeform at the forest animal hut that you have driven away the pack.
PAUSE_QUEST_HELP_Q072/DONE=The machine lifeform was relieved to hear that the pack of ferocious animals had left the forest. You also told him that you had destroyed a fellow machine lifeform, but he didn't seem to mind.
PAUSE_QUEST_HELP_Q130/RUN_1=There was a fatigued female Resistance member inside a building in the city ruins.\nWhen you spoke to her, she said that she had lost her memories before and after the big explosion in the city ruins the other day. She asked for your help in retrieving her friend's last memories from a broken pod's life log.\nHack into the broken pod and retrieve the life log.
PAUSE_QUEST_HELP_Q130/RUN_2=When you retrieved the life log, you found out that it was a Resistance member wearing a red hood who killed her friend.\nTo find this red-hooded culprit, head to the Resistance camp.
PAUSE_QUEST_HELP_Q130/RUN_4=According to the red-hooded Resistance member, this hood was a gift from a female Resistance member stationed in the desert. To find the source, head to the desert garrison.
PAUSE_QUEST_HELP_Q130/RUN_5=You couldn't find a female Resistance member at the desert garrison.\nAccording to a male Resistance member there, the female Resistance member staying in the desert is in the desert cave.\nHead to the desert cave and look for the female Resistance member.
PAUSE_QUEST_HELP_Q130/RUN_6=According to Jackass, the female Resistance member in the desert cave, this red hood was suddenly sold to her by a red-haired female Resistance member. The description closely matched the client.\nTo find out the truth, head to the client's location.
PAUSE_QUEST_HELP_Q130/RUN_7=When you told the client that it was possible she was the original owner of the red hood, she became anxious.\nThe client asked you to retrieve more life logs from the broken pod to find out the truth.\nHack into the deep area of the broken pod and retrieve more life logs.
PAUSE_QUEST_HELP_Q130/DONE=Thanks to the further life logs, the client remembered her lost memories.\nShe was a YoRHa E-type. E-types hide their identities, mingle with the Resistance, and eliminate deserters and traitors. But the last person she killed was her best friend. The memory was so painful that she had erased her own memories. When the memory returned, the female Resistance member became emotionally unstable due to the mental strain.
PAUSE_QUEST_HELP_Q240/RUN_1=There is a doctor-like robot in a corner of Pascal's village.\nWhen you talk to him, he introduces himself as a genius inventor and asks you to invest in his inventions.\nInvest in the doctor robot.
PAUSE_QUEST_HELP_Q240/DONE=After a further huge investment, the self-proclaimed genius robot began to prepare for a once-in-a-lifetime invention.\nAfter a while, a structure that stretched high into the sky appeared in the distance.\nAnd, according to the doctor robot, that structure was built as a launch pad to go to the moon, but it couldn't reach the moon and instead arrived on Mars, which he was very frustrated about.
PAUSE_QUEST_HELP_Q250/RUN_1=When you talked to Pascal, he said that the children in the village are learning about currency and economy, and that he would like you to listen to their stories if you have time.\nWhen you looked at the excited children in a corner of the village, one of them asked which coin you wanted, a cheap one or an expensive one, and when you said you wanted the cheap one, the other children laughed at you. To investigate the structure of its thought circuit, hack into the child robot.
PAUSE_QUEST_HELP_Q250/DONE=The robot's circuit was formed with an advanced thought circuit.\nWhen you asked it why it acted foolishly despite having an advanced circuit, the robot explained that acting foolishly got it more coins, and asked you to keep its intelligence a secret.\nSeeing this robot's behavior made you wonder what it means to be smart.
PAUSE_QUEST_HELP_Q330/RUN_1=While you were looking at the lunar tears blooming in the commercial facility ruins, Emil suddenly appeared.\nEmil said that looking at these flowers brings back various memories and fills him with an emotion he doesn't quite understand, and he wants to know what this emotion is.\nFind the lunar tears in various places.
PAUSE_QUEST_HELP_Q330/DONE=In the basement of the commercial facility ruins, there was a space where lunar tears bloomed all over.\nThen Emil appeared and said that he was once made as a weapon. And that he was one of countless Emils replicated in the war against the aliens. This place was a favorite of the original Emil, and he said that echoes of that feeling remained in him, speaking somewhat sadly.
PAUSE_QUEST_HELP_Q440/RUN_1=You got information from a resident of Pascal's village who speaks in broken sentences that there is a treasure in the Forest Kingdom.\nSearch for the hidden treasure in the Forest Castle.
PAUSE_QUEST_HELP_Q440/RUN_4=Search for a door in the Forest Castle that matches the key.
PAUSE_QUEST_HELP_Q440/RUN_5=A ferocious machine lifeform has appeared. It seems there is something ahead...
PAUSE_QUEST_HELP_Q440/DONE=The treasure of the Forest Kingdom was a memory medium that recorded the history of the king's country, created by the machine lifeforms of the Forest Kingdom to express their gratitude to the first Forest King.\nWhen you told the resident of Pascal's village who speaks in broken sentences about this, he said that he was once discriminated against by the people of the Forest Kingdom because of his strange way of speaking. And he rejoiced at the destruction of the grave-keeper robot and cursed the Forest Kingdom, wishing they would all die.
PAUSE_QUEST_HELP_Q550/RUN_1=In the Forest Castle, there was an android of the same type as 9S, 4S, who survived the Bunker's collapse.\nEven though the YoRHa forces were wiped out, he continued to collect enemy individual information without giving up.\nAnd he asked 9S to share information because he couldn't do it alone.\nCollect new enemy data and give the information to 4S in the Forest Castle.
PAUSE_QUEST_HELP_Q550/DONE=4S felt regret that he was the only one who survived while many of his comrades died.\nHe was grateful that the collection was completed much earlier than planned and told 9S not to have any regrets, and revealed that he would think about how to live from now on.
PAUSE_QUEST_HELP_Q540/RUN_1=You received an urgent mission email from Command. The mission was to search for and deal with YoRHa members 8B, 22B, and 64B, who had deserted and were rampaging through the Resistance camp.\nSearch for the deserted YoRHa members.
PAUSE_QUEST_HELP_Q540/DONE=When you told Anemone what had happened, she said she had not received any reports of YoRHa theft and looked puzzled.\nWhen you reported this to Command to confirm, you were denied access to the case by order of the Commander.
PAUSE_QUEST_HELP_Q660/RUN_1=At the renewed amusement park, you are given a stamp card by a machine lifeform at the reception. It seems that if you collect all the stamps, you will be given a gorgeous prize.\nTour the various parts of the amusement park ruins and collect the stamps.
PAUSE_QUEST_HELP_Q660/CLR=You have collected all the stamps.\nReceive your gorgeous prize at the reception of the amusement park ruins.
PAUSE_QUEST_HELP_Q660/DONE=When you tell the reception that you have collected all the stamps, you are given a prize.\nAnd the robot at the reception said that whether or not one can enjoy entertainment depends only on one's own state of mind, and that this facility is like a mirror that reflects that.
PAUSE_QUEST_HELP_Q800/RUN_1=You are suddenly called out by a machine lifeform standing in front of a house in Pascal's village, saying "Help me! Help me!"\nWhen you ask what's wrong, it seems his son has locked himself in the house with an electronic lock and has become a shut-in.\nTo get the son out, hack the door.
PAUSE_QUEST_HELP_Q800/DONE=When you opened the door by hacking, the son robot reluctantly came out.\nWhen you asked him why he became a shut-in, he said that being disconnected from the network made him unable to understand what others were thinking, and that scared him.\nHowever, thanks to his mother robot's persuasion, the problem was safely resolved.
PAUSE_QUEST_HELP_Q801/RUN_1=When you approached the house in Pascal's village where the son had previously shut himself in, the mother robot called out to you again for help.\nWhen you talked to her, it seems her son robot had become a shut-in again, and she was in trouble because the electronic lock was even stronger.\nTo get the son out, hack the door.
PAUSE_QUEST_HELP_Q801/DONE=When you opened the door by hacking, the son robot reluctantly came out again.\nWhen you asked him why he became a shut-in again, he said that after he went outside, he found a robot he was interested in, but every time he saw that robot, his thought circuit was on the verge of shorting out, and that was a new and scary feeling.\nHowever, with his mother's persuasion, the son decided to try his best outside again.
PAUSE_QUEST_HELP_Q802/RUN_1=The mother robot of the formerly shut-in son in Pascal's village was standing there looking troubled again.\nWhen you talked to her, as expected, her son had become a shut-in again, and had installed an unprecedentedly strong electronic lock.\nTo get the son out, hack the door.
PAUSE_QUEST_HELP_Q802/DONE=When you opened the door by hacking, the son robot came out looking frustrated.\nWhen you asked him why he became a shut-in again, he said that he had tried his best outside this time, but he realized that it was easiest when he was a shut-in. And now, he aims to become the strongest shut-in and will develop an electronic lock that no one can solve.
PAUSE_QUEST_HELP_Q160/RUN_1=To improve the communication environment between the surface and the Bunker, you took on a mission to transport materials to the Resistance. The information on the necessary materials will be conveyed on the surface. Descend to the surface and wait for contact from Command.
PAUSE_QUEST_HELP_Q160/READY=To improve the communication environment of the Resistance camp, obtain the following items.
PAUSE_QUEST_HELP_Q160/CLR=Deliver the collected items to Anemone.
PAUSE_QUEST_HELP_Q160/DONE=Anemone, who received the materials, pressed a reward into your hand.\nAlthough you won't report it to the Commander, you felt complicated about the unexpected reward.
PAUSE_QUEST_HELP_Q170/RUN_1=You received a message from Operator 6O that an access point installed in the city ruins seems to be malfunctioning. Details will be sent by email.\nRestore the malfunctioning access point.
PAUSE_QUEST_HELP_Q170/CLR=Several machine lifeforms were loitering around the access point. It is thought that the jamming signals they were emitting were the cause of the malfunction.\nAccess the access point to check for normal operation and report the restoration of the access point.
PAUSE_QUEST_HELP_Q170/DONE=Operator 6O promised to share the information with Command.\nAfter the series of reports was over, she showed a strong interest in the mission activities of the attacker model. It seems she longs for the surface.\nReceive the reward email from the operator.
PAUSE_QUEST_HELP_Q171/RUN_1=You decided to send data of a rare flower as a gift to Operator 6O, who longs for the surface.\nTo take a photo for transfer, collect the following items.
PAUSE_QUEST_HELP_Q171/CLR=You found a "desert rose." Capture its mystical appearance in a photo and transfer it to Operator 6O.
PAUSE_QUEST_HELP_Q171/DONE=You received a message from Operator 6O. She seemed moved by the photo of the "desert rose" and was thinking about the scenery of the surface.\nReceive the reward email from the operator.
PAUSE_QUEST_HELP_Q180/RUN_1=Operator 21O is engrossed in her hobby of data analysis. You teased her about her pastime, but she turned the tables and made you cooperate.\nHead to the abandoned factory and infiltrate the information terminal that cannot be accessed from the satellite.\nThe terminal is apparently in a hard-to-find place in the factory.
PAUSE_QUEST_HELP_Q180/CLR=You have collected the data from the target information terminal.\nTo transmit the data, move to an outdoor location with good signal strength.
PAUSE_QUEST_HELP_Q180/DONE=Data transmission is complete. According to Operator 21O's analysis, a diary written by a human was left behind.\nSatisfied, Operator 21O unilaterally cut off communication.\nReceive the reward email from the operator.
PAUSE_QUEST_HELP_Q181/RUN_1=You were half-forced into a request by Operator 21O, whose hobby is data analysis.\nCheck the email she sent you.
PAUSE_QUEST_HELP_Q181/CLR=You collected various traces in the mammoth housing complex.\nOperator 21O's analysis revealed that humans lived in groups of a certain number of people called "families."\nTo receive your reward, receive the email at an access point.
PAUSE_QUEST_HELP_Q181/DONE=After talking for a while, Operator 21O unilaterally cut off communication.\nReceive the reward email from the operator.
PAUSE_QUEST_HELP_Q210/RUN_1=You met a machine lifeform in a dark canyon.\nFrom her story, you learned about a hostile individual who is considered a dangerous factor.\nProceed through the canyon and destroy the indiscriminately rampaging machine lifeform.
PAUSE_QUEST_HELP_Q210/CLR=You have successfully destroyed the rampaging machine lifeform.\nHead to the machine lifeform who provided the information.
PAUSE_QUEST_HELP_Q210/DONE=You told the machine lifeform in the canyon what had happened.\nShe seems to be staying here to pray for the souls of her comrades to reach heaven.
PAUSE_QUEST_HELP_Q220/RUN_1=Pascal asks you to defeat a machine lifeform that is attacking the children.\nTo eliminate the dangerous individual who also attacks his own kind, head to the children's playground.
PAUSE_QUEST_HELP_Q220/CLR=Report the completion of the machine lifeform's destruction to Pascal.
PAUSE_QUEST_HELP_Q220/DONE=Pascal is relieved by the report.\nYou were able to save him and his peace-loving children, but as a result, you were swarmed by a large number of machine lifeforms.
PAUSE_QUEST_HELP_Q221/RUN_1=The machine lifeform children are pestering you for play equipment.\nBuy a toy at the tool shop in Pascal's village.
PAUSE_QUEST_HELP_Q221/RUN_2=The tool shop owner asks you to collect materials for a toy.\nCollect the following items in the amusement park ruins.
PAUSE_QUEST_HELP_Q221/CLR=New play equipment has been installed in the village.\nTalk to the children.
PAUSE_QUEST_HELP_Q221/DONE=You receive a reward from the happy children.\nYou felt complicated emotions seeing them having fun.
PAUSE_QUEST_HELP_Q222/RUN_1=Pascal confides that there is a sick child in the village.\nIf left alone, the child's life is in danger.\nGo to the abandoned factory and collect the following items needed for repair.
PAUSE_QUEST_HELP_Q222/CLR=Deliver the collected items to Pascal.
PAUSE_QUEST_HELP_Q222/DONE=Pascal, who received the memory element materials.\nBefore his concern for the child, you simply received your reward and left.
PAUSE_QUEST_HELP_Q040/DONE=When you safely delivered the child robot to its mother, the robot parent and child were able to reconcile.\nAnd the mother robot said that in a state disconnected from the network, she has no idea what her child is thinking. That's why the happiness of being able to understand each other like this is great, she said happily.
PAUSE_QUEST_HELP_Q110/CLR=At the entrance to the desert area, the little sister robot said thank you and left.\nI wonder if she made it back to Pascal's village safely.
PAUSE_QUEST_HELP_Q110/DONE=It seems the little sister robot was able to reunite with her big sister robot.
PAUSE_QUEST_HELP_Q300/DONE=You won the third race.\nThe machine lifeform, with no regrets left, was satisfied and scattered its body.
PAUSE_QUEST_HELP_Q360/RUN=You found a machine lifeform standing on a high place in the city ruins.\nTo find out the reason for its behavior, analyze its thought circuit.\nHack the machine lifeform on the high place.
PAUSE_QUEST_HELP_Q360/CLR=The machine lifeform that was standing on the high place threw itself off.\nHead to the machine lifeform's landing spot.
PAUSE_QUEST_HELP_Q360/DONE=The machine lifeform, distressed about the meaning of its existence, which was created to fight, considered itself an unnecessary being and jumped from a high place, scattering its body.
PAUSE_QUEST_HELP_Q500/CLR=The female android was repaired by Pascal and was able to safely reunite with the male android. They want to initialize their memories.
PAUSE_QUEST_HELP_Q500/DONE=It seems the female android is initializing only his memory and changing his personality to her liking. This seems to be the sixth time she has formatted him.
PAUSE_QUEST_HELP_Q520/CLR=But it was old world information about nuclear weapons. Since it's dangerous information, it might be better to deliver it to the Commander...\nDeliver the "information about nuclear weapons" to either Pascal or the Commander.
PAUSE_QUEST_HELP_Q560/CLR=Deliver the obtained items to Devola and Popola.
PAUSE_QUEST_HELP_Q560/DONE=Devola and Popola thanked you for the materials.\nIt seems they are using their high technical skills to create daily necessities for the camp.
PAUSE_QUEST_HELP_Q561/CLR=Deliver the obtained items to Devola and Popola.
PAUSE_QUEST_HELP_Q561/DONE=You gave the obtained desert roses to Devola and Popola.\nGo ask Anemone why they are being made to do such harsh labor.
PAUSE_QUEST_HELP_Q562/CLR=Deliver the obtained items to Devola and Popola.
PAUSE_QUEST_HELP_Q562/DONE=You received liquor made from "desert roses" as a thank you.\nIt seems that when Popola drinks liquor, terrible things happen.
PAUSE_QUEST_HELP_Q532/CLR=Deliver the obtained items to the forest tool shop.
PAUSE_QUEST_HELP_Q532/DONE=You gave the items to the forest tool shop.\nIt seems meat is best when seasoned with salt and pepper and grilled over a charcoal fire.\nHe will continue his research in the future so that he can secure enough food when humans come.
PAUSE_QUEST_HELP_Q640/CLR=Deliver the obtained plug-in chip to the Resistance member.
PAUSE_QUEST_HELP_Q640/DONE=When you gave him the plug-in chip, the Resistance member was happy and said he would introduce you to his family next time you meet. Does he have a family somewhere?
PAUSE_QUEST_HELP_Q640/FIN=However, it seems they were attacked and killed by machine lifeforms.
PAUSE_QUEST_HELP_Q680/CLR=You have eliminated the hostile machine lifeforms. Check on the clown's condition.
PAUSE_QUEST_HELP_Q680/DONE=You have successfully escorted the machine lifeform. It seems they are planning to hold another parade in a different location. The clown, who successfully held the parade, was happy but also seemed sad that their activities were not recognized by their own kind.
PAUSE_ENEMY_999a=A machine lifeform that has become ferocious due to Eve's infection. It attacks androids and tries to prey on them.\n\nThe armor on its head has peeled off, and the parts that look like teeth are just metal pipes and do not function as a mouth.\nIt is presumed that it came to have this appearance as a result of seeking an optimal structure. Or perhaps the aliens made it in their own image, but the truth is unknown.
PAUSE_ENEMY_999b=A machine lifeform that has become ferocious due to the influence of the "Tower's" appearance. It tries to cannibalize and absorb the surrounding machine lifeforms.\n\nThe armor on its head has peeled off, and the parts that look like teeth are just metal pipes and do not function as a mouth.\nIt is presumed that it came to have this appearance as a result of seeking an optimal structure. Or perhaps the aliens made it in their own image, but the truth is unknown.
PAUSE_ENEMY_0421=It has inherited the memory left by the first Forest King.
