M5222_S0010_G0000_001_pascal=Ah, A2-san.
M5222_S0010_G0010_001_pascal=Thank you again for the playground. I'm truly grateful...
M5222_S0010_G0020_001_pascal=Those children are...
M5222_S0010_G0030_001_pascal=No... they are treasures to this village, and our hope for the future.
M5222_S0010_G0040_001_pascal=Do you think it's strange for us Machine Lifeforms to speak of the future?
M5222_S0010_G0050_001_a2=...Who knows.
M5222_S0010_G0060_001_pascal=I'm sure those children will endure this barren conflict and carve open a new path for themselves.
M5222_S0010_G0070_001_pascal=That's what I believe. But...
M5222_S0010_G0080_001_pascal=Actually, one of the village children has a faulty memory element.
M5222_S0010_G0090_001_pascal=At this rate, that child will...
M5222_S0010_G0100_001_a2=Then fix them.
M5222_S0010_G0110_001_pascal=The problem is that we don't have the materials we need.
M5222_S0010_G0120_001_pascal=Those materials can only be found in the factory ruins, but it is full of ferocious Machine Lifeforms...
M5222_S0010_G0130_001_pascal=I thought that perhaps you, A2-san... Please forgive the shame of asking this of you.
M5222_S0010_G0140_001_sele=Lend a hand.
M5222_S0010_G0150_001_sele=Refuse.
M5222_S0010_G0160_001_pascal=I see... If your circumstances allow, please consider it.
M5222_S0010_G0170_001_pascal=We need materials to repair one of the village children.
M5222_S0010_G0180_001_pascal=Could you please lend us a hand?
M5222_S0010_G0190_001_pascal=Thank you so much!
M5222_S0010_G0200_001_pascal=The materials we need are in the factory ruins, so please, I'm counting on you.
M5222_S0010_G0210_001_pascal=The materials needed to repair the child are in the factory ruins.
M5222_S0010_G0220_001_pascal=I know it's a great deal of trouble, but I'm counting on you.
M5222_S0020_G0000_001_pod042=Destruction of hostile Machine Lifeforms confirmed.
M5222_S0020_G0010_001_a2=Is this the material Pascal wanted for the memory element?
M5222_S0020_G0020_001_a2=Killing Machine Lifeforms to protect a Machine Lifeform child...
M5222_S0020_G0030_001_a2=...
M5222_S0020_G0040_001_a2=I'll take the materials to Pascal.
M5222_S0030_G0000_001_pascal=Ah! A2-san. You've gathered the materials to repair the child.
M5222_S0030_G0010_001_pascal=Thank you very much.
M5222_S0030_G0020_001_pascal=This is far from enough, I know, but please take it as my thanks...
M5222_S0030_G0030_001_pascal=...Truthfully, we would not need to repair her at all if we simply transferred her core to a new body.
M5222_S0030_G0040_001_pascal=That way, we could revive her any number of times.
M5222_S0030_G0050_001_pascal=However... her memories would be lost.
M5222_S0030_G0060_001_pascal=And then... I feel she would no longer be the same child.
M5222_S0030_G0070_001_pascal=Truly, thank you so very much!
