M5101_S0010_G0210_001_robomaster=A 'Memory Alloy' and a 'Broken Circuit' will do as thanks for the bout, ye know?
M5101_S0020_G0000_001_a9s=Here. I brought what you asked for.
M5101_S0020_G0000_300_robomaster=Are ye so eager to see my evolution? How impatient.
M5101_S0020_G0010_001_robomaster=Much obliged, much obliged. With this, I can make new modifications!
M5101_S0020_G0020_001_robomaster=By the time ye next come, I shall be much, much stronger!
M5101_S0020_G0030_001_a9s=Well... I'll look forward to it, in moderation.
