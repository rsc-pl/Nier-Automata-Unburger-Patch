PAUSE_WEAPONSTORY_1003_01=In the capital of a distant eastern land, there lived a poet who made his living by composing verse. But his songs failed to reach the hearts of the people, and thus earned him no coin. Day by day, his life grew ever harder.
PAUSE_WEAPONSTORY_1003_02=Sensing the limits of his own talent, the man eventually folded his pen and took to tilling the fields. His once-white skin was burned black by the sun, and his once-delicate body grew tough from the hard labor.
PAUSE_WEAPONSTORY_1003_03=In time, the man took a wife. She was a gentle, good-natured woman. Several years later, they were blessed with a child. The peaceful days passed by, and the man knew: there could be no greater happiness than this.
PAUSE_WEAPONSTORY_1003_04=Having written this far, the poet put down his pen and swallowed the paper. Talent was not needed; he prayed that his next life would be like this one. Then he plunged the sword Shingi\u2014stained with blood that was not his own\u2014deep into his chest.
PAUSE_WEAPONSTORY_1013_01=Onii-chan, if you say you're cold, you can have my hat. Because you're my most precious older brother, after all!
PAUSE_WEAPONSTORY_1013_02=Onii-chan, if you say you're huuungry, you can have my cookie. Because you're my favorite older brother, after all!
PAUSE_WEAPONSTORY_1013_03=Onii-chan, if you cry at night because you're scared, I'll get under the blanket with you. Because my bestest friend is you, Onii-chan!
PAUSE_WEAPONSTORY_1013_04=So, please, Onii-chan.\nDon't go anywhere, okay?\nDon't leave Yonah all alone... Please?
PAUSE_WEAPONSTORY_1020_01=Once upon a time, in a certain kingdom, there lived three princesses. The middle sister, while not the wisest, was famed as the most beautiful in all the world. In time, she was wed to the king of a neighboring land.
PAUSE_WEAPONSTORY_1020_02=The neighboring king loved the middle princess's beauty above all else. Every day, he had her change into a new dress six times, and sent her new flowers eight times. Bathed in this affection, the middle princess's beauty shone ever brighter.
PAUSE_WEAPONSTORY_1020_03=Wishing to remain beautiful for the king, the middle princess sought out every method of preserving her looks. However, the secret to eternal beauty alone remained beyond her grasp. Then one day, she had a marvelous idea.
PAUSE_WEAPONSTORY_1020_04=The middle princess chose to have herself stuffed, thereby becoming an object of eternal beauty. The king shed tears of感動. Two years later, war came to the neighboring land, and the taxidermied princess was crushed to a pulp beneath the rubble.
PAUSE_WEAPONSTORY_1040_01=On her wedding day, a girl's parents were murdered, the man she was to marry was murdered, and she was violated before their corpses. "I don't care if I die, as long as I can kill them," she prayed, and a shining songbird appeared before her.
PAUSE_WEAPONSTORY_1040_02="Your wish shall be granted. If you continue to wish upon this sword, it will surely come to pass." The songbird bestowed a dagger upon the girl. She clutched it to her breast and spat a tearful curse. "No matter what, I will never forget. Please, grant them a hideous death."
PAUSE_WEAPONSTORY_1040_03=Time passed, and the girl, having achieved her revenge, was now an old woman. The songbird appeared again. "What of your wish?" it asked, but the old woman had no idea what it was talking about. Come to think of it, where had that precious dagger gone?
PAUSE_WEAPONSTORY_1040_04=That night, robbers broke into the old woman's home. Her daughter was violated and her grandson was murdered. Before the barely-living woman, the shining songbird asked again: "This time, how long will you be able to hate?"
PAUSE_WEAPONSTORY_1030_01=One day, the village where a young girl lived was attacked by bandits. To protect her family, she took up the sword her father had found in the mountains and, for the first time in her life, cut a man down. Her family looked upon their blood-soaked daughter in fear.
PAUSE_WEAPONSTORY_1030_02=The village was never attacked by bandits again. Ten, then twenty years passed. As the family she protected grew old, the girl alone did not age. The villagers gradually began to shun her.
PAUSE_WEAPONSTORY_1030_03=Having lost her place in the world, the girl left the village. She journeyed for many years, wandering through many countries. In time, she became known to the world as a swordsman of unparalleled skill.
PAUSE_WEAPONSTORY_1030_04=An endless life, a powerful sword, and wisdom gained over long years. Having obtained such power, the girl rose to become the queen of a nation, seemingly wanting for nothing. But there was one thing she never obtained: the kindness from her father that she had wanted back then.
PAUSE_WEAPONSTORY_1050_01=YoRHa R&D Team Journal: August 29\nHeld a progress report meeting for the new weapon today. We had many observers from the other orbital satellites, so I can tell expectations are high.
PAUSE_WEAPONSTORY_1050_02=YoRHa R&D Team Journal: December 10\nToday was the core integration experiment, but we encountered unexpected, irregular output. The problem with the core's perimeter protection also became apparent.
PAUSE_WEAPONSTORY_1050_03=YoRHa R&D Team Journal: January 8\nThe circuits of three consecutive staff members burned out while attempting to disable the core's protection. I've put in a request for more personnel.
PAUSE_WEAPONSTORY_1050_04=YoRHa R&D Team Journal: January 15\nReceived a formal cease-and-desist order from Command. This weapon has been approved for official deployment with its core still sealed.
PAUSE_WEAPONSTORY_1060_01=The weapons a certain craftsman made were unadorned and charmless, with next to no value as works of art. But in actual combat, they were known to cut exceedingly well, and there was no end to those who sought them.
PAUSE_WEAPONSTORY_1060_02=A thought suddenly struck the craftsman. He had never cut down a person. His test cuts were always on the corpses of pigs or cows. But everyone said his blades cut well. What, he wondered, was the feeling of cutting a person?
PAUSE_WEAPONSTORY_1060_03=The craftsman took one of his own swords and went to a battlefield. He cut into the rolling corpses and was amazed by the power of the blade as it passed through them with far too little resistance. It was utterly boring. He wanted more\u2014a greater sense of feedback from his cuts.
PAUSE_WEAPONSTORY_1060_04=And so the craftsman, in search of that feeling, began modifying his swords without a shred of concern for the pain of those being cut. But the completed sword was stolen by a burglar, and the craftsman's own body was made to taste the agony he had designed.
PAUSE_WEAPONSTORY_1070_02=How long must I continue to protect?\nWithin this endless, infinite war.
PAUSE_WEAPONSTORY_1070_03=How long must I continue to believe?\nIn this world, so full of deceit and vanity.
PAUSE_WEAPONSTORY_1070_04=How long must I continue to lie?\nWhile continuing to despair at that dark future.
PAUSE_WEAPONSTORY_1071_01=Once upon a time, there were seven boys.\nThe boys were all born in the same place, but they were not brothers. Still, they all got along and lived happily.
PAUSE_WEAPONSTORY_1071_02=One cold night, a fortune-teller came and said, "There is a traitor among you brothers." The boys didn't believe the prophecy, but the next morning, one of the seven had been murdered.
PAUSE_WEAPONSTORY_1071_03=From then on, one boy was murdered each night. "Tomorrow, it might be me." The boys began to suspect one another, no longer knowing who they could trust.
PAUSE_WEAPONSTORY_1071_04=On the morning of the 6th day, the last surviving boy was left standing. In the end, it was never clear who the traitor was. The boy looked at his blood-soaked hands and smiled. "I have to go find the traitor."
PAUSE_WEAPONSTORY_1080_01=Hello! To all our listeners, are you feeling great today? Yeah, yeah! Well then, let's get started with "Morning\u2606Letter," hosted by your's truly, the bokukko 24D!
PAUSE_WEAPONSTORY_1080_02=Hey everyone! Feeling good? Yeah... I know... Yesterday's clean-up operation had a lot of casualties. But that's exactly why those of us who are left have to keep our spirits up, don't you think?
PAUSE_WEAPONSTORY_1080_03=We haven't been getting any letters lately! 24D-tan is sad! Hehe... Maybe... no one is listening? ...Nah, couldn't be (lol). Well, let's get this show on the road!
PAUSE_WEAPONSTORY_1080_04=Hey... Is anyone really there? I'm the idol, 24D. Can you hear me? I'm an idol an idol I'm an idol an idol an iDol an idol an iDol an iDol an IdoL an iDol
PAUSE_WEAPONSTORY_1090_01=The more I read past documents, the more the interesting nature of the human race stands out. They will surely prove to be valuable data for us machine lifeforms. I shall continue to record them from now on.
PAUSE_WEAPONSTORY_1090_02=Looking closely at human records, it seems that reproductive acts and predatory acts are important elements for sustaining life. Despite this, why is there a tendency to perceive these acts as sinful...?
PAUSE_WEAPONSTORY_1090_03=I picked up a book today. Upon investigation, it seems to be a very famous book in the human world. But even after reading it about 10 times, I don't understand it at all. What on earth is so appealing about this string of characters?
PAUSE_WEAPONSTORY_1090_04=I get it! I have finally determined that I cannot understand humanity... no, anything in the world! To think that this world is filled with such never-ending mysteries... how wonderful!
PAUSE_WEAPONSTORY_1203_01=Its blade, turned to scrap by a long slumber, is, as its name suggests, a mere lump of iron. Its blood-colored past is all red rust, flaking off with a grating sound.
PAUSE_WEAPONSTORY_1203_02=Who would swing this lump, which offers nothing but an unpleasant weight? Who would favor this lump, which only crushes flesh instead of cutting it? Who would love this weapon, which drives its wielder to madness with every swing?
PAUSE_WEAPONSTORY_1203_03=It found solace in the peace of its continuing slumber. If it did not fight, its body would not be whetted with blood. It could simply crumble and perish... But the fools who seek power would not permit it that comfort.
PAUSE_WEAPONSTORY_1203_04=The flaking red rust is the tears of iron. A form coated in blood and meat and fat is the proof of its curse. If so, let it sever sinew. Let it grind meat. Let it shatter bone. If that is my body's atonement.
PAUSE_WEAPONSTORY_1213_01=A weapon housing the souls of young twins offered to twin gods. Its blades, even if chipped, will return to their form, and will never be parted. A crystallization of beauty, promised to be together no matter what, two as one.
PAUSE_WEAPONSTORY_1213_02=The twin souls dwelling in the blades have a dream. They dream a happy dream of growing up together, becoming adults together, falling in love with someone together, and falling in love together. Two are one. That's why both of us love the same person.
PAUSE_WEAPONSTORY_1213_03=I am me. I am me. Look at me. Look at me. Love me. Love me. Don't copy me. It's not copying.
PAUSE_WEAPONSTORY_1213_04=we are together. even in death we are together. even if we kill the other we are together. even if we kill each other we are together. two bodies return to one. please someone let us go let go.
PAUSE_WEAPONSTORY_1220_01=Once upon a time, in a certain kingdom, there lived three princesses. The eldest among them was famed as the wisest in all the world, and in time, she rose to rule the nation as its queen.
PAUSE_WEAPONSTORY_1220_02=To make the country stronger, the queen began to strengthen the military. This required money, so she increased the taxes on her people. As a source of income, she had the people work in newly built military factories.
PAUSE_WEAPONSTORY_1220_03=The people worked, the taxes increased, and the army grew stronger. As the army grew stronger, the demand for factories increased, so the people worked, the taxes increased, and the army grew stronger, so the people worked\u2014Under the wise queen, everything proceeded efficiently, according to plan.
PAUSE_WEAPONSTORY_1220_04=AND TO MAKE THE COUNTRY STRONGER, WE THE PEOPLE WERE MODIFIED INTO MACHINES AT THE FACTORIES TO WORK BETTER, AND THE ARMY WAS MODIFIED INTO STRONG MACHINES. EVEN NOW, THE COUNTRY IS PERFECTLY GOVERNED UNDER THE QUEEN, WHO BECAME ITS CONTROL SYSTEM.
PAUSE_WEAPONSTORY_1230_01=One day, a hawk wandered into a forest. Its elegant wings, which once soared through the sky, were wounded and weak, and it seemed on the verge of death. A beautiful songbird, taking pity on its form, desperately cared for the hawk.
PAUSE_WEAPONSTORY_1230_02=Thanks to the beautiful songbird, the hawk gradually recovered. The sight of the small, shining bird nestled in the grand, elegant wings of the hawk became an object of admiration for all the animals in the forest.
PAUSE_WEAPONSTORY_1230_03=Once its wounds had completely healed, the hawk said it would return to the world outside the forest. But it also promised to return. As a token of their friendship, the beautiful songbird gave the hawk one of its shining feathers.
PAUSE_WEAPONSTORY_1230_04=As promised, the hawk returned. It brought a human with it. "This feather will sell for a high price. Well done," the human praised the hawk, then struck the songbird dead with the greatsword in his hand and plucked all of its feathers.
PAUSE_WEAPONSTORY_1240_01=Hiii! It's the YoRHa forces' idol! 42S, the PR rep for Northern 12C Defense HQ! I'll be reporting on the war situation from today, so to everyone in the YoRHa forces, let's do our best!
PAUSE_WEAPONSTORY_1240_02=To everyone on the battlefield! Thanks for always listening to my broadcast! The war situation is by no means optimistic, but reinforcements from the orbital satellite bases are planned, so please, absolutely do not give up! Glory to Mankind!
PAUSE_WEAPONSTORY_1240_03=This is Northern 12C Defense HQ!! Is anyone! Is anyone listening to this broadcast!? I'm the PR rep, 42S! Our headquarters is currently surrounded by a large number of machine lifeforms...
PAUSE_WEAPONSTORY_1240_04=[This channel is not currently broadcasting.]
PAUSE_WEAPONSTORY_1250_01=The greatsword was reputed to inflict great pain on those it cut. That was why the man carried it on his back, no matter how heavy it was. He thought that by displaying its terror, he could avoid useless conflict.
PAUSE_WEAPONSTORY_1250_02=Without even fighting, the man's fame spread throughout the village. "Don't let him draw that fearsome sword," everyone whispered. The man inwardly smirked at the results, which were just as he'd thought. He believed that terror was what created peace.
PAUSE_WEAPONSTORY_1250_03=The man had a craftsman make similar weapons and had others carry them. By doing so, they would keep each other in check, and he plotted to resolve conflicts through discussion. The man's plan worked... up to a point.
PAUSE_WEAPONSTORY_1250_04=A checkmate through terror is only effective in a standoff. So, what if someone used it? The answer is simple. In a single night, the village was filled with screams of pain worse than death, and became a living hell.
PAUSE_WEAPONSTORY_1260_02=MY BELOVED, MY HEART, COULD NOT GRASP
PAUSE_WEAPONSTORY_1260_03=MY BELOVED, FAR, DEPARTED
PAUSE_WEAPONSTORY_1260_04=MY BELOVED, WITH THAT DEATH, BECAME ETERNAL
PAUSE_WEAPONSTORY_1261_01=I will not forget the time I touched him.\nThe conviction that this love would be eternal.
PAUSE_WEAPONSTORY_1261_02=Even by his side, I did not understand his feelings.\nIt was painful, so painful.
PAUSE_WEAPONSTORY_1261_03=If I am near him, I will hurt him.\nEven if I am far from him, I will hurt him.
PAUSE_WEAPONSTORY_1261_04=...I have finally found my place.\nThis place, closest to him, yet as distant as eternity.
PAUSE_WEAPONSTORY_1270_01=WHY dO HuMANS fighT?
PAUSE_WEAPONSTORY_1270_02=whY dO HuMANS fAll iN LoVE?
PAUSE_WEAPONSTORY_1270_03=wHy dO humANS GatheR?
PAUSE_WEAPONSTORY_1270_04=Why are you... alive?
PAUSE_WEAPONSTORY_1400_01=There was a legend of a certain warrior. He was strong and second to none, and it was said he had received an ageless, immortal body from a phoenix. The warrior sought a place to wield his power, and wandered the battlefields for decades.
PAUSE_WEAPONSTORY_1400_02=The ceaseless conflict eventually left the warrior alone. At a loss with his undying body, the warrior pierced himself with his spear countless times. But his wounds healed instantly, without even leaving a scar.
PAUSE_WEAPONSTORY_1400_03=He threw himself from cliffs, leapt into fire, and plunged into raging rivers, but his body would not perish. Before long, the warrior closed off his consciousness. And after several hundred years, a beautiful songbird flew down beside him.
PAUSE_WEAPONSTORY_1400_04=The songbird said, "Your sins have been atoned for. If you wish to be saved from the loneliness brought by eternal life, I will do so." The warrior shed tears, gave words of thanks to the gods, and then stomped the songbird to death.
PAUSE_WEAPONSTORY_1420_01=Once upon a time, in a certain kingdom, there lived three princesses. The third daughter was famed as the ugliest in all the world, but she was a very kind-hearted girl.
PAUSE_WEAPONSTORY_1420_02=Wishing to be of service to people, the third daughter went down to the fields and offered a helping hand to the common folk. But her hand was brushed aside, and her goodwill was not accepted. On the contrary, people shunned and avoided her.
PAUSE_WEAPONSTORY_1420_03=Someone said that the third daughter was rejected because she was ugly. But the girl, thinking her own devotion was lacking, continued to serve for free every day. Every day, every day, every day, every day\u2014
PAUSE_WEAPONSTORY_1420_04=One day, the third daughter was found dead, curled up in a back alley. But because of her ugly corpse, no one would bury her. The ugly girl rotted away ugly and returned to the earth.
PAUSE_WEAPONSTORY_1430_01=I was dreaming. About the day I met him.\nHe was small and weak.\nI hated the world, too.
PAUSE_WEAPONSTORY_1430_02=I helped him.\nHe helped me, too.\nBefore I knew it, we had become friends.
PAUSE_WEAPONSTORY_1430_03=Of course, not everything went well.\nWe must have gone wrong somewhere.\nEven so, we were friends.
PAUSE_WEAPONSTORY_1430_04=The wind on this plain is blue and smells nice.\nWhen I press my cheek to his, he squirms as if tickled.\nI spread my wings, and with him on my back, I soared into the sky.
PAUSE_WEAPONSTORY_1440_01=In a certain country, there were two princes. The son of the first queen was wise but frail and gloomy. The son of the second queen was dull-witted but cheerful and excelled in martial arts.
PAUSE_WEAPONSTORY_1440_02=Which prince was the official heir? The king died in battle without making a decision. The remaining princes, as one would expect, asserted their claims to the throne, and a conflict that embroiled the people began.
PAUSE_WEAPONSTORY_1440_03=In the midst of the ugly succession struggle, a third prince, claiming to be the king's son, appeared. He was a young man of both wisdom and valor, an impeccable candidate for king. The young man slaughtered his foolish brothers and ascended the throne, thereafter making a name for himself as a wise ruler.
PAUSE_WEAPONSTORY_1440_04=Decades later, as he was dying, the king told his people that he was not the former king's son, but a poor boy groomed by a certain nobleman. Hearing this, the people took the man who was no longer king and hanged him.
PAUSE_WEAPONSTORY_1450_01=Development Journal: 05/04 Takada\nI thought of something amazing. An idea no one has ever realized.\nI'll start testing it tomorrow.
PAUSE_WEAPONSTORY_1450_02=Development Journal: 07/04 Takada\nMy idea to create an alloy of metal and magical elements was rejected by the department head. The head doesn't get it. How much money this could make...
PAUSE_WEAPONSTORY_1450_03=Development Journal: 12/01 Takada\nProgress is not good. My hair has been falling out a lot lately, probably due to stress. I have to make this a success, and soon.
PAUSE_WEAPONSTORY_1450_04=Development Journal: 12/15 Fujita\nI checked the data, but I can't find the problem. But I won't give up. Now that Takada-san is gone, I'm the only one who can carry on his work...
PAUSE_WEAPONSTORY_1460_01=The plain spear would pierce a vital point with machine-like precision, then its dull blade would scrape away the opponent's bone. The mercenary woman greatly enjoyed the grinding sound and the impossibly pained screams that resulted.
PAUSE_WEAPONSTORY_1460_02=Today, as on any other day, the woman raced across the battlefield to hear her supreme music. That huge man's fat looks like it would jiggle and hum. Ah, that slender man would surely make a fine sound of bone. Now, who to pierce first?
PAUSE_WEAPONSTORY_1460_03=She wandered through countless battlefields, piercing countless bodies. Seeking the ideal scream and sound of bone, the woman eventually grew weary. Was there no flesh and bone of just the right consistency?
PAUSE_WEAPONSTORY_1460_04=Suddenly, she looked to her side and saw a perfectly good lump of meat. When she carved it up, it let out a pleasant scream that satisfied the woman. With a fulfilled smile, she looked up at the sky. She could no longer remember that it was her own child.
PAUSE_WEAPONSTORY_1470_01=The one who had this beautiful white spear made was the tyrant of a certain country. A weapon adorned as a gift for his beautiful wife. The wife went to the bedchamber with the tyrant and stabbed the man who was her parents' killer in the stomach thirty times with the spear.
PAUSE_WEAPONSTORY_1470_02=The second owner was a valiant female warrior. She killed many bandits, became a hero, became the town's leader, grew old over the years, and one moonlit night was surrounded by young bandits, had everything taken from her, and was killed.
PAUSE_WEAPONSTORY_1470_03=The third owner was a merchant woman. She was greedy and lived by stealing money from people, but eventually no one would come near her, and she hanged herself. The spear, which had been on display, was never used once.
PAUSE_WEAPONSTORY_1470_04=The fourth owner was an honest boy. The boy had a sick younger sister, and he was prepared to do anything for her. In time, the boy offered everything for his sister's sake. His existence, and everything in this world.
PAUSE_WEAPONSTORY_1471_01=The one who made this ugly black spear was a beautiful female blacksmith. Everyone praised its tip, but the woman was killed by a jealous young apprentice. It is said that no one knew where the spear went.
PAUSE_WEAPONSTORY_1471_02=The second owner was a puppeteer who manipulated dolls. His masterpiece was a beautiful, all-capable clockwork girl. When the puppeteer gave the doll the spear, it sliced him to pieces with magnificent spear work.
PAUSE_WEAPONSTORY_1471_03=The third owner was a newborn prince. The lady of the castle, who gave him the spear as a proof of succession, died shortly after. On the night of the funeral, the spear vanished from the prince's room, leaving only the infant's corpse behind.
PAUSE_WEAPONSTORY_1471_04=The fourth owner was a simple-minded father. The father had a sick daughter, and he was prepared to do anything for her. In time, the father, with that resolve, offered everything. His existence, and everything in this world.
PAUSE_WEAPONSTORY_1480_01=My name is Plato 1728. I am a defective machine. I was made to fight, but I'm too scared to use weapons. Everyone makes fun of me, and there's nothing good about being alive.
PAUSE_WEAPONSTORY_1480_02=I am a slow machine. I got lost on the battlefield and wandered into some factory. There were many small, discarded dolls there. I thought we were kindred spirits, with no place in this world.
PAUSE_WEAPONSTORY_1480_03=I am a foolish machine. The battlefield that day was that same factory. The dolls lying there were all broken. My allies and enemies were trampling on the dolls, fighting, fighting, fighting.
PAUSE_WEAPONSTORY_1480_04=I activated my weapon and began to fire on the allies and enemies present. I don't really know why. But I decided to fight. Because I'm a foolish, broken machine.
PAUSE_WEAPONSTORY_1640_01=Long ago, there was a demon who admired an angel. He dreamed of serving at God's side, his body burning with unrequited feelings. Before long, the demon began to appear in the human world, a world closer to heaven.
PAUSE_WEAPONSTORY_1640_02=To defeat the demon that had appeared in the human world, an angel was dispatched. The demon, meeting a messenger of God, shed tears of joy and confessed his feelings. Please, give me white wings, he said.
PAUSE_WEAPONSTORY_1640_03=The angel listened to the demon's wish and promised to give him white wings. In exchange for the heads of other demons. The demon, overjoyed, killed his comrades and reaped their heads with his own hands.
PAUSE_WEAPONSTORY_1640_04=The angel led the demon to the kingdom of heaven. There, he was subjected to centuries of torture, his consciousness gradually stolen away. With a cruelty that would terrify even a demon, as promised, his black wings were turned white.
PAUSE_WEAPONSTORY_1630_01=Long ago, there was a kind-hearted angel. The angel often descended to the earth and went about saving people in need. He healed the sick, blessed the poor, and comforted the crying.
PAUSE_WEAPONSTORY_1630_02=But the angel extended his hand of salvation even to sinners and believers of other faiths. This was a forbidden act. Each time the angel saved such a person, another feather would fall from his wings.
PAUSE_WEAPONSTORY_1630_03=One day, the angel met a small girl. She suffered from a grave illness and simply spent her days in pain. But the angel could not heal her. All of his feathers had fallen out.
PAUSE_WEAPONSTORY_1630_04=The angel cursed his own lack of resolve and the absurdity of the world. The hatred dyed his entire body black, spreading out to form new, black wings. And as he shed tears of blood, he slowly placed his hands on the girl's neck.
