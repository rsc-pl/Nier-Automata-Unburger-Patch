M5120_S0010_G0000_001_toolshop=Oh, you're new around here. New customers are always welcome!
M5120_S0010_G0010_001_a9s=Oh... So you're the Resistance tool shopkeeper?
M5120_S0010_G0020_001_toolshop=Yeah. I make tools by reusing scrap and captured enemy units.
M5120_S0010_G0030_001_toolshop=Buying anything today?
M5120_S0010_G0040_001_a9s=You don't carry Plug-in Chips here?
M5120_S0010_G0050_001_toolshop=Ah, chips that enhance your body, huh...
M5120_S0010_G0060_001_toolshop=Right now, all chip-related business is on hold because of equipment trouble.
M5120_S0010_G0070_001_toolshop=If I had the repair materials, I could deal with it, but...
M5120_S0010_G0080_001_toolshop=That's it! If you're willing, could you go gather the materials for me?
M5120_S0010_G0090_001_toolshop=My legs are bad, see. If I could move a little more freely, I'd go look for them myself...
M5120_S0010_G0100_001_a9s=Then why not repair your own legs first?
M5120_S0010_G0110_001_toolshop=Can't do that. Repairs have to go to those who can actually fight first.
M5120_S0010_G0120_001_toolshop=Once you folks wipe out the Machine Lifeforms, I'll take my time and fix myself up. So please!
M5120_S0010_G0130_001_sele=Accept the request.
M5120_S0010_G0140_001_sele=Decline the request.
M5120_S0010_G0150_001_a2b=...Roger.
M5120_S0010_G0160_001_toolshop=I owe you one!
M5120_S0010_G0170_001_toolshop=Okay then, please gather a "Broken Spring," a "Small Gear," and a "Broken Circuit."
M5120_S0010_G0175_001_toolshop=You should be able to get them from the enemies in the open area to the left after you leave this camp.
M5120_S0010_G0180_001_toolshop=I see... Sorry for asking too much.
M5120_S0010_G0190_001_toolshop=If you have time later, could you take on that repair-materials request?
M5120_S0010_G0200_001_toolshop=Don't forget the "Broken Spring," "Small Gear," and "Broken Circuit" I asked for.
M5120_S0020_G0000_001_a9s=Alright, that's everything the tool shopkeeper asked for.
M5120_S0020_G0010_001_a9s=Running errands is hard work, huh~
M5120_S0020_G0020_001_a2b=The surface Resistance are important comrades to YoRHa forces.
M5120_S0020_G0030_001_a2b=Helping them is an important mission too.
M5120_S0020_G0040_001_a2b=So don't complain.
M5120_S0020_G0050_001_a9s=Yes, ma'am.
M5120_S0030_G0000_001_toolshop=Oh, you got the materials. Thank you!
M5120_S0030_G0010_001_toolshop=With this, I can finally sell Plug-in Chips again...
M5120_S0030_G0020_001_a2b=Then why don't you fix your own leg too? It seems like you have enough materials...
M5120_S0030_G0030_001_toolshop=Ah, yeah... No...
M5120_S0030_G0040_001_a2b=Is there another reason you can't repair it?
M5120_S0030_G0050_001_toolshop=...My broken left leg... is still an original part.
M5120_S0030_G0060_001_toolshop=Over the course of this long war, I've repaired this body countless times.
M5120_S0030_G0070_001_toolshop=Swapping parts, then swapping more, and more, and more...
M5120_S0030_G0080_001_toolshop=The only thing left from the beginning is... this left leg.
M5120_S0030_G0090_001_toolshop=If I replace this too, I feel like I won't be myself anymore.
M5120_S0030_G0100_001_toolshop=Am I still really... "me"...?
M5120_S0030_G0110_001_a2b=...
M5120_S0030_G0120_001_toolshop=Ah, sorry for getting gloomy on you.
M5120_S0030_G0130_001_toolshop=I'll keep the shelves stocked from now on, so drop by anytime!
M5920_S0010_G0280_001_pod042=Report: Target location information obtained. Marking on map.
M5920_S0020_G0280_001_pod153=Report: Target location information obtained. Marking on map.
