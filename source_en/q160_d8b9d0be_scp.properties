M5160_S0000_G0000_300_cmd=Deliver the necessary materials to the Resistance leader.
M5160_S0010_G0000_001_cmd=Ah, that reminds me—I have a job I would like to request.
M5160_S0010_G0010_001_cmd=I want you to improve the communications link between the surface and here.
M5160_S0010_G0020_001_cmd=This should allow us to deploy operations more efficiently.
M5160_S0010_G0030_001_cmd=First, deliver the necessary materials to the Resistance Camp leader.
M5160_S0010_G0040_001_cmd=Your Operator will tell you how to obtain the materials after you descend to the surface.
M5160_S0010_G0050_001_a9s=Roger.
M5160_S0020_G0000_001_op60=From Operator to 2B-san.
M5160_S0020_G0010_001_op60=Please collect the materials needed to improve communications.
M5160_S0020_G0020_001_op60=The required materials are "Rusty Bolts," "Small Gears," and "Springs."
M5160_S0020_G0021_001_op60=Apparently, they can sometimes be obtained from smaller enemies.
M5160_S0020_G0030_001_op60=Once you have gathered the materials, please hand them to Anemone-san, the Resistance Camp leader.
M5160_S0020_G0040_001_a2b=Roger.
M5160_S0020_G0050_001_op60=It might be a little tough, but do your best, 2B-san!
M5160_S0020_G0060_001_op210=From Operator to 9S.
M5160_S0020_G0070_001_op60=I will now relay the materials needed to improve communications.
M5160_S0020_G0080_001_op60=The required materials are "Rusty Bolts," "Small Gears," and "Springs."
M5160_S0020_G0081_001_op60=Apparently, these materials can sometimes be obtained from smaller enemies.
M5160_S0020_G0090_001_op60=Once you have the materials, hand them over to Anemone, leader of the Resistance Camp.
M5160_S0020_G0100_001_a9s=Rogeeer.
M5160_S0020_G0110_001_op210=There is no need to drag out your sentence endings. Over.
M5160_S0030_G0000_001_op60=From Operator 6O to 2B-san.
M5160_S0030_G0010_001_op60=It seems you have obtained all the materials needed for the communications upgrade.
M5160_S0030_G0020_001_op60=Please hand the collected materials to Anemone-san. That will conclude the mission.
M5160_S0030_G0030_001_op210=From Operator 21O to 9S.
M5160_S0030_G0040_001_op60=I have confirmed that the materials needed for the communications upgrade have been assembled.
M5160_S0030_G0050_001_op60=Please hand the collected materials to the Resistance Leader. Over.
M5160_S0040_G0000_001_ane=I've received word from the Bunker.
M5160_S0040_G0010_001_ane=Materials for maintaining the communications infrastructure, right? I have received them.
M5160_S0040_G0020_001_ane=It is not much, but take it as thanks. It probably violates regulations, so I will keep it secret from the Commander.
M5160_S0040_G0030_001_a2b=2B to Operator 6O. Material handover complete.
M5160_S0040_G0040_001_op60=Roger. Good work!
M5160_S0040_G0050_001_a9s=...Honestly, the Commander works us as hard as ever, doesn't she?
M5160_S0040_G0060_001_a9s=She's strict about rules, too. I bet she lives like some efficiency-first robot.
M5160_S0040_G0070_001_op60=The Commander isn't that rigid, you know?
M5160_S0040_G0080_001_a9s=Huh? What do you mean?
M5160_S0040_G0090_001_op60=The Commander may look that way, but she's surprisingly careless.
M5160_S0040_G0100_001_op60=She leaves clothes lying around after taking them off, and lets the laundry pile up. The laundry team is always complaining.
M5160_S0040_G0110_001_op60=And she completely skips things like her own body maintenance checks.
M5160_S0040_G0120_001_op60=Though I suppose hiding that messier side of herself is very much like her.
M5160_S0040_G0130_001_a2b=How do you know that?
M5160_S0040_G0140_001_op60=Fufufu... It's a secret.
M5160_S0040_G0150_001_op60=Well then.
M5160_S0040_G0160_001_a9s=A secret...
M5920_S0010_G0280_001_pod042=Target location data obtained. Marking it on the map.
M5920_S0020_G0280_001_pod153=Target location data obtained. Marking it on the map.
M6090_S0010_G0000_300_ane=How are you holding up? Don't push yourself too hard.
