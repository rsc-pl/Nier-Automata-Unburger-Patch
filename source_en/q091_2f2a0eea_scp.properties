M6120_S0000_G0000_001_resi=Man, this place really is the best!
M6120_S0000_G0010_001_resi=I hear you've been getting popular lately. I'm expecting great things from you!
M6120_S0000_G0020_001_resi=Thanks to you defeating the S-Rank champion, that guy's back in a cell for the time being. Thanks a lot!
M6120_S0010_G0000_001_resi=The higher-ups think this kinda fun is illegal. Bunch of idiots, the lot of 'em.
M6120_S0010_G0010_001_resi=I hear you're pretty strong. I'll have to come watch one of your matches.
M6120_S0010_G0020_001_resi=Man, your match was incredible!
M6120_S0010_G0030_001_resi=Some idiots badmouth this place sometimes, but anyone who doesn't understand how fun it is here is just pitiful. You think so too, right?
M6120_S0020_G0000_001_resi=How about it? Are you having fun?
M6120_S0020_G0010_001_resi=You're starting to understand how to enjoy this place too, right?
M6120_S0020_G0020_001_resi=Wondering why this place hasn't been shut down?
M6120_S0020_G0030_001_resi=Even the top brass aren't fools. They know this place exists, and they look the other way.
M6120_S0020_G0040_001_resi=They understand that letting people blow off steam here helps prevent rebellion and desertion.
M6120_S0020_G0050_001_resi=Besides, some of the money from here flows right to the top.\nWell, that's just how organizations are.
M6120_S0020_G0060_001_resi=For your own sake, don't poke your nose into things that don't concern you.
M6120_S0030_G0000_001_resi=Everywhere's a battlefield these days.\nIf it weren't for this place, I would've deserted long ago.
M6120_S0030_G0010_001_resi=Thanks to you smashing those Machine Lifeforms to bits, all my stress melted away. Thanks!
M6120_S0030_G0020_001_resi=Ever since I found this place, killing Machine Lifeforms on the battlefield has been so, so much fun. It's the best.
M6120_S0040_G0000_001_resi=Thanks to this place, I can get through the toughest jobs.
M6120_S0040_G0010_001_resi=Yeah. Thanks to this place, I can keep going tomorrow.
M6120_S0040_G0020_001_resi=The way you smash those Machine Lifeforms... it was just the best!
M6120_S0050_G0000_001_resi=I've got some... good stuff in stock, you know?
M6120_S0050_G0010_001_resi=Can't be helped. It's a bit dangerous, but I guess I'll try stocking up around the Underground Cave.
M6120_S0050_G0020_001_resi=It's been a while since someone cleared the highest rank. You'd make a good hunter.
M6120_S0060_G0000_001_resi=I'd like to buy a new one for 10,000G.
M6120_S0060_G0010_001_resi=The one I bought the other day was no good; it broke right away. Give me something sturdier.
M6120_S0060_G0020_001_resi=Oh, I saw your match! With skill like that, bring me a real lively one!
M6120_S0070_G0000_001_resi=Sorry, but this area is off-limits.
M6120_S0070_G0020_001_resi=How about it? You won't find many shows more interesting than this, right?
M6120_S0080_G0000_001_resi=Dammit! Dammit!\nBecause that guy lost, my fortune went up in smoke!
M6120_S0080_G0010_001_resi=Look at that, look at that! I won, I actually won! Look at this fortune! Ahahaha!
M6120_S0080_G0020_001_resi=Huh? What happened to the other guy who was here?
M6120_S0080_G0030_001_resi=He kept losing and could no longer pay his debts, so he was dragged off somewhere. What an idiot.
M6120_S0080_G0040_001_resi=I can still keep going. All right, next time I'll aim for an even bigger long shot...
M6120_S0090_G0000_001_resi=This is bad, this is bad, this is bad... How am I supposed to pay back this much money...?
M6120_S0100_G0000_001_resi=Only participants in the arena are permitted beyond this point.
M6120_S0100_G0010_001_resi=If you wish to participate, please complete the registration process at the reception desk.
M6120_S0110_G0000_001_resi=Hmm... Should I play it safe, or aim for the long shot? Hard to decide...
M6120_S0110_G0010_001_resi=Oh, I saw your match! Next time, I'm definitely betting on you!
M6120_S0110_G0020_001_resi=To think you'd beat the champion of the arena... I should've bet on you.
M6120_S0110_G0030_001_resi=I'm definitely betting on you next time, so let me know when you're competing!
M6120_S0120_G0000_001_resi=What the hell are you doing!?\nIf you don't wreck 'em in a flashier way, it's boring!!
M6120_S0120_G0010_001_resi=Don't you dare fall behind a piece of junk like that, damn it!!
M6120_S0120_G0020_001_resi=Hey, you! Don't stop! Even after you break it, tear it to shreds!!
M6120_S0130_G0000_001_resi=All right!!\nThat's it, smash 'em!
M6120_S0130_G0010_001_resi=Whoaaa!!\nYour match was incredibly exciting!
M6120_S0130_G0020_001_resi=WOOOOAH!!\nTo think you'd actually take down that champion! That blew me away!!
M6120_S0140_G0000_001_resi=When I watch Machine Lifeforms burst apart, it feels like something in my chest gets... sorted out.
M6120_S0140_G0010_001_resi=I wonder what I should call this feeling.
M6120_S0140_G0020_001_resi=I looked through some old human literature, and I guess the feeling you get watching Machine Lifeforms explode is something close to "exhilarating," "joyful," or "cathartic."
M6120_S0140_G0030_001_resi=Machine Lifeforms have put us through hell over and over.\nWatching them break really is exhilarating.
M6120_S0140_G0040_001_resi=Ahahaha, it's wonderful! Watching them break really is wonderful!
M6120_S0150_G0000_001_resi=What are you doing, you junk heap!?
M6120_S0150_G0010_001_resi=I bet money on you, so fight like your life depends on it!!
M6120_S0150_G0020_001_resi=I saw your match. With your skill, you might just be able to smash that cocky S-Rank champion. I expect great things.
M6120_S0150_G0030_001_resi=That was amazing! Thanks to you beating the champion, we can keep him as a slave a little longer.
M6120_S0160_G0000_001_resi=Ahh, you really cannot beat the front row!
M6120_S0160_G0010_001_resi=I can't get enough of it when stray bullets fly over here!
M6120_S0160_G0020_001_resi=It gives me the shivers, you know?
M6120_S0160_G0030_001_resi=Lately, not many bullets fly over, even in the front row...
M6120_S0160_G0040_001_resi=More, more! Send more bullets this way! Give me that thrill, that THRILL!!
M6120_S0160_G0060_001_resi=Conquering S-Rank is amazing.
M6120_S0160_G0070_001_resi=Ah, I want to be showered in more of those dangerous S-Rank bullets!
M6120_S0170_G0000_001_resi=You're new here.\nIf you're going to gamble, you'd better be careful.
M6120_S0170_G0010_001_resi=Plenty of people have gone bankrupt here. They all get taken somewhere and never come back.
M6120_S0170_G0020_001_resi=So you're the android everyone's been talking about. Tell me... are you enjoying this place?
M6120_S0170_G0030_001_resi=This place embodies survival of the fittest, where only the strong can find enjoyment.
M6120_S0170_G0040_001_resi=But I do wonder whether androids are truly the strong ones in this world.
M6120_S0170_G0050_001_resi=So, what do you think of this place?
M6120_S0170_G0060_001_resi=Androids who have had countless comrades killed have a just cause for killing Machine Lifeforms.
M6120_S0170_G0070_001_resi=But most of the people here just use that "just cause" as a shield while they enjoy killing.
M6120_S0170_G0080_001_resi=Perhaps, as long as they can kill, it doesn't matter whether the opponent is a Machine Lifeform or not.
M6120_S0170_G0090_001_resi=And yet, thanks to this place, many have found the will to live again.
M6120_S0170_G0100_001_resi=Who could judge whether the people here are sane or mad...?
M6120_S0180_G0000_001_resi=Dammit, another loss!
M6120_S0180_G0010_001_resi=Maybe I should just enter the battle myself...
M6120_S0180_G0020_001_resi=Ow ow ow...
M6120_S0180_G0030_001_resi=Dammit, I never should have entered the battle!
M6120_S0190_G0000_001_resi=As I thought, low-rank matches are boring to watch...
M6120_S0190_G0010_001_resi=I want to see the high-rank matches, but they're so expensive...
M6120_S0190_G0020_001_resi=I really enjoyed your match.
M6120_S0190_G0030_001_resi=The tickets are expensive for a reason. The high-rank matches are a cut above the rest.
M6120_S0190_G0040_001_resi=It's scary how you can get used to things.\nThose high-rank matches that were once so thrilling have now become boring.
M6120_S0190_G0050_001_resi=We androids may be surprisingly greedy creatures.
M6120_S0200_G0000_001_resi=The S-Rank champion is an incredible fighter. He's currently on a 90-win streak.
M6120_S0200_G0010_001_resi=The matches he's in are so popular that tickets are hard to get.
M6120_S0200_G0020_001_resi=I watched you fight. You've got some real skill.
M6120_S0200_G0030_001_resi=The champion has kept winning since then. He's now reached 96 consecutive wins.
M6120_S0200_G0040_001_resi=I wonder which will come first: him reaching 100 wins, or you finally taking him down...
M6120_S0200_G0050_001_resi=Ah, it's you. Seems you defeated the champion.
M6120_S0200_G0060_001_resi=I thought he would be the one to reach 100 wins and finally escape this place, but...
M6120_S0200_G0070_001_resi=In the end, perhaps neither androids nor Machine Lifeforms can escape their assigned fate...
M6120_S0210_G0000_001_resi=Ah, no good... Looks like I'm out of luck today.
M6120_S0210_G0010_001_resi=Seems your winning streak continues. You must be lucky.
M6120_S0210_G0020_001_resi=You cannot resist the flow of luck, but you can draw it in.\nLuck is a strange thing.
M6120_S0210_G0030_001_resi=So you defeated the arena champion. I thought he was the kind of guy who could draw luck to himself, but...
M6120_S0210_G0040_001_resi=Well, he had no luck, and you did. Maybe it's as simple as that.
M6120_S0220_G0000_001_resi=UOOOOOOOOOOOOOOOOO!!
M6120_S0220_G0010_001_resi=Phew, shouting at the top of my lungs feels great!
M6120_S0220_G0020_001_resi=SHAAAAAAAAAAAAAAA!!
M6120_S0220_G0030_001_resi=I just can't stop shouting! Why don't you join me?
M6120_S0220_G0040_001_resi=...Shouted... too... much... Vocal cords... wrecked...
M6120_S0230_G0000_001_n02=Android-san, please. There is something I want to ask of you.
M6120_S0230_G0010_001_n02=My body is weak. I will likely never escape this hell...
M6120_S0230_G0020_001_n02=So... would you please kill me quickly?
M6120_S0230_G0030_001_n02=I have lost my family. I have nothing left.
M6120_S0230_G0040_001_n02=Rather than endure eternal suffering in this hell...
M6120_S0230_G0050_001_n02=It may be an awful request to make, but...
M6120_S0230_G0060_001_n02=Please... please kill me...
M6120_S0240_G0000_001_toolshop=Oh, yer a new face!\nHere for a match, are ya? Then get yerself ready right here!
M6120_S0240_G0010_001_toolshop=Eh? My way of speakin' is strange?
M6120_S0240_G0020_001_toolshop=I learned it from some old documents. Apparently, it's the kinda talk ya use to be a successful merchant.
M6120_S0240_G0030_001_toolshop=Eh? Is there something strange about it?
M6120_S0240_G0040_001_toolshop=I only just learned it, so don't sweat the small stuff!
M6120_S0240_G0050_001_toolshop=Welcome! Take your time and look around!
M6120_S0240_G0060_001_toolshop=Thanks for yer business!
