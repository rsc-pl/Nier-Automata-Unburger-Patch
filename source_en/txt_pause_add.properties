PAUSE_ARCHIVE_140_030=*Note that this document is classified as Level S and must not be disclosed to any YoRHa personnel other than the Commander.\n\nTable of Contents:\n\u30fbProject YoRHa Outline\n\u30fb\u30fbYoRHa Forces\n\u30fb\u30fbYoRHa Unit Combat System\n\u30fb\u30fbBunker Operation\n\u30fb\u30fb\u30fbCommand Structure\n\u30fb\u30fb\u30fbCouncil of Humanity Planning Department\n\u30fb\u30fb\u30fbBackdoor\n\u30fb\u30fbAccompanying Support Unit\n\u30fb\u30fbBlack Box\n\u30fb\u30fbResistance Communication Network\n\n*Permission must be obtained from the designated system administrator to view each item.
PAUSE_ARCHIVE_150_010=I am happy to have been accepted into this order.\n\nUnlike other machine lifeforms, I have been able to find meaning in death.\nAt first, I was just studying human religion.\nBut we came to know of the existence of what is called "Kami."\n\nTo be honest, I still don't know what "Kami" is... but there's something I learned after coming here. A world that feels meaningless when you're alone can be made to feel meaningful by being with someone else. In a world of only conflict and hatred, it's a happy thing just to have obtained that kind of peace.\n\nFor us, death is not the end, but the beginning.\nIf we can all become "Kami" together, there is no greater joy.\n\nChurch of the God of Death, Director of Public Relations
PAUSE_ARCHIVE_160_010=A LONG, LONG TIME AGO. A RECORD LEFT BY A BROKEN MEMORY CIRCUIT. WHEN I WAS BROKEN AND COULD NOT MOVE, IT WAS THE LEADER OF A PACK OF ANIMALS WHO PICKED ME UP AND SAVED ME. THE LEADER WAS GREAT. HE ALWAYS LIVED FOR THE PACK. SO, WHEN HE DIED, I THOUGHT I WOULD DO THE SAME. LIVE FOR EVERYONE, AND DIE FOR EVERYONE. BUT I AM A ROBOT, SO EVERYONE GOES ON AHEAD OF ME.\nSTILL, THE PACK LIVES ON, CONNECTING NEW LIVES. IT IS MY ROLE TO PROTECT THAT. A PROMISE WITH THE DEAD LEADER. IN THIS PEACEFUL FOREST, I WILL CONTINUE TO PROTECT MY FAMILY. BUT, ON THAT DAY. IN THE WAR BETWEEN ANDROIDS AND ROBOTS, THE FOREST BURNED. WITHOUT A HOME, WE CANNOT LIVE. THE FAMILY WILL BE TORN APART. SO, I WILL SEARCH. FOR A NEW HOME. A FOREST WHERE WE CAN ALL LIVE WITHOUT BEING DISTURBED BY ANYONE. BECAUSE I AM HERE, IT WILL BE ALRIGHT. I WILL DEFINITELY MAKE EVERYONE HAPPY--
