M5220_S0010_G0000_001_pascal=Ah, A2-san. Did you need something?
M5220_S0010_G0010_001_a2=...You gave me that filter for free.
M5220_S0010_G0020_001_a2=I won't feel right until I repay that debt.
M5220_S0010_G0030_001_pascal=My, how conscientious of you...
M5220_S0010_G0040_001_a2=If there's anything I can help with, I'll do it.
M5220_S0010_G0050_001_pascal=...Actually, there is something troubling me.
M5220_S0010_G0060_001_pascal=A ferocious robot has begun appearing at the playground and attacking the children.
M5220_S0010_G0070_001_pascal=This is terribly rude of me, but could I ask you to dispose of that robot for us?
M5220_S0010_G0080_001_pascal=I can't ask anyone else to do something like this. Please.
M5220_S0010_G0090_001_sele=Accept.
M5220_S0010_G0100_001_sele=Refuse.
M5220_S0010_G0110_001_pascal=...I understand. You must have your own circumstances.
M5220_S0010_G0120_001_pascal=Please forgive me.
M5220_S0010_G0130_001_pascal=Could you please dispose of the ferocious robot that appears at the children's playground?
M5220_S0010_G0140_001_pascal=Thank you so much!
M5220_S0010_G0150_001_pascal=I'll be sure to thank you properly, so please help us.
M5220_S0010_G0160_001_pascal=Please dispose of the robot that's rampaging through the children's playground.
M5220_S0010_G0170_001_pascal=Please, I'm counting on you.
M5220_S0020_G0005_001_pod042=Detected hostile Machine Lifeform.
M5220_S0030_G0000_001_pascal=Ah, thank you so much!
M5220_S0030_G0010_001_pascal=You disposed of that robot for us.
M5220_S0030_G0020_001_pascal=Please accept this reward. Go on, don't be shy.
M5220_S0030_G0030_001_pascal=...We are pacifists. We created this village because we hate to fight.
M5220_S0030_G0040_001_pascal=But in giving up our weapons, we lost any way to resist those with power.
M5220_S0030_G0050_001_pascal=Some in the village even argue that we should destroy the enemies around us in order to protect our peace.
M5220_S0030_G0060_001_pascal=A2-san... what should we do?
M5220_S0030_G0070_001_a2=Who knows.
M5220_S0030_G0080_001_a2=You're the one who has to decide that, Pascal.
M5220_S0030_G0090_001_pascal=That... is true...
M5220_S0030_G0100_001_a2=And if anyone here attacks me, I won't hesitate to wipe this village out.
M5220_S0030_G0110_001_pascal=...Ha ha. Understood.
M5220_S0030_G0120_001_pascal=A2-san.
M5220_S0030_G0130_001_pascal=If you like, please take a look around the village.
M5220_S0030_G0140_001_pascal=I want you to know more about us.
M5220_S0030_G0150_001_a2=...If I feel like it.
