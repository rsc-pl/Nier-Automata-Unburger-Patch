PAUSE_ARCHIVE_170_050=Park Guide\n\n\u2605 Carnival Plaza\nPass through the gate and you're in another world... Enjoy the gorgeous carnival parade by our cast!\n*Held twice, at 12:00 and 18:00.\n\n\u2605 Midnight Town\nHow many of the ghosts lurking in the back alleys can you find?\n\n\u2605 Jet Tower\nA popular attraction. Experience a thrilling flight that rotates at 130 km/h!\n\n\u2605 Grand Ferris Wheel\nIf you're tired of playing, the Ferris wheel is recommended. It is said that if a couple can see the fireworks from this ride, their love will be fulfilled...?\n\n\u2605 Hollywood Coaster\nA dynamic roller coaster that goes around the Fantasy Castle. The industry's first no-seatbelt system makes it extra thrilling!\n\n\u2605 Fantasy Castle\nYou can watch the grand ball where the princesses of the amusement park gather. (Separate fee)\n\n\u2605 Food Court\nWe have many restaurants for the whole family to enjoy, including the Hot Dog Museum with a selection of hot dogs from around the world.
PAUSE_ARCHIVE_170_060=Introduction to Zweitstein Castle\n\nZweitstein Castle is a beautiful castle built about 540 years ago by the lord of the time. It is also a designated World Heritage Site and a major tourist attraction that attracts many tourists from all over the world every year.\nInitially, it was used in the battle against the rival "Church," but as the turmoil subsided, it was mainly used as a residence for royalty and nobility. The third lord of the castle, Leonhard III, who was a book lover, added a library that boasted the best collection of books in the country, which is a major feature of this castle.
PAUSE_ARCHIVE_170_070=A mysterious doll that was nailed to a tree.\nIt is tattered, but its use is unknown.
PAUSE_ARCHIVE_170_080="Housing Complex News" May Issue\n\nThe rainy season is almost here.\nOnce the rainy season starts, it will be difficult to air out your futon. Before June arrives, why not air out the futon stored in your closet once? It will also help prevent mold and mites.\n\n*Recently, the number of people not following the garbage disposal rules has increased. Since it is a shared facility, please put out your raw garbage on Monday and all other garbage on Thursday.
